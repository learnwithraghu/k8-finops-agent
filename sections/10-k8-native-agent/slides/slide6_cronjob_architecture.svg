<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <linearGradient id="pod-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#326CE5"/>
      <stop offset="100%" stop-color="#2450C7"/>
    </linearGradient>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1E88E5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#F8F9FA"/>
  
  <!-- Title -->
  <text x="640" y="60" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#0F1689" text-anchor="middle">CronJob Architecture</text>
  
  <!-- CronJob Box -->
  <rect x="80" y="120" width="400" height="180" rx="12" fill="#E3F2FD" stroke="#1E88E5" stroke-width="3"/>
  <text x="280" y="160" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1565C0" text-anchor="middle">CronJob</text>
  <text x="100" y="200" font-family="Arial, sans-serif" font-size="16" fill="#3C4043">
    <tspan x="100" dy="0">Schedule: 0 * * * * (hourly)</tspan>
    <tspan x="100" dy="28">Concurrency: Forbid</tspan>
    <tspan x="100" dy="28">History: 3 successful, 1 failed</tspan>
  </text>
  
  <!-- Arrow to Job -->
  <line x1="480" y1="210" x2="580" y2="210" stroke="#1E88E5" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <text x="530" y="195" font-family="Arial, sans-serif" font-size="14" fill="#1565C0" text-anchor="middle">Creates</text>
  
  <!-- Job Box -->
  <rect x="600" y="120" width="280" height="180" rx="12" fill="#C8E6C9" stroke="#34A853" stroke-width="3"/>
  <text x="740" y="160" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1E8E3E" text-anchor="middle">Job</text>
  <text x="620" y="200" font-family="Arial, sans-serif" font-size="16" fill="#3C4043">
    <tspan x="620" dy="0">Completions: 1</tspan>
    <tspan x="620" dy="28">Backoff Limit: 3</tspan>
    <tspan x="620" dy="28">TTL: 86400s</tspan>
  </text>
  
  <!-- Arrow to Pod -->
  <line x1="740" y1="300" x2="740" y2="360" stroke="#34A853" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <text x="780" y="335" font-family="Arial, sans-serif" font-size="14" fill="#1E8E3E">Creates</text>
  
  <!-- Pod Box -->
  <rect x="600" y="380" width="280" height="260" rx="12" fill="url(#pod-gradient)" stroke="#326CE5" stroke-width="3"/>
  <text x="740" y="420" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Pod</text>
  
  <!-- Container inside Pod -->
  <rect x="620" y="445" width="240" height="180" rx="8" fill="#1E3A8A" stroke="#FFFFFF" stroke-width="2"/>
  <text x="740" y="475" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">finops-agent</text>
  <text x="630" y="510" font-family="Arial, sans-serif" font-size="14" fill="#BBDEFB">
    <tspan x="630" dy="0">1. Load config from ConfigMap</tspan>
    <tspan x="630" dy="24">2. Read API key from Secret</tspan>
    <tspan x="630" dy="24">3. Scan cluster resources</tspan>
    <tspan x="630" dy="24">4. Call LLM for each resource</tspan>
    <tspan x="630" dy="24">5. Generate report</tspan>
    <tspan x="630" dy="24">6. Exit with code 0</tspan>
  </text>
  
  <!-- ConfigMap and Secret -->
  <g>
    <rect x="930" y="180" width="280" height="100" rx="8" fill="#FFF3E0" stroke="#F57C00" stroke-width="2"/>
    <text x="1070" y="215" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#E65100" text-anchor="middle">ConfigMap</text>
    <text x="950" y="245" font-family="Arial, sans-serif" font-size="15" fill="#3C4043">
      <tspan x="950" dy="0">• LLM config</tspan>
      <tspan x="950" dy="22">• Tagging rules</tspan>
    </text>
  </g>
  
  <g>
    <rect x="930" y="300" width="280" height="100" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
    <text x="1070" y="335" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#6A1B9A" text-anchor="middle">Secret</text>
    <text x="950" y="365" font-family="Arial, sans-serif" font-size="15" fill="#3C4043">
      <tspan x="950" dy="0">• OPENAI_API_KEY</tspan>
      <tspan x="950" dy="22">• External to Helm</tspan>
    </text>
  </g>
  
  <!-- Arrows from ConfigMap/Secret to Pod -->
  <line x1="930" y1="230" x2="880" y2="480" stroke="#F57C00" stroke-width="2" stroke-dasharray="5 3"/>
  <line x1="930" y1="350" x2="880" y2="520" stroke="#9C27B0" stroke-width="2" stroke-dasharray="5 3"/>
  
  <!-- ServiceAccount -->
  <g>
    <rect x="80" y="380" width="280" height="100" rx="8" fill="#E8F5E9" stroke="#34A853" stroke-width="2"/>
    <text x="220" y="415" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1E8E3E" text-anchor="middle">ServiceAccount</text>
    <text x="100" y="445" font-family="Arial, sans-serif" font-size="15" fill="#3C4043">
      <tspan x="100" dy="0">• finops-agent</tspan>
      <tspan x="100" dy="22">• ClusterRole: read-only</tspan>
    </text>
  </g>
  
  <!-- Arrow from ServiceAccount to Pod -->
  <line x1="360" y1="430" x2="600" y2="480" stroke="#34A853" stroke-width="2" stroke-dasharray="5 3"/>
  
  <!-- Bottom note -->
  <text x="640" y="670" font-family="Arial, sans-serif" font-size="18" fill="#028090" text-anchor="middle" font-weight="bold">
    In-cluster execution: No kubeconfig needed, uses ServiceAccount token
  </text>
</svg>
