<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF" />

  <!-- Slide Header -->
  <text x="80" y="90" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#232F3E">04. Structured Outputs with Pydantic</text>
  <text x="80" y="130" font-family="Arial, sans-serif" font-size="20" fill="#607D8B">Molding raw text responses into typed, validated Python structures</text>

  <!-- Left: Raw LLM Output (Unstructured Text) -->
  <g transform="translate(80, 200)">
    <rect width="320" height="340" rx="12" fill="#ECEFF1" stroke="#90A4AE" stroke-width="2" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 L 308 0 A 12 12 0 0 1 320 12 L 320 45 L 0 45 Z" fill="#90A4AE" />
    <text x="160" y="28" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Raw LLM Response String</text>

    <!-- Cloud-like visual of raw text -->
    <path d="M 50 150 C 30 150, 20 130, 40 110 C 30 80, 70 60, 100 80 C 120 50, 170 50, 190 80 C 220 70, 250 90, 240 120 C 260 140, 240 180, 210 170 C 190 200, 140 200, 110 180 C 80 200, 50 180, 50 150 Z" 
          fill="#FFFFFF" stroke="#B0BEC5" stroke-width="2" />
    
    <text x="140" y="115" font-family="Courier New, monospace" font-size="11" fill="#37474F" text-anchor="middle">"This pod is not compliant</text>
    <text x="140" y="132" font-family="Courier New, monospace" font-size="11" fill="#37474F" text-anchor="middle">because owner tag is missing.</text>
    <text x="140" y="149" font-family="Courier New, monospace" font-size="11" fill="#37474F" text-anchor="middle">Create ticket for payments..."</text>

    <!-- Footnote -->
    <text x="160" y="280" font-family="Arial, sans-serif" font-size="14" fill="#607D8B" text-anchor="middle" font-style="italic">Unpredictable Text Layout</text>
  </g>

  <!-- Middle: Pydantic Output Parser (The Mold/Filter) -->
  <g transform="translate(460, 200)">
    <!-- Container for Mold -->
    <rect width="360" height="340" rx="16" fill="#F1F3F4" stroke="#4285F4" stroke-width="2.5" />
    <path d="M 0 16 A 16 16 0 0 1 16 0 L 344 0 A 16 16 0 0 1 360 16 L 360 55 L 0 55 Z" fill="#4285F4" />
    <text x="180" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Pydantic Schema Mold</text>

    <!-- Stencil details (fields) -->
    <g transform="translate(30, 80)">
      <!-- Field 1 -->
      <rect x="0" y="0" width="300" height="40" rx="6" fill="#FFFFFF" stroke="#4285F4" stroke-width="1.5" />
      <text x="15" y="25" font-family="Courier New, monospace" font-size="13" font-weight="bold" fill="#232F3E">is_compliant: <tspan fill="#34A853">bool</tspan></text>
      
      <!-- Field 2 -->
      <rect x="0" y="55" width="300" height="40" rx="6" fill="#FFFFFF" stroke="#4285F4" stroke-width="1.5" />
      <text x="15" y="80" font-family="Courier New, monospace" font-size="13" font-weight="bold" fill="#232F3E">category: <tspan fill="#4285F4">str</tspan></text>

      <!-- Field 3 -->
      <rect x="0" y="110" width="300" height="40" rx="6" fill="#FFFFFF" stroke="#4285F4" stroke-width="1.5" />
      <text x="15" y="135" font-family="Courier New, monospace" font-size="13" font-weight="bold" fill="#232F3E">missing_tags: <tspan fill="#FF9900">List[str]</tspan></text>

      <!-- Field 4 -->
      <rect x="0" y="165" width="300" height="40" rx="6" fill="#FFFFFF" stroke="#4285F4" stroke-width="1.5" />
      <text x="15" y="190" font-family="Courier New, monospace" font-size="13" font-weight="bold" fill="#232F3E">reason: <tspan fill="#4285F4">str</tspan></text>
      
      <!-- Field 5 -->
      <rect x="0" y="220" width="300" height="40" rx="6" fill="#FFFFFF" stroke="#4285F4" stroke-width="1.5" />
      <text x="15" y="245" font-family="Courier New, monospace" font-size="13" font-weight="bold" fill="#232F3E">issue_body: <tspan fill="#4285F4">str</tspan></text>
    </g>
  </g>

  <!-- Connectors -->
  <path d="M 410 370 L 450 370" stroke="#4285F4" stroke-width="4" />
  <path d="M 450 363 L 460 370 L 450 377 Z" fill="#4285F4" />

  <path d="M 830 370 L 870 370" stroke="#34A853" stroke-width="4" />
  <path d="M 870 363 L 880 370 L 870 377 Z" fill="#34A853" />

  <!-- Right: Structured Output Object -->
  <g transform="translate(880, 200)">
    <rect width="320" height="340" rx="12" fill="#E8F5E9" stroke="#34A853" stroke-width="2" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 L 308 0 A 12 12 0 0 1 320 12 L 320 45 L 0 45 Z" fill="#34A853" />
    <text x="160" y="28" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">ResourceDecision Instance</text>

    <!-- Structured fields displayed in container -->
    <g transform="translate(20, 70)">
      <rect x="0" y="0" width="280" height="30" rx="4" fill="#FFFFFF" />
      <text x="15" y="20" font-family="Courier New, monospace" font-size="12" fill="#2E7D32">is_compliant = False</text>

      <rect x="0" y="40" width="280" height="30" rx="4" fill="#FFFFFF" />
      <text x="15" y="60" font-family="Courier New, monospace" font-size="12" fill="#2E7D32">category = "unowned"</text>

      <rect x="0" y="80" width="280" height="30" rx="4" fill="#FFFFFF" />
      <text x="15" y="100" font-family="Courier New, monospace" font-size="12" fill="#2E7D32">missing_tags = ["owner"]</text>

      <rect x="0" y="120" width="280" height="120" rx="4" fill="#FFFFFF" />
      <text x="15" y="140" font-family="Courier New, monospace" font-size="11" fill="#2E7D32">reason = "No owner label"</text>
      <text x="15" y="160" font-family="Courier New, monospace" font-size="11" fill="#607D8B">issue_body = "</text>
      <text x="15" y="178" font-family="Courier New, monospace" font-size="10" fill="#607D8B">### Missing tag details</text>
      <text x="15" y="193" font-family="Courier New, monospace" font-size="10" fill="#607D8B">The pod misses label owner...</text>
    </g>

    <text x="160" y="315" font-family="Arial, sans-serif" font-size="14" fill="#2E7D32" text-anchor="middle" font-weight="bold">Ready for downstream APIs!</text>
  </g>

  <!-- Bottom Goals Summary -->
  <rect x="80" y="600" width="1120" height="70" rx="8" fill="#F1F3F4" />
  <text x="110" y="641" font-family="Arial, sans-serif" font-size="16" fill="#232F3E">
    <tspan font-weight="bold" fill="#4285F4">Why this matters:</tspan> Standard Chat LLMs respond in natural text. To build automated systems, we need structured, parseable schemas. The <tspan font-family="Courier New, monospace" font-weight="bold">PydanticOutputParser</tspan> injects schema instructions into the prompt and validates the output, ensuring a clean interface with the downstream issue tracker services.
  </text>
</svg>
