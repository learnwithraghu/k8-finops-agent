<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <!-- Gradient accents -->
    <linearGradient id="accent-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4285F4"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
    <linearGradient id="accent-orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF9900"/>
      <stop offset="100%" stop-color="#F57C00"/>
    </linearGradient>
    <linearGradient id="accent-green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34A853"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="bridge-gradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4285F4"/>
      <stop offset="40%" stop-color="#FF9900"/>
      <stop offset="100%" stop-color="#34A853"/>
    </linearGradient>
    <linearGradient id="water-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="sky-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F9FF"/>
    </linearGradient>

    <!-- Hexagon Pod/Workload Icon -->
    <g id="icon-pod">
      <polygon points="0,-16 13.86,-8 13.86,8 0,16 -13.86,8 -13.86,-8" fill="none" stroke="#E57373" stroke-width="1.8"/>
      <line x1="0" y1="-16" x2="0" y2="16" stroke="#E57373" stroke-width="1" opacity="0.4"/>
      <line x1="0" y1="0" x2="13.86" y2="8" stroke="#E57373" stroke-width="1" opacity="0.4"/>
      <line x1="0" y1="0" x2="-13.86" y2="8" stroke="#E57373" stroke-width="1" opacity="0.4"/>
    </g>

    <!-- ConfigMap / YAML Document Icon -->
    <g id="icon-cm">
      <path d="M -9,-12 L 3,-12 L 9,-6 L 9,12 L -9,12 Z" fill="none" stroke="#FFB300" stroke-width="1.5"/>
      <path d="M 3,-12 L 3,-6 L 9,-6" fill="none" stroke="#FFB300" stroke-width="1.5"/>
      <line x1="-5" y1="-2" x2="5" y2="-2" stroke="#FFB300" stroke-width="1.2" opacity="0.8"/>
    </g>

    <!-- Brain / Neural Icon -->
    <g id="icon-brain">
      <circle cx="0" cy="0" r="28" fill="none" stroke="#FF9900" stroke-width="2" stroke-dasharray="4 3" opacity="0.5"/>
      <path d="M -14 -7 C -20 -7, -24 3, -14 10 C -18 17, -3 20, 0 10 C 3 20, 18 17, 14 10 C 24 3, 20 -7, 14 -7 C 17 -17, 3 -20, 0 -10 C -3 -20, -17 -17, -14 -7 Z"
            fill="#FFF3E0" stroke="#FF9900" stroke-width="2"/>
      <circle cx="-7" cy="-3" r="2.5" fill="#FF9900"/>
      <circle cx="7" cy="-3" r="2.5" fill="#FF9900"/>
      <circle cx="0" cy="7" r="2.5" fill="#FF9900"/>
      <line x1="-7" y1="-3" x2="7" y2="-3" stroke="#FF9900" stroke-width="1.2"/>
      <line x1="7" y1="-3" x2="0" y2="7" stroke="#FF9900" stroke-width="1.2"/>
      <line x1="-7" y1="-3" x2="0" y2="7" stroke="#FF9900" stroke-width="1.2"/>
    </g>

    <!-- Checkmark Icon -->
    <g id="icon-check">
      <circle cx="0" cy="0" r="8" fill="#34A853"/>
      <path d="M -4 0 L -1 3 L 4 -3" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- Water wave pattern -->
    <pattern id="waves" width="120" height="20" patternUnits="userSpaceOnUse">
      <path d="M 0 10 Q 15 0 30 10 Q 45 20 60 10 Q 75 0 90 10 Q 105 20 120 10" fill="none" stroke="#90CAF9" stroke-width="1.2" opacity="0.6"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#sky-gradient)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#accent-blue)"/>

  <!-- Section Badge -->
  <rect x="80" y="35" width="100" height="28" rx="14" fill="#E8F0FE" stroke="#4285F4" stroke-width="1"/>
  <text x="130" y="54" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#4285F4" text-anchor="middle">SECTION 05</text>

  <!-- Slide Header -->
  <text x="80" y="100" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#232F3E">Bridging K8s Data to FinOps Decisions</text>
  <text x="80" y="135" font-family="Arial, sans-serif" font-size="18" fill="#607D8B">The LLM agent is the bridge that transforms raw cluster metadata into actionable financial operations</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- WATER / CHASM: The Gap between data and decisions      -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="0" y="430" width="1280" height="180" fill="url(#water-gradient)"/>
  <rect x="0" y="430" width="1280" height="180" fill="url(#waves)"/>
  <!-- Water edge highlight -->
  <path d="M 0 430 Q 160 420 320 430 Q 480 440 640 430 Q 800 420 960 430 Q 1120 440 1280 430" fill="none" stroke="#64B5F6" stroke-width="2"/>

  <!-- Chasm labels in water -->
  <text x="280" y="500" font-family="Arial, sans-serif" font-size="14" fill="#1565C0" font-style="italic" text-anchor="middle" opacity="0.7">Manual Triage</text>
  <text x="640" y="520" font-family="Arial, sans-serif" font-size="14" fill="#1565C0" font-style="italic" text-anchor="middle" opacity="0.7">Complexity Gap</text>
  <text x="1000" y="500" font-family="Arial, sans-serif" font-size="14" fill="#1565C0" font-style="italic" text-anchor="middle" opacity="0.7">Context Loss</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LEFT CLIFF: Raw Kubernetes Data                        -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <g transform="translate(50, 200)">
    <!-- Cliff/island -->
    <path d="M 0 230 L 0 180 C 0 160 10 155 30 155 L 250 155 C 270 155 280 165 280 180 L 280 230 Z" fill="#ECEFF1" stroke="#B0BEC5" stroke-width="1.5"/>
    <!-- Grass top -->
    <rect x="0" y="155" width="280" height="6" rx="3" fill="#C8E6C9"/>

    <!-- Data card stack on cliff -->
    <g transform="translate(30, 170)">
      <!-- Card: Cluster -->
      <rect width="220" height="45" rx="8" fill="#E8F0FE" stroke="#4285F4" stroke-width="1.5" transform="translate(0, -145)"/>
      <g transform="translate(12, -135)">
        <!-- K8s wheel mini -->
        <g transform="translate(10, 10) scale(0.35)">
          <path d="M 25 0 L 47 11 L 47 36 L 25 47 L 3 36 L 3 11 Z" fill="#4285F4" opacity="0.2"/>
          <circle cx="25" cy="23" r="5" fill="#4285F4"/>
        </g>
        <text x="30" y="8" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1A73E8">Kind Cluster</text>
        <text x="30" y="24" font-family="Courier New, monospace" font-size="10" fill="#607D8B">Deployments, Services, PVCs</text>
      </g>

      <!-- Card: Raw JSON -->
      <rect width="220" height="45" rx="8" fill="#F8F9FA" stroke="#CFD8DC" stroke-width="1" transform="translate(0, -90)"/>
      <g transform="translate(12, -80)">
        <text x="0" y="8" font-family="Courier New, monospace" font-size="11" fill="#37474F">{"metadata": {"labels": ...}}</text>
        <text x="0" y="24" font-family="Courier New, monospace" font-size="10" fill="#90A4AE">Raw facts, no decisions</text>
      </g>

      <!-- Pod icons floating -->
      <use href="#icon-pod" x="30" y="-30" transform="scale(0.8)"/>
      <use href="#icon-pod" x="80" y="-25" transform="scale(0.7)"/>
      <use href="#icon-pod" x="140" y="-32" transform="scale(0.75)"/>
    </g>

    <!-- Label -->
    <text x="140" y="250" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#232F3E" text-anchor="middle">Raw K8s Metadata</text>
    <text x="140" y="270" font-family="Arial, sans-serif" font-size="12" fill="#607D8B" text-anchor="middle">Unstructured • Uninterpreted</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- RIGHT CLIFF: Actionable FinOps Decisions               -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <g transform="translate(940, 200)">
    <!-- Cliff/island -->
    <path d="M 0 230 L 0 180 C 0 160 10 155 30 155 L 250 155 C 270 155 280 165 280 180 L 280 230 Z" fill="#ECEFF1" stroke="#B0BEC5" stroke-width="1.5"/>
    <rect x="0" y="155" width="280" height="6" rx="3" fill="#C8E6C9"/>

    <!-- Decision cards on cliff -->
    <g transform="translate(20, 170)">
      <!-- Card: Compliance Report -->
      <rect width="240" height="45" rx="8" fill="#E8F5E9" stroke="#34A853" stroke-width="1.5" transform="translate(0, -145)"/>
      <g transform="translate(12, -135)">
        <use href="#icon-check" x="5" y="10"/>
        <text x="22" y="8" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2E7D32">Compliance Decision</text>
        <text x="22" y="24" font-family="Arial, sans-serif" font-size="10" fill="#607D8B">Category, priority, reasoning</text>
      </g>

      <!-- Card: Auto Ticket -->
      <rect width="240" height="45" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1" transform="translate(0, -90)"/>
      <g transform="translate(12, -80)">
        <text x="0" y="8" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#7B1FA2">Auto-Drafted Ticket</text>
        <text x="0" y="24" font-family="Arial, sans-serif" font-size="10" fill="#607D8B">GitHub issue body, owner route</text>
      </g>

      <!-- Output symbols -->
      <use href="#icon-cm" x="40" y="-28" transform="scale(0.9)"/>
      <use href="#icon-check" x="100" y="-30"/>
      <use href="#icon-check" x="160" y="-28"/>
    </g>

    <!-- Label -->
    <text x="140" y="250" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#232F3E" text-anchor="middle">FinOps Decisions</text>
    <text x="140" y="270" font-family="Arial, sans-serif" font-size="12" fill="#607D8B" text-anchor="middle">Structured • Actionable</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- THE BRIDGE: LLM Agent spanning the gap                 -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- Bridge deck -->
  <rect x="320" y="370" width="630" height="14" rx="4" fill="url(#bridge-gradient)"/>
  <!-- Bridge shadow -->
  <rect x="325" y="384" width="620" height="6" rx="3" fill="#E0E0E0" opacity="0.5"/>

  <!-- Bridge arch underneath -->
  <path d="M 340 384 Q 635 480 930 384" fill="none" stroke="#FFB74D" stroke-width="3" stroke-dasharray="8 4"/>

  <!-- Left pillar -->
  <rect x="320" y="370" width="25" height="60" rx="3" fill="#78909C"/>
  <rect x="315" y="365" width="35" height="12" rx="2" fill="#607D8B"/>

  <!-- Right pillar -->
  <rect x="925" y="370" width="25" height="60" rx="3" fill="#78909C"/>
  <rect x="920" y="365" width="35" height="12" rx="2" fill="#607D8B"/>

  <!-- Center pillar (LLM engine) -->
  <rect x="610" y="370" width="50" height="60" rx="3" fill="#FF9900"/>
  <rect x="605" y="365" width="60" height="12" rx="2" fill="#E65100"/>

  <!-- Bridge railing posts -->
  <line x1="370" y1="370" x2="370" y2="350" stroke="#90A4AE" stroke-width="2"/>
  <line x1="440" y1="370" x2="440" y2="350" stroke="#90A4AE" stroke-width="2"/>
  <line x1="510" y1="370" x2="510" y2="350" stroke="#90A4AE" stroke-width="2"/>
  <line x1="580" y1="370" x2="580" y2="350" stroke="#90A4AE" stroke-width="2"/>
  <line x1="690" y1="370" x2="690" y2="350" stroke="#90A4AE" stroke-width="2"/>
  <line x1="760" y1="370" x2="760" y2="350" stroke="#90A4AE" stroke-width="2"/>
  <line x1="830" y1="370" x2="830" y2="350" stroke="#90A4AE" stroke-width="2"/>
  <line x1="900" y1="370" x2="900" y2="350" stroke="#90A4AE" stroke-width="2"/>
  <!-- Top rail -->
  <line x1="345" y1="350" x2="950" y2="350" stroke="#90A4AE" stroke-width="2"/>

  <!-- LLM Brain on bridge center -->
  <g transform="translate(635, 320)">
    <use href="#icon-brain" x="0" y="0" transform="scale(0.9)"/>
  </g>
  <!-- Label on bridge -->
  <rect x="560" y="290" width="150" height="26" rx="13" fill="#FFF3E0" stroke="#FF9900" stroke-width="1.5"/>
  <text x="635" y="308" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#E65100" text-anchor="middle">LLM Agent (LangChain)</text>

  <!-- Data flow arrows on bridge -->
  <!-- Left arrow (data flowing onto bridge) -->
  <path d="M 340 365 L 560 365" stroke="#4285F4" stroke-width="2.5"/>
  <polygon points="555,360 567,365 555,370" fill="#4285F4"/>

  <!-- Right arrow (decisions flowing off bridge) -->
  <path d="M 710 365 L 930 365" stroke="#34A853" stroke-width="2.5"/>
  <polygon points="925,360 937,365 925,370" fill="#34A853"/>

  <!-- Bridge label components on deck -->
  <text x="450" y="362" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle" font-weight="bold">JSON + YAML</text>
  <text x="820" y="362" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle" font-weight="bold">ResourceDecision</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- BOTTOM: Key Takeaway Bar                               -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="80" y="610" width="1120" height="70" rx="12" fill="#F1F3F4" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="80" y="610" width="6" height="70" rx="3" fill="url(#accent-orange)"/>
  <text x="110" y="638" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#E65100">THE METAPHOR</text>
  <text x="110" y="662" font-family="Arial, sans-serif" font-size="15" fill="#37474F">Without the LLM bridge, raw cluster data and FinOps decisions live on separate islands. The LangChain-powered agent bridges the gap — taking raw metadata in and producing structured, actionable compliance decisions out.</text>
</svg>
