<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <g id="lucide-link">
      <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" fill="none" stroke="#028090" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" fill="none" stroke="#028090" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g id="lucide-file-text">
      <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z" fill="none" stroke="#FFB84D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M14 2v4a2 2 0 0 0 2 2h4" fill="none" stroke="#FFB84D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g id="lucide-braces">
      <path d="M8 3H7a2 2 0 0 0-2 2v5a2 2 0 0 1-2 2 2 2 0 0 1 2 2v5a2 2 0 0 0 2 2h1" fill="none" stroke="#02C39A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M16 3h1a2 2 0 0 1 2 2v5a2 2 0 0 0 2 2 2 2 0 0 0-2 2v5a2 2 0 0 1-2 2h-1" fill="none" stroke="#02C39A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g id="lucide-workflow">
      <rect width="8" height="8" x="3" y="3" rx="2" fill="none" stroke="#028090" stroke-width="2"/>
      <path d="M7 11v4a2 2 0 0 0 2 2h4" fill="none" stroke="#028090" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <rect width="8" height="8" x="13" y="13" rx="2" fill="none" stroke="#028090" stroke-width="2"/>
    </g>
  </defs>

  <rect width="1280" height="720" fill="#FFFFFF"/>

  <g id="anim-titlebar">
    <text x="80" y="88" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#232F3E">Why LangChain Wins</text>
    <text x="80" y="128" font-family="Arial, sans-serif" font-size="20" fill="#607D8B">Four pillars for typed FinOps decisions.</text>
  </g>

  <g id="anim-hub" transform="translate(440,250)">
    <ellipse cx="200" cy="140" rx="120" ry="118" fill="#F5FFFC" stroke="#028090" stroke-width="2.5" stroke-linecap="round"/>
    <g transform="translate(176,116) scale(2)">
      <use href="#lucide-link" x="0" y="0" width="24" height="24"/>
    </g>
    <text x="200" y="220" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#232F3E" text-anchor="middle">LangChain</text>
  </g>

  <g id="anim-pillar-1" transform="translate(100,260)">
    <path d="M 4 6 L 228 4 L 230 100 L 6 102 Z" fill="#FAFAFA" stroke="#232F3E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="20" y="58" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#232F3E">Universal adapters</text>
  </g>

  <g id="anim-pillar-2" transform="translate(100,400)">
    <path d="M 6 4 L 230 6 L 228 100 L 4 98 Z" fill="#FFFBF2" stroke="#FFB84D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <use href="#lucide-file-text" x="20" y="34" width="24" height="24"/>
    <text x="54" y="58" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#232F3E">Prompt composition</text>
  </g>

  <g id="anim-pillar-3" transform="translate(950,260)">
    <path d="M 4 6 L 228 4 L 230 100 L 6 102 Z" fill="#F5FFFC" stroke="#02C39A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <use href="#lucide-braces" x="20" y="34" width="24" height="24"/>
    <text x="54" y="58" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#232F3E">Pydantic output</text>
  </g>

  <g id="anim-pillar-4" transform="translate(950,400)">
    <path d="M 6 4 L 230 6 L 228 100 L 4 98 Z" fill="#FAFAFA" stroke="#232F3E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <use href="#lucide-workflow" x="20" y="34" width="24" height="24"/>
    <text x="54" y="58" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#232F3E">Chain execution</text>
  </g>
</svg>
