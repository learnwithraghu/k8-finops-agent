<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=JetBrains+Mono:wght@400;600&amp;display=swap');
      text { font-family: 'Inter', -apple-system, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
    <filter id="card-shadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#1B2559" flood-opacity="0.08"/>
    </filter>
    <pattern id="bg-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#F0F2F5" stroke-width="1"/>
    </pattern>
    <!-- Radial gradient for hub -->
    <radialGradient id="hub-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EBF1FF"/>
      <stop offset="100%" stop-color="#DEEAFF"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect width="1280" height="720" fill="url(#bg-grid)" opacity="0.6"/>
  <rect x="0" y="0" width="6" height="720" fill="#5B8FF9"/>

  <!-- Header -->
  <rect x="40" y="32" width="160" height="28" rx="4" fill="#F0F5FF"/>
  <text x="120" y="51" font-size="12" font-weight="700" fill="#5B8FF9" text-anchor="middle" letter-spacing="1.5">SECTION 05</text>
  <text x="40" y="110" font-size="44" font-weight="800" fill="#141414" letter-spacing="-1">Why LangChain</text>
  <text x="40" y="162" font-size="44" font-weight="800" fill="#5B8FF9" letter-spacing="-1">Wins</text>
  <text x="40" y="200" font-size="17" font-weight="400" fill="#8C8C8C">Four pillars for typed FinOps decisions.</text>
  <line x1="40" y1="222" x2="1240" y2="222" stroke="#F0F2F5" stroke-width="1.5"/>

  <!-- Center Hub -->
  <g id="anim-hub" transform="translate(490, 248)">
    <circle cx="160" cy="200" r="148" fill="#F6F8FF" stroke="#C7D7FF" stroke-width="2"/>
    <circle cx="160" cy="200" r="116" fill="url(#hub-grad)" stroke="#5B8FF9" stroke-width="1.5" stroke-dasharray="6 4"/>
    <circle cx="160" cy="200" r="72" fill="#5B8FF9" opacity="0.1"/>
    <!-- Chain icon simplified -->
    <circle cx="145" cy="188" r="18" fill="none" stroke="#5B8FF9" stroke-width="4"/>
    <circle cx="175" cy="212" r="18" fill="none" stroke="#5B8FF9" stroke-width="4"/>
    <line x1="158" y1="200" x2="162" y2="200" stroke="#5B8FF9" stroke-width="4"/>
    <text x="160" y="256" font-size="22" font-weight="800" fill="#141414" text-anchor="middle">LangChain</text>
    <text x="160" y="278" font-size="11" font-weight="700" fill="#5B8FF9" text-anchor="middle" letter-spacing="2">ENGINE CORE</text>
  </g>

  <!-- Connector lines from hub to pillars -->
  <!-- To pillar 1 (top-left) -->
  <line x1="490" y1="358" x2="420" y2="310" stroke="#5B8FF9" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.5"/>
  <!-- To pillar 2 (bottom-left) -->
  <line x1="490" y1="430" x2="420" y2="480" stroke="#FF6B35" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.5"/>
  <!-- To pillar 3 (top-right) -->
  <line x1="810" y1="358" x2="870" y2="310" stroke="#52C41A" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.5"/>
  <!-- To pillar 4 (bottom-right) -->
  <line x1="810" y1="430" x2="870" y2="480" stroke="#722ED1" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.5"/>

  <!-- ── Pillar 1: Universal Adapters (top-left) ── -->
  <g id="anim-pillar-1" transform="translate(40, 258)" filter="url(#card-shadow)">
    <rect width="380" height="140" rx="12" fill="#FFFFFF" stroke="#F0F2F5" stroke-width="1.5"/>
    <rect width="380" height="8" rx="4" fill="#5B8FF9"/>
    <!-- Number badge -->
    <circle cx="40" cy="54" r="20" fill="#F0F5FF"/>
    <text x="40" y="60" font-size="16" font-weight="800" fill="#5B8FF9" text-anchor="middle">01</text>
    <!-- Content -->
    <text x="74" y="44" font-size="17" font-weight="700" fill="#262626">Universal Adapters</text>
    <text x="74" y="64" font-size="13" font-weight="400" fill="#8C8C8C">ChatOpenAI + base_url → any endpoint</text>
    <!-- Tag chips -->
    <rect x="40" y="88" width="90" height="24" rx="6" fill="#F0F5FF"/>
    <text x="85" y="105" font-size="11" font-weight="600" fill="#5B8FF9" text-anchor="middle">base_url</text>
    <rect x="142" y="88" width="110" height="24" rx="6" fill="#F0F5FF"/>
    <text x="197" y="105" font-size="11" font-weight="600" fill="#5B8FF9" text-anchor="middle">ChatOpenAI</text>
    <rect x="264" y="88" width="96" height="24" rx="6" fill="#F0F5FF"/>
    <text x="312" y="105" font-size="11" font-weight="600" fill="#5B8FF9" text-anchor="middle">any model</text>
  </g>

  <!-- ── Pillar 2: Prompt Composition (bottom-left) ── -->
  <g id="anim-pillar-2" transform="translate(40, 428)" filter="url(#card-shadow)">
    <rect width="380" height="140" rx="12" fill="#FFFFFF" stroke="#F0F2F5" stroke-width="1.5"/>
    <rect width="380" height="8" rx="4" fill="#FF6B35"/>
    <circle cx="40" cy="54" r="20" fill="#FFF5F0"/>
    <text x="40" y="60" font-size="16" font-weight="800" fill="#FF6B35" text-anchor="middle">02</text>
    <text x="74" y="44" font-size="17" font-weight="700" fill="#262626">Prompt Composition</text>
    <text x="74" y="64" font-size="13" font-weight="400" fill="#8C8C8C">Inject K8s variables into PROMPT_TEMPLATE</text>
    <rect x="40" y="88" width="120" height="24" rx="6" fill="#FFF5F0"/>
    <text x="100" y="105" font-size="11" font-weight="600" fill="#FF6B35" text-anchor="middle">PROMPT_TEMPLATE</text>
    <rect x="172" y="88" width="100" height="24" rx="6" fill="#FFF5F0"/>
    <text x="222" y="105" font-size="11" font-weight="600" fill="#FF6B35" text-anchor="middle">tagging-rules</text>
    <rect x="284" y="88" width="76" height="24" rx="6" fill="#FFF5F0"/>
    <text x="322" y="105" font-size="11" font-weight="600" fill="#FF6B35" text-anchor="middle">K8s facts</text>
  </g>

  <!-- ── Pillar 3: Pydantic Output (top-right) ── -->
  <g id="anim-pillar-3" transform="translate(880, 258)" filter="url(#card-shadow)">
    <rect width="360" height="140" rx="12" fill="#FFFFFF" stroke="#F0F2F5" stroke-width="1.5"/>
    <rect width="360" height="8" rx="4" fill="#52C41A"/>
    <circle cx="40" cy="54" r="20" fill="#F6FFE6"/>
    <text x="40" y="60" font-size="16" font-weight="800" fill="#52C41A" text-anchor="middle">03</text>
    <text x="74" y="44" font-size="17" font-weight="700" fill="#262626">Pydantic Output</text>
    <text x="74" y="64" font-size="13" font-weight="400" fill="#8C8C8C">ResourceDecision typed schema → safe JSON</text>
    <rect x="40" y="88" width="140" height="24" rx="6" fill="#F6FFE6"/>
    <text x="110" y="105" font-size="11" font-weight="600" fill="#52C41A" text-anchor="middle">ResourceDecision</text>
    <rect x="192" y="88" width="80" height="24" rx="6" fill="#F6FFE6"/>
    <text x="232" y="105" font-size="11" font-weight="600" fill="#52C41A" text-anchor="middle">is_compliant</text>
    <rect x="284" y="88" width="56" height="24" rx="6" fill="#F6FFE6"/>
    <text x="312" y="105" font-size="11" font-weight="600" fill="#52C41A" text-anchor="middle">priority</text>
  </g>

  <!-- ── Pillar 4: Chain Execution (bottom-right) ── -->
  <g id="anim-pillar-4" transform="translate(880, 428)" filter="url(#card-shadow)">
    <rect width="360" height="140" rx="12" fill="#FFFFFF" stroke="#F0F2F5" stroke-width="1.5"/>
    <rect width="360" height="8" rx="4" fill="#722ED1"/>
    <circle cx="40" cy="54" r="20" fill="#F9F0FF"/>
    <text x="40" y="60" font-size="16" font-weight="800" fill="#722ED1" text-anchor="middle">04</text>
    <text x="74" y="44" font-size="17" font-weight="700" fill="#262626">Chain Execution</text>
    <text x="74" y="64" font-size="13" font-weight="400" fill="#8C8C8C">prompt | llm | parser — one call per resource</text>
    <rect x="40" y="88" width="80" height="24" rx="6" fill="#F9F0FF"/>
    <text x="80" y="105" font-size="11" font-weight="600" fill="#722ED1" text-anchor="middle">prompt</text>
    <text x="136" y="105" font-size="16" fill="#BFBFBF" text-anchor="middle">|</text>
    <rect x="152" y="88" width="56" height="24" rx="6" fill="#F9F0FF"/>
    <text x="180" y="105" font-size="11" font-weight="600" fill="#722ED1" text-anchor="middle">llm</text>
    <text x="220" y="105" font-size="16" fill="#BFBFBF" text-anchor="middle">|</text>
    <rect x="232" y="88" width="76" height="24" rx="6" fill="#F9F0FF"/>
    <text x="270" y="105" font-size="11" font-weight="600" fill="#722ED1" text-anchor="middle">parser</text>
  </g>

  <!-- Bottom insight bar -->
  <g transform="translate(40, 612)" filter="url(#card-shadow)">
    <rect width="1200" height="68" rx="12" fill="#5B8FF9"/>
    <text x="600" y="34" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">📌 Change YAML, not Python. Policy updates never touch the chain code.</text>
    <text x="600" y="56" font-size="13" font-weight="400" fill="rgba(255,255,255,0.8)" text-anchor="middle">Universal adapter · Typed composition · Pydantic schema · Per-resource loop</text>
  </g>

  <text x="1220" y="700" font-size="13" font-weight="500" fill="#BFBFBF" text-anchor="end">3 / 9</text>
</svg>
