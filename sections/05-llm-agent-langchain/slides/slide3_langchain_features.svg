<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF" />
  
  <defs>
    <!-- LangChain Logo -->
    <g id="icon-langchain" transform="scale(1.5) translate(-12, -12)">
      <path d="M7.531 15.976a7.534 7.534 0 000-10.651L2.206 0A7.537 7.537 0 000 5.326c0 1.996.794 3.913 2.206 5.325l5.325 5.325zM18.674 16.469a7.535 7.535 0 00-10.65 0l5.325 5.325a7.536 7.536 0 0010.651 0l-5.326-5.325zM2.218 21.782a7.536 7.536 0 005.326 2.206v-7.531H.012c0 1.996.795 3.914 2.206 5.325zM20.73 8.595a7.534 7.534 0 00-10.651.001l5.325 5.326 5.326-5.327z" fill="#1E88E5"/>
    </g>
    
    <!-- Plug/Adapter Icon -->
    <g id="icon-adapter">
      <rect x="-8" y="-12" width="16" height="14" rx="2" fill="none" stroke="#4285F4" stroke-width="2" />
      <line x1="-4" y1="-12" x2="-4" y2="-18" stroke="#4285F4" stroke-width="2" />
      <line x1="4" y1="-12" x2="4" y2="-18" stroke="#4285F4" stroke-width="2" />
      <line x1="0" y1="2" x2="0" y2="12" stroke="#4285F4" stroke-width="2" />
    </g>

    <!-- Schema/Pydantic Icon -->
    <g id="icon-schema">
      <rect x="-10" y="-12" width="20" height="24" rx="2" fill="none" stroke="#34A853" stroke-width="2" />
      <line x1="-5" y1="-6" x2="5" y2="-6" stroke="#34A853" stroke-width="2" />
      <line x1="-5" y1="0" x2="5" y2="0" stroke="#34A853" stroke-width="2" />
      <line x1="-5" y1="6" x2="2" y2="6" stroke="#34A853" stroke-width="2" />
    </g>

    <!-- Chains/Link Icon -->
    <g id="icon-chain">
      <path d="M -6,0 A 6,6 0 0,0 2,0" fill="none" stroke="#FF9900" stroke-width="2" stroke-linecap="round" />
      <path d="M -2,0 A 6,6 0 0,0 6,0" fill="none" stroke="#FF9900" stroke-width="2" stroke-linecap="round" />
    </g>

  </defs>

  <!-- Title -->
  <text x="80" y="80" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#232F3E">Why LangChain for FinOps?</text>
  <text x="80" y="120" font-family="Arial, sans-serif" font-size="20" fill="#607D8B">Key features that power our decision engine</text>

  <!-- Center Hub -->
  <g transform="translate(640, 360)">
    <circle cx="0" cy="0" r="80" fill="#E8F0FE" stroke="#4285F4" stroke-width="3" />
    <use href="#icon-langchain" x="0" y="-10" transform="scale(1.5)" />
    <text x="0" y="45" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1E88E5" text-anchor="middle">LangChain</text>
  </g>

  <!-- Feature 1: Universal Adapters -->
  <g transform="translate(300, 200)">
    <!-- Connection Line -->
    <path d="M 120,80 L 280,140" fill="none" stroke="#CFD8DC" stroke-width="3" stroke-dasharray="8,8" />
    <rect x="-20" y="-20" width="280" height="140" rx="8" fill="#F8F9FA" stroke="#CFD8DC" stroke-width="1.5" />
    <circle cx="20" cy="20" r="24" fill="#E8F0FE" />
    <use href="#icon-adapter" x="20" y="25" />
    <text x="60" y="25" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#232F3E">Model Agnostic</text>
    <text x="20" y="70" font-family="Arial, sans-serif" font-size="16" fill="#607D8B">Switch between OpenAI,</text>
    <text x="20" y="95" font-family="Arial, sans-serif" font-size="16" fill="#607D8B">Anthropic, or Local models</text>
    <text x="20" y="120" font-family="Arial, sans-serif" font-size="16" fill="#607D8B">with just a .env variable.</text>
  </g>

  <!-- Feature 2: Structured Outputs -->
  <g transform="translate(740, 200)">
    <!-- Connection Line -->
    <path d="M 160,80 L 0,140" fill="none" stroke="#CFD8DC" stroke-width="3" stroke-dasharray="8,8" />
    <rect x="20" y="-20" width="280" height="140" rx="8" fill="#F8F9FA" stroke="#CFD8DC" stroke-width="1.5" />
    <circle cx="60" cy="20" r="24" fill="#E8F5E9" />
    <use href="#icon-schema" x="60" y="20" />
    <text x="100" y="25" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#232F3E">Structured Outputs</text>
    <text x="60" y="70" font-family="Arial, sans-serif" font-size="16" fill="#607D8B">Pydantic parsers force</text>
    <text x="60" y="95" font-family="Arial, sans-serif" font-size="16" fill="#607D8B">LLMs to reply in strictly</text>
    <text x="60" y="120" font-family="Arial, sans-serif" font-size="16" fill="#607D8B">typed JSON objects.</text>
  </g>

  <!-- Feature 3: Prompt Templates -->
  <g transform="translate(300, 480)">
    <!-- Connection Line -->
    <path d="M 120,40 L 280,-40" fill="none" stroke="#CFD8DC" stroke-width="3" stroke-dasharray="8,8" />
    <rect x="-20" y="-20" width="280" height="140" rx="8" fill="#F8F9FA" stroke="#CFD8DC" stroke-width="1.5" />
    <circle cx="20" cy="20" r="24" fill="#FFF3E0" />
    <use href="#icon-chain" x="20" y="20" />
    <text x="60" y="25" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#232F3E">Prompt Composition</text>
    <text x="20" y="70" font-family="Arial, sans-serif" font-size="16" fill="#607D8B">Easily inject variables like</text>
    <text x="20" y="95" font-family="Arial, sans-serif" font-size="16" fill="#607D8B">{k8s_metadata} into</text>
    <text x="20" y="120" font-family="Arial, sans-serif" font-size="16" fill="#607D8B">reusable instructions.</text>
  </g>

  <!-- Feature 4: Tool Calling -->
  <g transform="translate(740, 480)">
    <!-- Connection Line -->
    <path d="M 160,40 L 0,-40" fill="none" stroke="#CFD8DC" stroke-width="3" stroke-dasharray="8,8" />
    <rect x="20" y="-20" width="280" height="140" rx="8" fill="#F8F9FA" stroke="#CFD8DC" stroke-width="1.5" />
    <circle cx="60" cy="20" r="24" fill="#FCE4EC" />
    <!-- Tool Icon -->
    <g transform="translate(60, 20)">
      <path d="M -8,8 L -2,2 M 2,-2 L 8,-8 M -2,2 A 4,4 0 1,0 2,-2" fill="none" stroke="#E91E63" stroke-width="2" />
    </g>
    <text x="100" y="25" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#232F3E">Tool Execution</text>
    <text x="60" y="70" font-family="Arial, sans-serif" font-size="16" fill="#607D8B">Built-in ability to trigger</text>
    <text x="60" y="95" font-family="Arial, sans-serif" font-size="16" fill="#607D8B">external APIs (e.g. GitHub</text>
    <text x="60" y="120" font-family="Arial, sans-serif" font-size="16" fill="#607D8B">issues) from LLM output.</text>
  </g>

</svg>
