      <path d="M14 17H5" fill="none" stroke="#028090" stroke-width="2" stroke-linecap="round"/>
      <circle cx="17" cy="17" r="3" fill="none" stroke="#028090" stroke-width="2"/>
      <circle cx="7" cy="7" r="3" fill="none" stroke="#028090" stroke-width="2"/>
    </g>
    <g id="lucide-sparkles">
      <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z" fill="none" stroke="#02C39A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </defs>

  <rect width="1280" height="720" fill="#FFFFFF"/>

  <g id="anim-titlebar">
    <text x="80" y="88" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#232F3E">Prompt Beats Parsers</text>
    <text x="80" y="128" font-family="Arial, sans-serif" font-size="20" fill="#607D8B">Fuse role, policy, and facts into one LLM request.</text>
  </g>

  <g id="anim-input-system" transform="translate(80,240)">
    <path d="M 6 4 L 268 6 L 270 88 L 4 90 Z" fill="#FAFAFA" stroke="#232F3E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <use href="#lucide-settings-2" x="24" y="24" width="28" height="28"/>
    <text x="64" y="52" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#232F3E">system prompt</text>
  </g>

  <g id="anim-input-yaml" transform="translate(80,360)">
    <path d="M 4 6 L 270 4 L 268 88 L 6 90 Z" fill="#FFFBF2" stroke="#FFB84D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <use href="#lucide-file-text" x="24" y="24" width="28" height="28"/>
    <text x="64" y="52" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#232F3E">tagging-rules.yaml</text>
  </g>

  <g id="anim-input-facts" transform="translate(80,480)">
    <path d="M 6 4 L 268 6 L 270 88 L 4 90 Z" fill="#FAFAFA" stroke="#232F3E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <use href="#lucide-brain" x="24" y="24" width="28" height="28"/>
    <text x="64" y="52" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#232F3E">resource facts</text>
  </g>

  <g id="anim-arrow-1">
    <path d="M 358 282 C 420 300 460 320 500 340" fill="none" stroke="#028090" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 500 340 L 484 328 L 486 352 Z" fill="#028090"/>
  </g>
  <g id="anim-arrow-2">
    <path d="M 358 404 L 500 404" fill="none" stroke="#FFB84D" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 500 404 L 484 392 L 484 416 Z" fill="#FFB84D"/>
  </g>
  <g id="anim-arrow-3">
    <path d="M 358 526 C 420 508 460 488 500 468" fill="none" stroke="#028090" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 500 468 L 486 456 L 488 480 Z" fill="#028090"/>
  </g>

  <g id="anim-reactor" transform="translate(520,280)">
    <ellipse cx="150" cy="150" rx="138" ry="134" fill="#F5FFFC" stroke="#028090" stroke-width="2.5" stroke-linecap="round"/>
    <ellipse cx="150" cy="150" rx="88" ry="86" fill="none" stroke="#02C39A" stroke-width="2" stroke-dasharray="6 5"/>
    <g transform="translate(126,126) scale(2)">
      <use href="#lucide-brain" x="0" y="0" width="24" height="24"/>
    </g>
    <text x="150" y="248" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#232F3E" text-anchor="middle">PROMPT_TEMPLATE</text>
  </g>

  <g id="anim-output" transform="translate(900,300)">
    <path d="M 6 4 L 258 6 L 260 238 L 4 240 Z" fill="#FAFAFA" stroke="#232F3E" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <use href="#lucide-sparkles" x="24" y="24" width="28" height="28"/>
    <text x="64" y="48" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#232F3E">LLM decision</text>
    <text x="28" y="100" font-family="Arial, sans-serif" font-size="16" fill="#232F3E">verdict</text>
    <text x="28" y="136" font-family="Arial, sans-serif" font-size="16" fill="#232F3E">issue draft</text>
    <text x="28" y="172" font-family="Arial, sans-serif" font-size="16" fill="#232F3E">owner routing</text>
    <path d="M 24 196 L 230 194 L 232 222 L 22 224 Z" fill="#E8FBF6" stroke="#02C39A" stroke-width="1.8" stroke-linecap="round"/>
    <text x="128" y="214" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#028090" text-anchor="middle">change YAML, not code</text>
  </g>
