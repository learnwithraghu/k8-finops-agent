<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=JetBrains+Mono:wght@400;600&amp;display=swap');
      text { font-family: 'Inter', -apple-system, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
    <filter id="card-shadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#1B2559" flood-opacity="0.08"/>
    </filter>
    <filter id="output-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#FAAD14" flood-opacity="0.3"/>
    </filter>
    <pattern id="bg-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#F0F2F5" stroke-width="1"/>
    </pattern>
    <!-- Arrow marker -->
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5B8FF9"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FAAD14"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF6B35"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect width="1280" height="720" fill="url(#bg-grid)" opacity="0.6"/>
  <rect x="0" y="0" width="6" height="720" fill="#5B8FF9"/>

  <!-- Header -->
  <rect x="40" y="32" width="160" height="28" rx="4" fill="#F0F5FF"/>
  <text x="120" y="51" font-size="12" font-weight="700" fill="#5B8FF9" text-anchor="middle" letter-spacing="1.5">SECTION 05</text>
  <text x="40" y="110" font-size="44" font-weight="800" fill="#141414" letter-spacing="-1">Prompt Beats</text>
  <text x="40" y="162" font-size="44" font-weight="800" fill="#5B8FF9" letter-spacing="-1">Parsers</text>
  <text x="40" y="200" font-size="17" font-weight="400" fill="#8C8C8C">Fuse role, policy, and facts into one LLM request.</text>
  <line x1="40" y1="222" x2="1240" y2="222" stroke="#F0F2F5" stroke-width="1.5"/>

  <!-- Flow layout: 3 inputs → Reactor → Output -->

  <!-- ── Input 1: System Prompt ── -->
  <g id="anim-input-system" transform="translate(40, 264)" filter="url(#card-shadow)">
    <rect width="280" height="100" rx="12" fill="#FFFFFF" stroke="#5B8FF9" stroke-width="1.5"/>
    <rect width="280" height="8" rx="4" fill="#5B8FF9"/>
    <!-- Settings icon area -->
    <rect x="16" y="24" width="44" height="44" rx="8" fill="#F0F5FF"/>
    <line x1="28" y1="38" x2="48" y2="38" stroke="#5B8FF9" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="38" cy="38" r="5" fill="#FFFFFF" stroke="#5B8FF9" stroke-width="2"/>
    <line x1="28" y1="52" x2="48" y2="52" stroke="#5B8FF9" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="44" cy="52" r="5" fill="#FFFFFF" stroke="#5B8FF9" stroke-width="2"/>
    <text x="74" y="36" font-size="15" font-weight="700" fill="#262626">System Prompt</text>
    <text x="74" y="54" font-size="12" font-weight="400" fill="#8C8C8C">Agent persona &amp; role</text>
    <rect x="16" y="78" width="90" height="16" rx="4" fill="#F0F5FF"/>
    <text x="61" y="91" font-size="10" font-weight="600" fill="#5B8FF9" text-anchor="middle">THE CATALYST</text>
  </g>

  <!-- ── Input 2: Tagging Rules YAML ── -->
  <g id="anim-input-yaml" transform="translate(40, 388)" filter="url(#card-shadow)">
    <rect width="280" height="100" rx="12" fill="#FFFFFF" stroke="#FF6B35" stroke-width="1.5"/>
    <rect width="280" height="8" rx="4" fill="#FF6B35"/>
    <rect x="16" y="24" width="44" height="44" rx="8" fill="#FFF5F0"/>
    <path d="M28 32 L52 32 M28 40 L52 40 M28 48 L44 48" stroke="#FF6B35" stroke-width="2.5" stroke-linecap="round"/>
    <text x="74" y="36" font-size="15" font-weight="700" fill="#262626">tagging-rules.yaml</text>
    <text x="74" y="54" font-size="12" font-weight="400" fill="#8C8C8C">Compliance policy mold</text>
    <rect x="16" y="78" width="80" height="16" rx="4" fill="#FFF5F0"/>
    <text x="56" y="91" font-size="10" font-weight="600" fill="#FF6B35" text-anchor="middle">THE MOLD</text>
  </g>

  <!-- ── Input 3: Resource Facts ── -->
  <g id="anim-input-facts" transform="translate(40, 512)" filter="url(#card-shadow)">
    <rect width="280" height="100" rx="12" fill="#FFFFFF" stroke="#722ED1" stroke-width="1.5"/>
    <rect width="280" height="8" rx="4" fill="#722ED1"/>
    <rect x="16" y="24" width="44" height="44" rx="8" fill="#F9F0FF"/>
    <!-- Hexagon pod icon -->
    <polygon points="38,28 50,34 50,46 38,52 26,46 26,34" fill="none" stroke="#722ED1" stroke-width="2.5"/>
    <circle cx="38" cy="40" r="4" fill="#722ED1"/>
    <text x="74" y="36" font-size="15" font-weight="700" fill="#262626">Resource Facts</text>
    <text x="74" y="54" font-size="12" font-weight="400" fill="#8C8C8C">Live cluster metadata</text>
    <rect x="16" y="78" width="76" height="16" rx="4" fill="#F9F0FF"/>
    <text x="54" y="91" font-size="10" font-weight="600" fill="#722ED1" text-anchor="middle">RAW ORE</text>
  </g>

  <!-- Connector arrows (curved paths) to reactor -->
  <path d="M 320 314 C 440 314 480 380 550 400" fill="none" stroke="#5B8FF9" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <path d="M 320 438 C 440 438 480 420 550 400" fill="none" stroke="#FF6B35" stroke-width="2.5" marker-end="url(#arrow-orange)"/>
  <path d="M 320 562 C 440 562 480 460 550 400" fill="none" stroke="#722ED1" stroke-width="2.5"/>
  <!-- Purple arrow head -->
  <polygon points="543,395 557,400 543,405" fill="#722ED1"/>

  <!-- ── Center: PROMPT_TEMPLATE Reactor ── -->
  <g id="anim-reactor" transform="translate(525, 280)" filter="url(#card-shadow)">
    <circle cx="160" cy="160" r="148" fill="#FFFBE6" stroke="#FAAD14" stroke-width="2.5"/>
    <circle cx="160" cy="160" r="118" fill="#FFF7CC" stroke="#FAAD14" stroke-width="1.5" stroke-dasharray="6 5"/>
    <circle cx="160" cy="160" r="78" fill="#FFE066" opacity="0.5"/>
    <!-- Sparkles icon -->
    <path d="M150 128 L154 148 L160 142 L166 148 L170 128" fill="none" stroke="#D4880A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M136 155 L156 155" stroke="#D4880A" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M164 155 L184 155" stroke="#D4880A" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="160" cy="148" r="6" fill="#D4880A"/>
    <text x="160" y="196" font-size="18" font-weight="800" fill="#7C5000" text-anchor="middle">PROMPT_TEMPLATE</text>
    <text x="160" y="214" font-size="11" font-weight="700" fill="#D4880A" text-anchor="middle" letter-spacing="2">CRUCIBLE</text>
    <!-- Bubbles -->
    <circle cx="130" cy="140" r="5" fill="#FAAD14" opacity="0.6"/>
    <circle cx="148" cy="128" r="7" fill="#FAAD14" opacity="0.5"/>
    <circle cx="172" cy="132" r="4" fill="#FAAD14" opacity="0.5"/>
    <circle cx="190" cy="145" r="6" fill="#FAAD14" opacity="0.6"/>
  </g>

  <!-- Arrow from reactor to output -->
  <line x1="836" y1="440" x2="908" y2="440" stroke="#52C41A" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <polygon points="900,433 914,440 900,447" fill="#52C41A"/>

  <!-- ── Right: Output Coin/Badge ── -->
  <g id="anim-output" transform="translate(916, 276)" filter="url(#output-glow)">
    <rect width="328" height="328" rx="164" fill="#F6FFED" stroke="#52C41A" stroke-width="3"/>
    <circle cx="164" cy="164" r="128" fill="none" stroke="#52C41A" stroke-width="1" stroke-dasharray="5 5"/>
    <!-- Star badge inner -->
    <circle cx="164" cy="164" r="88" fill="#D9F7BE"/>
    <!-- Checkmark -->
    <circle cx="164" cy="140" r="24" fill="#52C41A"/>
    <path d="M152 140 L161 150 L178 132" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="164" y="180" font-size="17" font-weight="800" fill="#237804" text-anchor="middle">LLM Decision</text>
    <!-- Tags -->
    <rect x="80" y="192" width="76" height="22" rx="6" fill="#52C41A"/>
    <text x="118" y="208" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">verdict</text>
    <rect x="168" y="192" width="66" height="22" rx="6" fill="#52C41A"/>
    <text x="201" y="208" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">draft</text>
    <rect x="112" y="222" width="60" height="22" rx="6" fill="#52C41A"/>
    <text x="142" y="238" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">route</text>
    <!-- Bottom badge -->
    <rect x="60" y="254" width="208" height="28" rx="14" fill="#FFFBE6" stroke="#FAAD14" stroke-width="1.5"/>
    <text x="164" y="273" font-size="10" font-weight="800" fill="#7C5000" text-anchor="middle" letter-spacing="1">CHANGE YAML, NOT CODE</text>
  </g>

  <!-- Bottom insight banner -->
  <g transform="translate(40, 654)" filter="url(#card-shadow)">
    <rect width="800" height="48" rx="10" fill="#141414"/>
    <text x="400" y="29" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">Policy changes? Update tagging-rules.yaml — zero Python code changes needed.</text>
  </g>

  <text x="1220" y="700" font-size="13" font-weight="500" fill="#BFBFBF" text-anchor="end">6 / 9</text>
</svg>
