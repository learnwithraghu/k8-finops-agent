<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF" />

  <!-- Slide Header -->
  <text x="80" y="90" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#232F3E">02. The Universal LLM Adapter</text>
  <text x="80" y="130" font-family="Arial, sans-serif" font-size="20" fill="#607D8B">Using custom Base URLs to target any OpenAI-compliant API</text>

  <!-- Left: The .env Config File -->
  <g transform="translate(80, 200)">
    <!-- Browser/IDE Container -->
    <rect width="440" height="340" rx="10" fill="#263238" />
    <!-- Header Bar -->
    <path d="M 0 10 A 10 10 0 0 1 10 0 L 430 0 A 10 10 0 0 1 440 10 L 440 35 L 0 35 Z" fill="#37474F" />
    <circle cx="20" cy="17" r="6" fill="#EF5350" />
    <circle cx="40" cy="17" r="6" fill="#FFB74D" />
    <circle cx="60" cy="17" r="6" fill="#81C784" />
    <text x="220" y="22" font-family="Arial, sans-serif" font-size="14" fill="#B0BEC5" text-anchor="middle">.env (Environment File)</text>

    <!-- Code Content -->
    <g transform="translate(25, 75)">
      <!-- Highlighted base URL -->
      <rect x="-5" y="-5" width="400" height="34" rx="4" fill="#37474F" stroke="#FF9900" stroke-width="1.5" />
      <text x="0" y="18" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#FF9900">OPENAI_BASE_URL=https://api.ai.kodekloud.com/v1</text>
      
      <text x="0" y="55" font-family="Courier New, monospace" font-size="14" fill="#ECEFF1">OPENAI_API_KEY=kk_sk_...</text>
      
      <rect x="-5" y="80" width="400" height="34" rx="4" fill="#37474F" stroke="#4285F4" stroke-width="1.5" />
      <text x="0" y="103" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#4285F4">OPENAI_MODEL_ID=gpt-4o</text>
      
      <text x="0" y="145" font-family="Courier New, monospace" font-size="14" fill="#B0BEC5">OPENAI_MAX_TOKENS=1024</text>
      <text x="0" y="185" font-family="Courier New, monospace" font-size="14" fill="#B0BEC5">OPENAI_TEMPERATURE=0.3</text>
    </g>

    <text x="220" y="315" font-family="Arial, sans-serif" font-size="14" fill="#FF9900" text-anchor="middle" font-weight="bold">Zero Code Changes Needed to Switch Endpoints!</text>
  </g>

  <!-- Middle: Universal Adapter Plug Metaphor -->
  <g transform="translate(560, 270)">
    <!-- Base client box -->
    <rect x="0" y="40" width="160" height="120" rx="8" fill="#F1F3F4" stroke="#4285F4" stroke-width="2.5" />
    <text x="80" y="75" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#232F3E" text-anchor="middle">LangChain Client</text>
    <text x="80" y="95" font-family="Courier New, monospace" font-size="12" fill="#607D8B" text-anchor="middle">ChatOpenAI()</text>
    <text x="80" y="125" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#34A853" text-anchor="middle">base_url config</text>
    <text x="80" y="142" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#34A853" text-anchor="middle">api_key config</text>

    <!-- Adapter Plug lines branching out -->
    <path d="M 160 80 Q 230 40 280 10" fill="none" stroke="#90A4AE" stroke-width="3" stroke-dasharray="4 4" />
    <path d="M 160 100 L 280 100" fill="none" stroke="#4285F4" stroke-width="4" />
    <path d="M 160 120 Q 230 160 280 190" fill="none" stroke="#90A4AE" stroke-width="3" stroke-dasharray="4 4" />
  </g>

  <!-- Right: Target Sockets/Destinations -->
  <g transform="translate(880, 200)">
    <!-- Target 1: OpenAI Official -->
    <g transform="translate(0, 0)">
      <rect width="320" height="70" rx="8" fill="#F8F9FA" stroke="#CFD8DC" stroke-width="1.5" />
      <circle cx="35" cy="35" r="15" fill="#ECEFF1" stroke="#90A4AE" stroke-width="1.5" />
      <text x="35" y="40" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#90A4AE" text-anchor="middle">O</text>
      <text x="70" y="32" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#232F3E">OpenAI Cloud</text>
      <text x="70" y="50" font-family="Courier New, monospace" font-size="11" fill="#607D8B">api.openai.com/v1</text>
    </g>

    <!-- Target 2: KodeKloud AI Gateway (Active) -->
    <g transform="translate(0, 90)">
      <rect width="320" height="80" rx="8" fill="#E8F0FE" stroke="#4285F4" stroke-width="2.5" />
      
      <!-- Check badge -->
      <circle cx="35" cy="40" r="18" fill="#4285F4" />
      <!-- Small checkmark -->
      <path d="M 28 40 L 33 45 L 43 35" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" />

      <text x="70" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1A73E8">KodeKloud AI Gateway</text>
      <text x="70" y="55" font-family="Courier New, monospace" font-size="11" font-weight="bold" fill="#1A73E8">api.ai.kodekloud.com/v1</text>
      
      <!-- Tag / Active -->
      <rect x="220" y="10" width="90" height="20" rx="4" fill="#34A853" />
      <text x="265" y="24" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">ACTIVE STAGE</text>
    </g>

    <!-- Target 3: Local/Private Sandbox -->
    <g transform="translate(0, 190)">
      <rect width="320" height="70" rx="8" fill="#F8F9FA" stroke="#CFD8DC" stroke-width="1.5" />
      <circle cx="35" cy="35" r="15" fill="#ECEFF1" stroke="#90A4AE" stroke-width="1.5" />
      <text x="35" y="40" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#90A4AE" text-anchor="middle">Loc</text>
      <text x="70" y="32" font-family="Arial, sans-serif" font-size="16" fill="#232F3E">Local Sandbox (Ollama/vLLM)</text>
      <text x="70" y="50" font-family="Courier New, monospace" font-size="11" fill="#607D8B">localhost:11434/v1</text>
    </g>
  </g>

  <!-- Bottom Goals Summary -->
  <rect x="80" y="600" width="1120" height="70" rx="8" fill="#F1F3F4" />
  <text x="110" y="641" font-family="Arial, sans-serif" font-size="16" fill="#232F3E">
    <tspan font-weight="bold" fill="#4285F4">Why this matters:</tspan> By leveraging the OpenAI-compatible standard via LangChain, our code remains provider-agnostic. We can change our LLM backend instantly by editing environment variables inside the <tspan font-family="Courier New, monospace" font-weight="bold">.env</tspan> file, with no code refactoring needed.
  </text>
</svg>
