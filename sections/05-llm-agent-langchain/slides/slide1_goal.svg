<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF" />

  <!-- Slide Header -->
  <text x="80" y="90" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#232F3E">01. Section Goal &amp; Overview</text>
  <text x="80" y="130" font-family="Arial, sans-serif" font-size="20" fill="#607D8B">Upgrading from static rules to intelligent FinOps reasoning</text>

  <!-- Left Card: Section 04 (Simple Rules) -->
  <g transform="translate(150, 200)">
    <rect width="360" height="340" rx="16" fill="#F8F9FA" stroke="#78909C" stroke-width="2" />
    <path d="M 0 16 A 16 16 0 0 1 16 0 L 344 0 A 16 16 0 0 1 360 16 L 360 60 L 0 60 Z" fill="#78909C" />
    <text x="180" y="38" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Static Python Rule-Checker</text>

    <!-- Visual representation: Hardcoded Switch/Circuit -->
    <g transform="translate(180, 140)">
      <!-- A basic circuit switch -->
      <circle cx="-50" cy="0" r="10" fill="#78909C" />
      <circle cx="50" cy="0" r="10" fill="#78909C" />
      <!-- Open Switch Line -->
      <line x1="-45" y1="-8" x2="35" y2="-40" stroke="#EF5350" stroke-width="6" stroke-linecap="round" />
      <text x="0" y="45" font-family="Arial, sans-serif" font-size="14" fill="#607D8B" text-anchor="middle">Deterministic If/Else</text>
    </g>

    <!-- Details List -->
    <g transform="translate(40, 220)">
      <circle cx="0" cy="5" r="4" fill="#EF5350" />
      <text x="20" y="10" font-family="Arial, sans-serif" font-size="16" fill="#232F3E">Hardcoded tag comparisons</text>

      <circle cx="0" cy="35" r="4" fill="#EF5350" />
      <text x="20" y="40" font-family="Arial, sans-serif" font-size="16" fill="#232F3E">Rigid checks (misses spelling variants)</text>

      <circle cx="0" cy="65" r="4" fill="#EF5350" />
      <text x="20" y="70" font-family="Arial, sans-serif" font-size="16" fill="#232F3E">Finds problems, but cannot propose fixes</text>
    </g>
  </g>

  <!-- Middle: Upgrade Arrow -->
  <g transform="translate(560, 330)">
    <path d="M 0 20 L 110 20" stroke="#FF9900" stroke-width="6" stroke-dasharray="8 6" />
    <path d="M 110 10 L 130 20 L 110 30 Z" fill="#FF9900" />
    <rect x="15" y="-20" width="90" height="30" rx="6" fill="#FFE9D6" stroke="#FF9900" stroke-width="1.5" />
    <text x="60" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FF9900" text-anchor="middle">UPGRADE</text>
  </g>

  <!-- Right Card: Section 05 (LLM Agent) -->
  <g transform="translate(740, 200)">
    <rect width="360" height="340" rx="16" fill="#F8F9FA" stroke="#4285F4" stroke-width="2.5" />
    <path d="M 0 16 A 16 16 0 0 1 16 0 L 344 0 A 16 16 0 0 1 360 16 L 360 60 L 0 60 Z" fill="#4285F4" />
    <text x="180" y="38" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Intelligent LLM Analyzer</text>

    <!-- Visual representation: The Brain / Agent Core -->
    <g transform="translate(180, 140)">
      <!-- Outer glowing circle -->
      <circle cx="0" cy="0" r="45" fill="#E8F0FE" stroke="#4285F4" stroke-width="2" stroke-dasharray="4 4" />
      
      <!-- Brain Icon Schematic -->
      <path d="M -20 -10 C -30 -10, -35 5, -20 15 C -25 25, -5 30, 0 15 C 5 30, 25 25, 20 15 C 35 5, 30 -10, 20 -10 C 25 -25, 5 -30, 0 -15 C -5 -30, -25 -25, -20 -10 Z" 
            fill="#D2E3FC" stroke="#4285F4" stroke-width="2.5" />
      
      <!-- Connections/Nodes inside brain -->
      <circle cx="-10" cy="-5" r="3" fill="#4285F4" />
      <circle cx="10" cy="-5" r="3" fill="#4285F4" />
      <circle cx="0" cy="10" r="3" fill="#4285F4" />
      <line x1="-10" y1="-5" x2="10" y2="-5" stroke="#4285F4" stroke-width="1" />
      <line x1="10" y1="-5" x2="0" y2="10" stroke="#4285F4" stroke-width="1" />
      <line x1="-10" y1="-5" x2="0" y2="10" stroke="#4285F4" stroke-width="1" />
      
      <text x="0" y="55" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4285F4" text-anchor="middle">LangChain Powered</text>
    </g>

    <!-- Details List -->
    <g transform="translate(40, 220)">
      <circle cx="0" cy="5" r="4" fill="#34A853" />
      <text x="20" y="10" font-family="Arial, sans-serif" font-size="16" fill="#232F3E">Policy-driven prompts (no code changes)</text>

      <circle cx="0" cy="35" r="4" fill="#34A853" />
      <text x="20" y="40" font-family="Arial, sans-serif" font-size="16" fill="#232F3E">Cognitive matching of tag aliases</text>

      <circle cx="0" cy="65" r="4" fill="#34A853" />
      <text x="20" y="70" font-family="Arial, sans-serif" font-size="16" fill="#232F3E">Drafts detailed tickets &amp; resolves owners</text>
    </g>
  </g>

  <!-- Bottom Summary Info Block -->
  <rect x="80" y="600" width="1120" height="70" rx="8" fill="#F1F3F4" />
  <text x="110" y="641" font-family="Arial, sans-serif" font-size="16" fill="#232F3E">
    <tspan font-weight="bold" fill="#4285F4">Key Objective:</tspan> Replace brittle rule checking with LLM-powered context awareness. We feed the LLM cluster metadata and corporate policies, letting it perform cognitive classification and remediation planning.
  </text>
</svg>
