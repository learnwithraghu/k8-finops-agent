<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <g id="lucide-file-json">
      <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z" fill="none" stroke="#028090" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M14 2v4a2 2 0 0 0 2 2h4" fill="none" stroke="#028090" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g id="lucide-x">
      <path d="M18 6 6 18" fill="none" stroke="#EF5350" stroke-width="2.2" stroke-linecap="round"/>
      <path d="m6 6 12 12" fill="none" stroke="#EF5350" stroke-width="2.2" stroke-linecap="round"/>
    </g>
    <g id="lucide-brain">
      <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z" fill="none" stroke="#02C39A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z" fill="none" stroke="#02C39A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g id="icon-pod">
      <polygon points="12,2 20.66,7 20.66,17 12,22 3.34,17 3.34,7" fill="none" stroke="#028090" stroke-width="1.8"/>
    </g>
  </defs>

  <rect width="1280" height="720" fill="#FFFFFF"/>

  <g id="anim-titlebar">
    <text x="80" y="88" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#232F3E">Data Without Decisions</text>
    <text x="80" y="128" font-family="Arial, sans-serif" font-size="20" fill="#607D8B">Section 04 collected rich facts. The parser still could not decide.</text>
  </g>

  <g id="anim-data-card" transform="translate(80,200)">
    <path d="M 4 8 L 518 5 L 522 348 L 6 352 Z" fill="#FAFAFA" stroke="#232F3E" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <use href="#lucide-file-json" x="28" y="28" width="32" height="32"/>
    <text x="72" y="52" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#232F3E">K8s facts</text>

    <g transform="translate(32,88)">
      <use href="#icon-pod" x="0" y="0" width="26" height="26"/>
      <text x="40" y="20" font-family="Arial, sans-serif" font-size="17" fill="#232F3E">labels &amp; annotations</text>
    </g>
    <g transform="translate(32,148)">
      <use href="#icon-pod" x="0" y="0" width="26" height="26"/>
      <text x="40" y="20" font-family="Arial, sans-serif" font-size="17" fill="#232F3E">cpu, memory, replicas</text>
    </g>
    <g transform="translate(32,208)">
      <use href="#icon-pod" x="0" y="0" width="26" height="26"/>
      <text x="40" y="20" font-family="Arial, sans-serif" font-size="17" fill="#232F3E">pvc &amp; orphan status</text>
    </g>
  </g>

  <g id="anim-arrow" transform="translate(620,360)">
    <path d="M 0 4 C 36 0 72 -2 108 4" fill="none" stroke="#028090" stroke-width="2.8" stroke-linecap="round"/>
    <path d="M 108 4 L 92 -6 L 94 14 Z" fill="#028090"/>
  </g>

  <g id="anim-parser-card" transform="translate(760,200)">
    <path d="M 8 6 L 438 4 L 442 358 L 10 362 Z" fill="#FFF8F8" stroke="#EF5350" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="32" y="52" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#232F3E">Manual parser</text>

    <g transform="translate(32,100)">
      <use href="#lucide-x" x="0" y="0" width="22" height="22"/>
      <text x="34" y="18" font-family="Arial, sans-serif" font-size="17" fill="#232F3E">alias mismatch</text>
    </g>
    <g transform="translate(32,160)">
      <use href="#lucide-x" x="0" y="0" width="22" height="22"/>
      <text x="34" y="18" font-family="Arial, sans-serif" font-size="17" fill="#232F3E">no owner routing</text>
    </g>
    <g transform="translate(32,220)">
      <use href="#lucide-x" x="0" y="0" width="22" height="22"/>
      <text x="34" y="18" font-family="Arial, sans-serif" font-size="17" fill="#232F3E">no issue draft</text>
    </g>

    <g id="anim-brain-cta" transform="translate(32,288)">
      <path d="M 0 6 L 374 4 L 378 46 L 2 48 Z" fill="#E8FBF6" stroke="#02C39A" stroke-width="2" stroke-linecap="round"/>
      <use href="#lucide-brain" x="108" y="10" width="28" height="28"/>
      <text x="210" y="32" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#028090" text-anchor="middle">upgrade the brain</text>
    </g>
  </g>
</svg>
