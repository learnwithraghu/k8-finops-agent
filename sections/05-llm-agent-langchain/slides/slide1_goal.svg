<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <g id="lucide-file-json">
      <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z" fill="none" stroke="#028090" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M14 2v4a2 2 0 0 0 2 2h4" fill="none" stroke="#028090" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g id="lucide-x">
      <path d="M18 6 6 18" fill="none" stroke="#EF5350" stroke-width="2.2" stroke-linecap="round"/>
      <path d="m6 6 12 12" fill="none" stroke="#EF5350" stroke-width="2.2" stroke-linecap="round"/>
    </g>
    <g id="lucide-brain">
      <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z" fill="none" stroke="#02C39A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z" fill="none" stroke="#02C39A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g id="icon-pod">
      <polygon points="12,2 20.66,7 20.66,17 12,22 3.34,17 3.34,7" fill="none" stroke="#028090" stroke-width="1.8"/>
    </g>
  </defs>

  <rect width="1280" height="720" fill="#FFFFFF"/>

  <g id="anim-titlebar">
    <text x="80" y="88" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#232F3E">Data Without Decisions</text>
    <text x="80" y="128" font-family="Arial, sans-serif" font-size="20" fill="#607D8B">Rich K8s facts from Section 04 — still no FinOps decision.</text>
  </g>

  <!-- Left: facts collected -->
  <g id="anim-data-card" transform="translate(80,178)">
    <path d="M 6 10 L 494 6 L 498 318 L 8 322 Z" fill="#FAFAFA" stroke="#232F3E" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 10 14 L 490 10 L 494 314 L 12 318 Z" fill="none" stroke="#232F3E" stroke-width="1" stroke-linecap="round" opacity="0.35"/>

    <g transform="translate(200,52)">
      <use href="#icon-pod" x="0" y="0" width="72" height="72"/>
    </g>
    <text x="236" y="148" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#232F3E" text-anchor="middle">K8s facts</text>

    <g transform="translate(48,188)">
      <line x1="0" y1="10" x2="28" y2="10" stroke="#028090" stroke-width="2.2" stroke-linecap="round"/>
      <text x="40" y="16" font-family="Arial, sans-serif" font-size="18" fill="#232F3E">labels · cpu · pvc</text>
    </g>
    <g transform="translate(48,232)">
      <line x1="0" y1="10" x2="28" y2="10" stroke="#028090" stroke-width="2.2" stroke-linecap="round"/>
      <text x="40" y="16" font-family="Arial, sans-serif" font-size="18" fill="#232F3E">orphan status</text>
    </g>
    <g transform="translate(48,276)">
      <line x1="0" y1="10" x2="28" y2="10" stroke="#028090" stroke-width="2.2" stroke-linecap="round"/>
      <text x="40" y="16" font-family="Arial, sans-serif" font-size="18" fill="#232F3E">scan complete</text>
    </g>
  </g>

  <!-- Center gap arrow -->
  <g id="anim-arrow" transform="translate(598,318)">
    <path d="M 4 8 C 44 2 84 0 124 8" fill="none" stroke="#028090" stroke-width="3" stroke-linecap="round"/>
    <path d="M 124 8 L 104 -8 L 108 24 Z" fill="#028090"/>
    <text x="64" y="44" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#607D8B" text-anchor="middle">no verdict</text>
  </g>

  <!-- Right: parser stuck -->
  <g id="anim-parser-card" transform="translate(748,178)">
    <path d="M 8 10 L 452 6 L 456 318 L 10 322 Z" fill="#FFF8F8" stroke="#EF5350" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 12 14 L 448 10 L 452 314 L 14 318 Z" fill="none" stroke="#EF5350" stroke-width="1" stroke-linecap="round" opacity="0.4"/>

    <g transform="translate(196,48)">
      <use href="#lucide-x" x="0" y="0" width="56" height="56"/>
    </g>
    <text x="224" y="132" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#232F3E" text-anchor="middle">Manual parser</text>

    <g transform="translate(56,168)">
      <use href="#lucide-x" x="0" y="0" width="20" height="20"/>
      <text x="32" y="16" font-family="Arial, sans-serif" font-size="17" fill="#232F3E">alias mismatch</text>
    </g>
    <g transform="translate(56,212)">
      <use href="#lucide-x" x="0" y="0" width="20" height="20"/>
      <text x="32" y="16" font-family="Arial, sans-serif" font-size="17" fill="#232F3E">no owner routing</text>
    </g>
    <g transform="translate(56,256)">
      <use href="#lucide-x" x="0" y="0" width="20" height="20"/>
      <text x="32" y="16" font-family="Arial, sans-serif" font-size="17" fill="#232F3E">no issue draft</text>
    </g>
  </g>

  <!-- Hero CTA -->
  <g id="anim-brain-cta" transform="translate(340,530)">
    <ellipse cx="300" cy="52" rx="292" ry="48" fill="#F5FFFC" stroke="#02C39A" stroke-width="2.6" stroke-linecap="round"/>
    <ellipse cx="300" cy="52" rx="284" ry="42" fill="none" stroke="#02C39A" stroke-width="1.2" stroke-dasharray="5 4" opacity="0.6"/>
    <g transform="translate(168,28) scale(2)">
      <use href="#lucide-brain" x="0" y="0" width="24" height="24"/>
    </g>
    <text x="340" y="62" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#028090">upgrade the brain</text>
  </g>
</svg>
