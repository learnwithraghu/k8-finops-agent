<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=JetBrains+Mono:wght@400;600&amp;display=swap');
      text { font-family: 'Inter', -apple-system, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
    <filter id="card-shadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#1B2559" flood-opacity="0.08"/>
    </filter>
    <filter id="active-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#5B8FF9" flood-opacity="0.35"/>
    </filter>
    <pattern id="bg-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#F0F2F5" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect width="1280" height="720" fill="url(#bg-grid)" opacity="0.6"/>
  <rect x="0" y="0" width="6" height="720" fill="#5B8FF9"/>

  <!-- Header -->
  <rect x="40" y="32" width="160" height="28" rx="4" fill="#F0F5FF"/>
  <text x="120" y="51" font-size="12" font-weight="700" fill="#5B8FF9" text-anchor="middle" letter-spacing="1.5">SECTION 05</text>
  <text x="40" y="110" font-size="44" font-weight="800" fill="#141414" letter-spacing="-1">Model &amp; Provider</text>
  <text x="40" y="162" font-size="44" font-weight="800" fill="#5B8FF9" letter-spacing="-1">Choice</text>
  <text x="40" y="200" font-size="17" font-weight="400" fill="#8C8C8C">Change .env. Keep the same code path.</text>
  <line x1="40" y1="222" x2="1240" y2="222" stroke="#F0F2F5" stroke-width="1.5"/>

  <!-- ── Left: .env Config Panel ── -->
  <g id="anim-env-window" transform="translate(40, 252)" filter="url(#card-shadow)">
    <rect width="440" height="380" rx="12" fill="#FAFBFC" stroke="#E8EAED" stroke-width="1.5"/>
    <!-- Header -->
    <rect width="440" height="44" rx="12" fill="#1E2130"/>
    <rect width="440" height="10" y="34" fill="#1E2130"/>
    <circle cx="22" cy="22" r="5" fill="#FF5F57"/>
    <circle cx="40" cy="22" r="5" fill="#FEBC2E"/>
    <circle cx="58" cy="22" r="5" fill="#28C840"/>
    <text x="220" y="27" font-size="12" font-weight="600" fill="#6B7280" text-anchor="middle" class="mono">.env — Universal Config</text>

    <!-- Env key-value rows -->
    <!-- URL row -->
    <g transform="translate(20, 64)">
      <rect width="400" height="72" rx="8" fill="#FFFFFF" stroke="#E8F4FF" stroke-width="1.5"/>
      <rect width="8" height="72" rx="4" fill="#5B8FF9"/>
      <rect x="20" y="12" width="72" height="22" rx="4" fill="#F0F5FF"/>
      <text x="56" y="28" font-size="11" font-weight="700" fill="#5B8FF9" text-anchor="middle">BASE_URL</text>
      <text x="108" y="24" font-size="12" font-weight="600" fill="#262626" class="mono">OPENAI_BASE_URL=</text>
      <text x="108" y="44" font-size="12" font-weight="500" fill="#5B8FF9" class="mono">https://api.ai.kodekloud.com/v1</text>
    </g>

    <!-- Key row -->
    <g transform="translate(20, 148)">
      <rect width="400" height="72" rx="8" fill="#FFFFFF" stroke="#F0FFF4" stroke-width="1.5"/>
      <rect width="8" height="72" rx="4" fill="#52C41A"/>
      <rect x="20" y="12" width="60" height="22" rx="4" fill="#F6FFE6"/>
      <text x="50" y="28" font-size="11" font-weight="700" fill="#52C41A" text-anchor="middle">API_KEY</text>
      <text x="96" y="24" font-size="12" font-weight="600" fill="#262626" class="mono">OPENAI_API_KEY=</text>
      <text x="96" y="44" font-size="12" font-weight="500" fill="#52C41A" class="mono">sk-••••••••••••••••••</text>
    </g>

    <!-- Model row -->
    <g transform="translate(20, 232)">
      <rect width="400" height="72" rx="8" fill="#FFFFFF" stroke="#FFF7E0" stroke-width="1.5"/>
      <rect width="8" height="72" rx="4" fill="#FAAD14"/>
      <rect x="20" y="12" width="76" height="22" rx="4" fill="#FFFBE6"/>
      <text x="58" y="28" font-size="11" font-weight="700" fill="#FAAD14" text-anchor="middle">MODEL_ID</text>
      <text x="112" y="24" font-size="12" font-weight="600" fill="#262626" class="mono">OPENAI_MODEL_ID=</text>
      <text x="112" y="44" font-size="12" font-weight="500" fill="#FAAD14" class="mono">gpt-4o</text>
    </g>

    <!-- Info note -->
    <rect x="20" y="320" width="400" height="44" rx="8" fill="#F6F8FF"/>
    <text x="220" y="338" font-size="12" font-weight="600" fill="#5B8FF9" text-anchor="middle">Same code. Just swap the URL.</text>
    <text x="220" y="356" font-size="11" font-weight="400" fill="#8C8C8C" text-anchor="middle">No AWS credentials · No region config needed</text>
  </g>

  <!-- ── Center: ChatOpenAI Hub ── -->
  <g id="anim-adapter-hub" transform="translate(536, 315)">
    <!-- Connector lines emanating to provider screens -->
    <line x1="106" y1="106" x2="160" y2="84" stroke="#52C41A" stroke-width="3" stroke-linecap="round"/>
    <line x1="106" y1="130" x2="160" y2="164" stroke="#BFBFBF" stroke-width="2" stroke-dasharray="5 4"/>
    <line x1="106" y1="154" x2="160" y2="244" stroke="#BFBFBF" stroke-width="2" stroke-dasharray="5 4"/>
    <!-- Outer ring -->
    <circle cx="106" cy="130" r="100" fill="#F6F8FF" stroke="#C7D7FF" stroke-width="2"/>
    <circle cx="106" cy="130" r="78" fill="#FFFFFF" stroke="#5B8FF9" stroke-width="2" filter="url(#active-glow)"/>
    <!-- Sliders icon -->
    <line x1="80" y1="112" x2="134" y2="112" stroke="#5B8FF9" stroke-width="3" stroke-linecap="round"/>
    <circle cx="96" cy="112" r="7" fill="#FFFFFF" stroke="#5B8FF9" stroke-width="2.5"/>
    <line x1="80" y1="130" x2="134" y2="130" stroke="#5B8FF9" stroke-width="3" stroke-linecap="round"/>
    <circle cx="118" cy="130" r="7" fill="#FFFFFF" stroke="#5B8FF9" stroke-width="2.5"/>
    <line x1="80" y1="148" x2="134" y2="148" stroke="#5B8FF9" stroke-width="3" stroke-linecap="round"/>
    <circle cx="100" cy="148" r="7" fill="#FFFFFF" stroke="#5B8FF9" stroke-width="2.5"/>
    <text x="106" y="186" font-size="16" font-weight="800" fill="#262626" text-anchor="middle">ChatOpenAI</text>
    <text x="106" y="204" font-size="10" font-weight="700" fill="#5B8FF9" text-anchor="middle" letter-spacing="2">ADAPTER</text>
  </g>

  <!-- ── Right: Provider Screens ── -->

  <!-- Provider 1: KodeKloud (active) -->
  <g id="anim-provider-1" transform="translate(710, 248)" filter="url(#card-shadow)">
    <rect width="520" height="90" rx="10" fill="#141414" stroke="#52C41A" stroke-width="2.5"/>
    <!-- Screen content -->
    <rect x="12" y="12" width="496" height="66" rx="6" fill="#0A1628"/>
    <!-- Status LED -->
    <circle cx="32" cy="45" r="8" fill="#52C41A"/>
    <circle cx="32" cy="45" r="4" fill="#A3F7BF"/>
    <!-- Content -->
    <text x="56" y="38" font-size="14" font-weight="700" fill="#52C41A" class="mono">● ACTIVE</text>
    <text x="56" y="58" font-size="18" font-weight="800" fill="#FFFFFF">KodeKloud API</text>
    <!-- Right badge -->
    <rect x="380" y="24" width="108" height="24" rx="6" fill="#52C41A"/>
    <text x="434" y="41" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">CONNECTED</text>
    <!-- Active glow indicator -->
    <line x1="496" y1="12" x2="496" y2="78" stroke="#52C41A" stroke-width="4" rx="2"/>
  </g>

  <!-- Provider 2: OpenAI (standby) -->
  <g id="anim-provider-2" transform="translate(710, 360)" filter="url(#card-shadow)">
    <rect width="520" height="90" rx="10" fill="#FAFBFC" stroke="#E8EAED" stroke-width="1.5"/>
    <rect x="12" y="12" width="496" height="66" rx="6" fill="#F5F6FA"/>
    <circle cx="32" cy="45" r="8" fill="#D9D9D9"/>
    <text x="56" y="38" font-size="14" font-weight="600" fill="#8C8C8C" class="mono">○ STANDBY</text>
    <text x="56" y="58" font-size="18" font-weight="700" fill="#BFBFBF">OpenAI (api.openai.com)</text>
    <rect x="380" y="24" width="108" height="24" rx="6" fill="#F0F2F5"/>
    <text x="434" y="41" font-size="11" font-weight="600" fill="#8C8C8C" text-anchor="middle">STANDBY</text>
  </g>

  <!-- Provider 3: Local LLM (standby) -->
  <g id="anim-provider-3" transform="translate(710, 472)" filter="url(#card-shadow)">
    <rect width="520" height="90" rx="10" fill="#FAFBFC" stroke="#E8EAED" stroke-width="1.5"/>
    <rect x="12" y="12" width="496" height="66" rx="6" fill="#F5F6FA"/>
    <circle cx="32" cy="45" r="8" fill="#D9D9D9"/>
    <text x="56" y="38" font-size="14" font-weight="600" fill="#8C8C8C" class="mono">○ STANDBY</text>
    <text x="56" y="58" font-size="18" font-weight="700" fill="#BFBFBF">Local LLM (localhost:11434)</text>
    <rect x="380" y="24" width="108" height="24" rx="6" fill="#F0F2F5"/>
    <text x="434" y="41" font-size="11" font-weight="600" fill="#8C8C8C" text-anchor="middle">STANDBY</text>
  </g>

  <!-- Key insight chips at bottom right -->
  <g transform="translate(710, 590)">
    <rect width="156" height="40" rx="8" fill="#F0F5FF" stroke="#5B8FF9" stroke-width="1"/>
    <text x="78" y="26" font-size="13" font-weight="600" fill="#5B8FF9" text-anchor="middle">model ID</text>
  </g>
  <g transform="translate(876, 590)">
    <rect width="148" height="40" rx="8" fill="#F6FFE6" stroke="#52C41A" stroke-width="1"/>
    <text x="74" y="26" font-size="13" font-weight="600" fill="#52C41A" text-anchor="middle">API key</text>
  </g>
  <g transform="translate(1034, 590)">
    <rect width="196" height="40" rx="8" fill="#FFFBE6" stroke="#FAAD14" stroke-width="1"/>
    <text x="98" y="26" font-size="13" font-weight="600" fill="#FAAD14" text-anchor="middle">base_url (router)</text>
  </g>

  <!-- Bottom bar -->
  <g transform="translate(40, 648)" filter="url(#card-shadow)">
    <rect width="650" height="48" rx="10" fill="#F6F8FF" stroke="#5B8FF9" stroke-width="1"/>
    <text x="325" y="29" font-size="14" font-weight="600" fill="#5B8FF9" text-anchor="middle">ChatOpenAI adapts to any OpenAI-compatible endpoint via base_url</text>
  </g>

  <text x="1220" y="700" font-size="13" font-weight="500" fill="#BFBFBF" text-anchor="end">5 / 9</text>
</svg>
