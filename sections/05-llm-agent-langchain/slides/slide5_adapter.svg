<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <g id="lucide-sliders-horizontal">
      <line x1="21" x2="14" y1="4" y2="4" fill="none" stroke="#028090" stroke-width="2" stroke-linecap="round"/>
      <line x1="10" x2="3" y1="4" y2="4" fill="none" stroke="#028090" stroke-width="2" stroke-linecap="round"/>
      <line x1="21" x2="12" y1="12" y2="12" fill="none" stroke="#028090" stroke-width="2" stroke-linecap="round"/>
      <line x1="8" x2="3" y1="12" y2="12" fill="none" stroke="#028090" stroke-width="2" stroke-linecap="round"/>
      <line x1="21" x2="16" y1="20" y2="20" fill="none" stroke="#028090" stroke-width="2" stroke-linecap="round"/>
      <line x1="12" x2="3" y1="20" y2="20" fill="none" stroke="#028090" stroke-width="2" stroke-linecap="round"/>
      <line x1="14" x2="14" y1="2" y2="6" fill="none" stroke="#028090" stroke-width="2" stroke-linecap="round"/>
      <line x1="8" x2="8" y1="10" y2="14" fill="none" stroke="#028090" stroke-width="2" stroke-linecap="round"/>
      <line x1="16" x2="16" y1="18" y2="22" fill="none" stroke="#028090" stroke-width="2" stroke-linecap="round"/>
    </g>
    <g id="lucide-key">
      <path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4" fill="none" stroke="#028090" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="m21 2-9.6 9.6" fill="none" stroke="#028090" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="7.5" cy="15.5" r="5.5" fill="none" stroke="#028090" stroke-width="2"/>
    </g>
    <g id="lucide-globe">
      <circle cx="12" cy="12" r="10" fill="none" stroke="#028090" stroke-width="2"/>
      <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20" fill="none" stroke="#028090" stroke-width="2"/>
      <path d="M2 12h20" fill="none" stroke="#028090" stroke-width="2"/>
    </g>
    <g id="lucide-link">
      <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" fill="none" stroke="#02C39A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" fill="none" stroke="#02C39A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </defs>

  <rect width="1280" height="720" fill="#FFFFFF"/>

  <g id="anim-titlebar">
    <text x="80" y="88" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#232F3E">Model and Provider Choice</text>
    <text x="80" y="128" font-family="Arial, sans-serif" font-size="20" fill="#607D8B">Change .env. Keep the same code path.</text>
  </g>

  <g id="anim-env-window" transform="translate(80,200)">
    <path d="M 6 4 L 400 6 L 402 300 L 4 298 Z" fill="#FAFAFA" stroke="#232F3E" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="28" cy="32" r="6" fill="#EF5350"/>
    <circle cx="48" cy="32" r="6" fill="#FFB84D"/>
    <circle cx="68" cy="32" r="6" fill="#02C39A"/>
    <text x="200" y="38" font-family="Arial, sans-serif" font-size="14" fill="#607D8B" text-anchor="middle">.env</text>

    <g transform="translate(28,72)">
      <text x="0" y="24" font-family="Courier New, monospace" font-size="14" fill="#028090">OPENAI_BASE_URL=</text>
      <text x="0" y="56" font-family="Courier New, monospace" font-size="14" fill="#028090">OPENAI_API_KEY=</text>
      <text x="0" y="88" font-family="Courier New, monospace" font-size="14" fill="#028090">OPENAI_MODEL_ID=</text>
    </g>
  </g>

  <g id="anim-arrow-env">
    <path d="M 488 340 C 520 340 540 340 560 340" fill="none" stroke="#028090" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M 560 340 L 546 330 L 546 350 Z" fill="#028090"/>
  </g>

  <g id="anim-arrow-providers">
    <path d="M 740 340 L 772 280" fill="none" stroke="#02C39A" stroke-width="2" stroke-linecap="round"/>
    <path d="M 740 340 L 772 360" fill="none" stroke="#232F3E" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="5 4"/>
    <path d="M 740 340 L 772 440" fill="none" stroke="#232F3E" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="5 4"/>
  </g>

  <g id="anim-adapter-hub" transform="translate(540,280)">
    <ellipse cx="100" cy="100" rx="92" ry="90" fill="#F5FFFC" stroke="#02C39A" stroke-width="2.5" stroke-linecap="round"/>
    <g transform="translate(76,76) scale(2)">
      <use href="#lucide-link" x="0" y="0" width="24" height="24"/>
    </g>
    <text x="100" y="178" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#232F3E" text-anchor="middle">ChatOpenAI</text>
  </g>

  <g id="anim-provider-1" transform="translate(780,220)">
    <path d="M 4 6 L 316 4 L 318 72 L 6 74 Z" fill="#F5FFFC" stroke="#02C39A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <use href="#lucide-globe" x="24" y="20" width="28" height="28"/>
    <text x="64" y="46" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#232F3E">KodeKloud API</text>
  </g>

  <g id="anim-provider-2" transform="translate(780,320)">
    <path d="M 6 4 L 318 6 L 316 72 L 4 70 Z" fill="#FAFAFA" stroke="#232F3E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <use href="#lucide-globe" x="24" y="20" width="28" height="28"/>
    <text x="64" y="46" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#232F3E">OpenAI</text>
  </g>

  <g id="anim-provider-3" transform="translate(780,420)">
    <path d="M 4 6 L 316 4 L 318 72 L 6 74 Z" fill="#FAFAFA" stroke="#232F3E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <use href="#lucide-globe" x="24" y="20" width="28" height="28"/>
    <text x="64" y="46" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#232F3E">Local LLM</text>
  </g>

  <g id="anim-cards-bottom" transform="translate(540,560)">
    <path d="M 0 6 L 168 4 L 170 58 L 2 60 Z" fill="#FAFAFA" stroke="#232F3E" stroke-width="2" stroke-linecap="round"/>
    <use href="#lucide-sliders-horizontal" x="20" y="16" width="24" height="24"/>
    <text x="90" y="38" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#232F3E" text-anchor="middle">model ID</text>
    <path d="M 190 4 L 358 6 L 360 60 L 188 58 Z" fill="#F5FFFC" stroke="#02C39A" stroke-width="2" stroke-linecap="round"/>
    <use href="#lucide-key" x="210" y="16" width="24" height="24"/>
    <text x="280" y="38" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#232F3E" text-anchor="middle">API key</text>
  </g>
</svg>
