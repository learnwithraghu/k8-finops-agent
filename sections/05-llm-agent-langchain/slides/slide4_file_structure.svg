<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <g id="lucide-folder-tree">
      <path d="M20 10a2 2 0 0 0-2 2v4a2 2 0 0 0 2 2h4" fill="none" stroke="#028090" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M10 6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-6l-2-2z" fill="none" stroke="#028090" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g id="lucide-file-text">
      <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z" fill="none" stroke="#FFB84D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M14 2v4a2 2 0 0 0 2 2h4" fill="none" stroke="#FFB84D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g id="lucide-file-code">
      <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z" fill="none" stroke="#02C39A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M14 2v4a2 2 0 0 0 2 2h4" fill="none" stroke="#02C39A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="m10 13-2 2 2 2" fill="none" stroke="#02C39A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="m14 17 2-2-2-2" fill="none" stroke="#02C39A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g id="lucide-key">
      <path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4" fill="none" stroke="#028090" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="m21 2-9.6 9.6" fill="none" stroke="#028090" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="7.5" cy="15.5" r="5.5" fill="none" stroke="#028090" stroke-width="2"/>
    </g>
  </defs>

  <rect width="1280" height="720" fill="#FFFFFF"/>

  <g id="anim-titlebar">
    <text x="80" y="88" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#232F3E">Workspace Layout</text>
    <text x="80" y="128" font-family="Arial, sans-serif" font-size="20" fill="#607D8B">Each file has one job in the decision flow.</text>
  </g>

  <g id="anim-explorer" transform="translate(80,200)">
    <path d="M 6 4 L 620 6 L 622 420 L 4 418 Z" fill="#FAFAFA" stroke="#232F3E" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="28" cy="32" r="6" fill="#EF5350"/>
    <circle cx="48" cy="32" r="6" fill="#FFB84D"/>
    <circle cx="68" cy="32" r="6" fill="#02C39A"/>
    <text x="310" y="38" font-family="Arial, sans-serif" font-size="14" fill="#607D8B" text-anchor="middle">05-llm-agent-langchain/</text>

    <g id="anim-tree-config" transform="translate(40,80)">
      <use href="#lucide-folder-tree" x="0" y="0" width="22" height="22"/>
      <text x="32" y="18" font-family="Courier New, monospace" font-size="16" fill="#232F3E">config/tagging-rules.yaml</text>
    </g>

    <g id="anim-tree-agent" transform="translate(40,150)">
      <use href="#lucide-file-code" x="0" y="0" width="22" height="22"/>
      <text x="32" y="18" font-family="Courier New, monospace" font-size="16" fill="#232F3E">agent/analyzer.py</text>
    </g>

    <g transform="translate(40,210)">
      <use href="#lucide-file-code" x="0" y="0" width="22" height="22"/>
      <text x="32" y="18" font-family="Courier New, monospace" font-size="16" fill="#232F3E">agent/main.py</text>
    </g>

    <g transform="translate(40,270)">
      <use href="#lucide-file-code" x="0" y="0" width="22" height="22"/>
      <text x="32" y="18" font-family="Courier New, monospace" font-size="16" fill="#232F3E">agent/scanner.py</text>
    </g>

    <g id="anim-tree-env" transform="translate(40,340)">
      <use href="#lucide-key" x="0" y="0" width="22" height="22"/>
      <text x="32" y="18" font-family="Courier New, monospace" font-size="16" fill="#232F3E">.env</text>
    </g>
  </g>

  <g id="anim-callout-policy" transform="translate(760,220)">
    <path d="M 4 6 L 376 4 L 378 88 L 6 90 Z" fill="#FFFBF2" stroke="#FFB84D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <use href="#lucide-file-text" x="24" y="24" width="24" height="24"/>
    <text x="58" y="52" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#232F3E">Policy YAML</text>
  </g>

  <g id="anim-callout-agent" transform="translate(760,340)">
    <path d="M 6 4 L 378 6 L 376 88 L 4 86 Z" fill="#FAFAFA" stroke="#232F3E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="28" y="52" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#232F3E">Agent chain logic</text>
  </g>

  <g id="anim-callout-env" transform="translate(760,460)">
    <path d="M 4 6 L 376 4 L 378 88 L 6 90 Z" fill="#F5FFFC" stroke="#02C39A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <use href="#lucide-key" x="24" y="24" width="24" height="24"/>
    <text x="58" y="52" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#232F3E">Provider config</text>
  </g>
</svg>
