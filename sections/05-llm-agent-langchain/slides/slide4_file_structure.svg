<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=JetBrains+Mono:wght@400;600&amp;display=swap');
      text { font-family: 'Inter', -apple-system, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
    <filter id="card-shadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#1B2559" flood-opacity="0.08"/>
    </filter>
    <pattern id="bg-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#F0F2F5" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect width="1280" height="720" fill="url(#bg-grid)" opacity="0.6"/>
  <rect x="0" y="0" width="6" height="720" fill="#5B8FF9"/>

  <!-- Header -->
  <rect x="40" y="32" width="160" height="28" rx="4" fill="#F0F5FF"/>
  <text x="120" y="51" font-size="12" font-weight="700" fill="#5B8FF9" text-anchor="middle" letter-spacing="1.5">SECTION 05</text>
  <text x="40" y="110" font-size="44" font-weight="800" fill="#141414" letter-spacing="-1">Workspace</text>
  <text x="40" y="162" font-size="44" font-weight="800" fill="#5B8FF9" letter-spacing="-1">Layout</text>
  <text x="40" y="200" font-size="17" font-weight="400" fill="#8C8C8C">Each file has one job in the decision flow.</text>
  <line x1="40" y1="222" x2="1240" y2="222" stroke="#F0F2F5" stroke-width="1.5"/>

  <!-- ── Left: File Explorer Panel ── -->
  <g id="anim-explorer" transform="translate(40, 248)" filter="url(#card-shadow)">
    <!-- Window frame -->
    <rect width="520" height="420" rx="12" fill="#FAFBFC" stroke="#E8EAED" stroke-width="1.5"/>
    <!-- Titlebar -->
    <rect width="520" height="40" rx="12" fill="#F2F3F5"/>
    <rect width="520" height="8" y="32" fill="#F2F3F5"/>
    <!-- OS dots -->
    <circle cx="24" cy="20" r="5" fill="#FF5F57"/>
    <circle cx="42" cy="20" r="5" fill="#FEBC2E"/>
    <circle cx="60" cy="20" r="5" fill="#28C840"/>
    <text x="260" y="25" font-size="12" font-weight="600" fill="#8C8C8C" text-anchor="middle" class="mono">05-llm-agent-langchain/</text>

    <!-- Folder: config/ -->
    <g id="anim-tree-config" transform="translate(28, 60)">
      <!-- Folder icon -->
      <path d="M0 6 L0 24 L22 24 L22 6 Z" fill="none" stroke="#5B8FF9" stroke-width="1.5" rx="2"/>
      <path d="M0 6 L8 6 L10 4 L22 4 L22 6" fill="none" stroke="#5B8FF9" stroke-width="1.5"/>
      <text x="32" y="19" font-size="14" font-weight="600" fill="#262626" class="mono">config/</text>
    </g>

    <!-- File: tagging-rules.yaml -->
    <g transform="translate(56, 96)">
      <rect x="0" y="0" width="2" height="24" fill="#E8EAED"/>
      <path d="M4 14 L14 14" stroke="#E8EAED" stroke-width="1.5"/>
      <!-- Doc icon -->
      <path d="M18 2 L28 2 L28 22 L14 22 L14 6 Z" fill="none" stroke="#FF6B35" stroke-width="1.5"/>
      <path d="M18 2 L18 6 L28 6" fill="none" stroke="#FF6B35" stroke-width="1.5"/>
      <text x="38" y="18" font-size="13" font-weight="500" fill="#595959" class="mono">tagging-rules.yaml</text>
    </g>

    <!-- Folder: agent/ -->
    <g id="anim-tree-agent" transform="translate(28, 138)">
      <path d="M0 6 L0 24 L22 24 L22 6 Z" fill="none" stroke="#5B8FF9" stroke-width="1.5" rx="2"/>
      <path d="M0 6 L8 6 L10 4 L22 4 L22 6" fill="none" stroke="#5B8FF9" stroke-width="1.5"/>
      <text x="32" y="19" font-size="14" font-weight="600" fill="#262626" class="mono">agent/</text>
    </g>

    <!-- agent/analyzer.py (highlighted) -->
    <g id="anim-tree-agent-analyzer" transform="translate(56, 174)">
      <rect x="-8" y="-4" width="434" height="30" rx="4" fill="#F0F5FF"/>
      <rect x="0" y="0" width="2" height="24" fill="#5B8FF9"/>
      <path d="M4 14 L14 14" stroke="#5B8FF9" stroke-width="1.5"/>
      <path d="M18 2 L28 2 L28 22 L14 22 L14 6 Z" fill="none" stroke="#5B8FF9" stroke-width="1.5"/>
      <path d="M18 2 L18 6 L28 6" fill="none" stroke="#5B8FF9" stroke-width="1.5"/>
      <text x="38" y="18" font-size="13" font-weight="700" fill="#5B8FF9" class="mono">analyzer.py</text>
      <rect x="380" y="2" width="44" height="20" rx="4" fill="#5B8FF9"/>
      <text x="402" y="17" font-size="10" font-weight="700" fill="white" text-anchor="middle">KEY</text>
    </g>

    <!-- agent/main.py -->
    <g transform="translate(56, 216)">
      <rect x="0" y="0" width="2" height="24" fill="#E8EAED"/>
      <path d="M4 14 L14 14" stroke="#E8EAED" stroke-width="1.5"/>
      <path d="M18 2 L28 2 L28 22 L14 22 L14 6 Z" fill="none" stroke="#5B8FF9" stroke-width="1.5"/>
      <path d="M18 2 L18 6 L28 6" fill="none" stroke="#5B8FF9" stroke-width="1.5"/>
      <text x="38" y="18" font-size="13" font-weight="500" fill="#595959" class="mono">main.py</text>
    </g>

    <!-- agent/scanner.py -->
    <g transform="translate(56, 252)">
      <rect x="0" y="0" width="2" height="24" fill="#E8EAED"/>
      <path d="M4 14 L14 14" stroke="#E8EAED" stroke-width="1.5"/>
      <path d="M18 2 L28 2 L28 22 L14 22 L14 6 Z" fill="none" stroke="#5B8FF9" stroke-width="1.5"/>
      <path d="M18 2 L18 6 L28 6" fill="none" stroke="#5B8FF9" stroke-width="1.5"/>
      <text x="38" y="18" font-size="13" font-weight="500" fill="#595959" class="mono">scanner.py</text>
    </g>

    <!-- .env -->
    <g id="anim-tree-env" transform="translate(28, 292)">
      <path d="M18 2 L28 2 L28 22 L14 22 L14 6 Z" fill="none" stroke="#52C41A" stroke-width="1.5"/>
      <path d="M18 2 L18 6 L28 6" fill="none" stroke="#52C41A" stroke-width="1.5"/>
      <text x="38" y="18" font-size="14" font-weight="600" fill="#52C41A" class="mono">.env</text>
      <rect x="100" y="0" width="56" height="22" rx="4" fill="#F6FFE6"/>
      <text x="128" y="16" font-size="10" font-weight="700" fill="#52C41A" text-anchor="middle">SECRETS</text>
    </g>

    <!-- requirements.txt -->
    <g transform="translate(28, 334)">
      <path d="M18 2 L28 2 L28 22 L14 22 L14 6 Z" fill="none" stroke="#8C8C8C" stroke-width="1.5"/>
      <path d="M18 2 L18 6 L28 6" fill="none" stroke="#8C8C8C" stroke-width="1.5"/>
      <text x="38" y="18" font-size="13" font-weight="500" fill="#8C8C8C" class="mono">requirements.txt</text>
    </g>

    <!-- Terminal command at bottom -->
    <rect x="20" y="372" width="480" height="36" rx="6" fill="#1E2130"/>
    <text x="40" y="395" font-size="12" font-weight="500" fill="#A3E0FF" class="mono">$ python3 -m agent.main</text>
  </g>

  <!-- ── Right: Callout Annotations ── -->
  <!-- Dashed connector lines -->
  <line x1="560" y1="320" x2="620" y2="320" stroke="#FF6B35" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="560" y1="390" x2="620" y2="420" stroke="#5B8FF9" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="560" y1="470" x2="620" y2="510" stroke="#52C41A" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- Callout 1: Policy YAML -->
  <g id="anim-callout-policy" transform="translate(620, 258)" filter="url(#card-shadow)">
    <rect width="600" height="100" rx="12" fill="#FFFFFF" stroke="#FF6B35" stroke-width="1.5"/>
    <rect width="8" height="100" rx="4" fill="#FF6B35"/>
    <!-- Scroll icon -->
    <rect x="24" y="24" width="52" height="52" rx="8" fill="#FFF5F0"/>
    <path d="M38 36 L62 36 M38 44 L62 44 M38 52 L54 52" stroke="#FF6B35" stroke-width="2" stroke-linecap="round"/>
    <text x="90" y="44" font-size="18" font-weight="700" fill="#262626">Policy YAML</text>
    <text x="90" y="64" font-size="13" font-weight="400" fill="#8C8C8C">Architect's Blueprint: compliance rules, required_tags</text>
    <text x="90" y="82" font-size="11" font-weight="600" fill="#FF6B35" class="mono">config/tagging-rules.yaml</text>
  </g>

  <!-- Callout 2: Agent Chain Logic -->
  <g id="anim-callout-agent" transform="translate(620, 378)" filter="url(#card-shadow)">
    <rect width="600" height="100" rx="12" fill="#FFFFFF" stroke="#5B8FF9" stroke-width="1.5"/>
    <rect width="8" height="100" rx="4" fill="#5B8FF9"/>
    <!-- Gear-ish icon -->
    <rect x="24" y="24" width="52" height="52" rx="8" fill="#F0F5FF"/>
    <circle cx="50" cy="50" r="14" fill="none" stroke="#5B8FF9" stroke-width="2.5"/>
    <circle cx="50" cy="50" r="5" fill="#5B8FF9"/>
    <path d="M50 32 L50 36 M50 64 L50 68 M32 50 L36 50 M64 50 L68 50" stroke="#5B8FF9" stroke-width="2" stroke-linecap="round"/>
    <text x="90" y="44" font-size="18" font-weight="700" fill="#262626">Agent Chain Logic</text>
    <text x="90" y="64" font-size="13" font-weight="400" fill="#8C8C8C">Decision Engine: LangChain orchestration pipeline</text>
    <text x="90" y="82" font-size="11" font-weight="600" fill="#5B8FF9" class="mono">agent/analyzer.py → main.py</text>
  </g>

  <!-- Callout 3: Provider Config -->
  <g id="anim-callout-env" transform="translate(620, 498)" filter="url(#card-shadow)">
    <rect width="600" height="100" rx="12" fill="#FFFFFF" stroke="#52C41A" stroke-width="1.5"/>
    <rect width="8" height="100" rx="4" fill="#52C41A"/>
    <!-- Key icon -->
    <rect x="24" y="24" width="52" height="52" rx="8" fill="#F6FFE6"/>
    <circle cx="42" cy="42" r="10" fill="none" stroke="#52C41A" stroke-width="2.5"/>
    <line x1="50" y1="50" x2="62" y2="62" stroke="#52C41A" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="58" y1="58" x2="56" y2="66" stroke="#52C41A" stroke-width="2.5" stroke-linecap="round"/>
    <text x="90" y="44" font-size="18" font-weight="700" fill="#262626">Provider Config</text>
    <text x="90" y="64" font-size="13" font-weight="400" fill="#8C8C8C">Power Battery: API keys &amp; endpoint authorization</text>
    <text x="90" y="82" font-size="11" font-weight="600" fill="#52C41A" class="mono">OPENAI_BASE_URL · OPENAI_API_KEY · MODEL_ID</text>
  </g>

  <!-- Bottom insight -->
  <g transform="translate(40, 632)" filter="url(#card-shadow)">
    <rect width="1200" height="52" rx="10" fill="#141414"/>
    <text x="600" y="32" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle">Zero duplication — scanner.py from Section 04 reused as-is.</text>
  </g>

  <text x="1220" y="700" font-size="13" font-weight="500" fill="#BFBFBF" text-anchor="end">4 / 9</text>
</svg>
