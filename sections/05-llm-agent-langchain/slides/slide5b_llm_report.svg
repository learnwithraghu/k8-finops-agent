<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <linearGradient id="accent-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4285F4"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
    <linearGradient id="accent-green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34A853"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>

    <!-- Checkmark Icon -->
    <g id="icon-check">
      <circle cx="0" cy="0" r="8" fill="#34A853"/>
      <path d="M -4 0 L -1 3 L 4 -3" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
    </g>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#accent-blue)"/>

  <!-- Section Badge -->
  <rect x="80" y="35" width="100" height="28" rx="14" fill="#E8F0FE" stroke="#4285F4" stroke-width="1"/>
  <text x="130" y="54" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#4285F4" text-anchor="middle">SECTION 05</text>

  <!-- Slide Header -->
  <text x="80" y="100" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#232F3E">LLM-Enhanced Report</text>
  <text x="80" y="135" font-family="Arial, sans-serif" font-size="18" fill="#607D8B">Context-aware decisions with priority, reasoning, and assigned owners</text>

  <g transform="translate(362, 170)">
    <rect width="555" height="380" rx="14" fill="#E8F5E9" stroke="#34A853" stroke-width="1.5"/>
    <path d="M 0 14 A 14 14 0 0 1 14 0 L 541 0 A 14 14 0 0 1 555 14 L 555 48 L 0 48 Z" fill="url(#accent-green)"/>
    <text x="277" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Section 05: LLM-Enhanced Report</text>

    <!-- Resource Card 1 -->
    <g transform="translate(20, 62)">
      <rect width="515" height="130" rx="10" fill="#FFFFFF" stroke="#C8E6C9" stroke-width="1"/>
      <rect x="0" y="0" width="4" height="130" rx="2" fill="#FF9900"/>

      <text x="18" y="24" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#232F3E">payment-gateway-svc</text>
      <text x="210" y="24" font-family="Arial, sans-serif" font-size="12" fill="#607D8B">(Service)</text>

      <!-- Badges -->
      <rect x="18" y="36" width="110" height="22" rx="11" fill="#FFF3E0" stroke="#FF9900" stroke-width="0.8"/>
      <text x="73" y="51" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle">Category: Unowned</text>

      <rect x="138" y="36" width="95" height="22" rx="11" fill="#FFEBEE" stroke="#EF5350" stroke-width="0.8"/>
      <text x="185" y="51" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Priority: High</text>

      <text x="18" y="80" font-family="Arial, sans-serif" font-size="12" fill="#37474F">
        <tspan font-weight="bold" fill="#1A73E8">Reason:</tspan> Matches alias "app.kubernetes.io/name" → app, but owner unresolvable.
      </text>
      <text x="18" y="100" font-family="Arial, sans-serif" font-size="12" fill="#37474F">
        <tspan font-weight="bold" fill="#2E7D32">Suggested Fix:</tspan> Add tag owner="payment-team" based on service name heuristic.
      </text>
      <text x="18" y="120" font-family="Arial, sans-serif" font-size="12" fill="#37474F">
        <tspan font-weight="bold" fill="#7B1FA2">Ticket Draft:</tspan> Auto-generated GitHub issue body with full context &amp; remediation.
      </text>

      <!-- Annotation pointing to Priority -->
      <path d="M 330 46 Q 300 46 250 47" fill="none" stroke="#34A853" stroke-width="2"/>
      <path d="M 258 42 L 248 47 L 256 52" fill="none" stroke="#34A853" stroke-width="2" stroke-linecap="round"/>
      <text x="340" y="50" font-family="Arial, sans-serif" font-style="italic" font-size="14" font-weight="bold" fill="#34A853">Priority Assigned!</text>

      <!-- Annotation pointing to Ticket Draft -->
      <path d="M 380 145 Q 250 145 180 125" fill="none" stroke="#34A853" stroke-width="2"/>
      <path d="M 188 131 L 178 123 L 186 117" fill="none" stroke="#34A853" stroke-width="2" stroke-linecap="round"/>
      <text x="390" y="149" font-family="Arial, sans-serif" font-style="italic" font-size="14" font-weight="bold" fill="#34A853">Ready for Jira / GitHub</text>
    </g>

    <!-- Resource Card 2 -->
    <g transform="translate(20, 205)">
      <rect width="515" height="105" rx="10" fill="#FFFFFF" stroke="#FFCDD2" stroke-width="1"/>
      <rect x="0" y="0" width="4" height="105" rx="2" fill="#EF5350"/>

      <text x="18" y="24" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#232F3E">payment-db-pvc</text>
      <text x="160" y="24" font-family="Arial, sans-serif" font-size="12" fill="#607D8B">(PersistentVolumeClaim)</text>

      <rect x="18" y="36" width="115" height="22" rx="11" fill="#FFEBEE" stroke="#EF5350" stroke-width="0.8"/>
      <text x="75" y="51" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Category: Orphaned</text>

      <rect x="143" y="36" width="100" height="22" rx="11" fill="#FFEBEE" stroke="#C62828" stroke-width="0.8"/>
      <text x="193" y="51" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Priority: Critical</text>

      <text x="18" y="80" font-family="Arial, sans-serif" font-size="12" fill="#37474F">
        <tspan font-weight="bold" fill="#C62828">Action:</tspan> Orphaned PVC found. Drafting automated deletion ticket to reclaim storage.
      </text>
      <text x="18" y="97" font-family="Arial, sans-serif" font-size="12" fill="#37474F">
        <tspan font-weight="bold" fill="#2E7D32">Owner Route:</tspan> platform-infra@company.com (resolved from namespace metadata).
      </text>

      <!-- Annotation for auto routing -->
      <path d="M 380 120 Q 300 120 280 100" fill="none" stroke="#34A853" stroke-width="2"/>
      <path d="M 288 106 L 278 98 L 286 92" fill="none" stroke="#34A853" stroke-width="2" stroke-linecap="round"/>
      <text x="390" y="124" font-family="Arial, sans-serif" font-style="italic" font-size="14" font-weight="bold" fill="#34A853">Auto-Routed</text>
    </g>

    <!-- Bottom assessment -->
    <rect x="110" y="325" width="335" height="32" rx="16" fill="#C8E6C9" stroke="#34A853" stroke-width="1"/>
    <use href="#icon-check" x="135" y="341"/>
    <text x="277" y="346" font-family="Arial, sans-serif" font-size="12" fill="#2E7D32" text-anchor="middle" font-weight="bold">Actionable decisions, drafted tickets, routed owners</text>
  </g>

  <!-- BOTTOM: Key Takeaway Bar -->
  <rect x="80" y="590" width="1120" height="80" rx="12" fill="#F1F3F4" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="80" y="590" width="6" height="80" rx="3" fill="url(#accent-blue)"/>
  <text x="110" y="622" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4285F4">THE OUTCOME</text>
  <text x="110" y="648" font-family="Arial, sans-serif" font-size="15" fill="#37474F">Instead of dumping raw validation issues for manual triage, the LLM provides contextual decisions, assigns priority</text>
  <text x="110" y="666" font-family="Arial, sans-serif" font-size="15" fill="#37474F">based on resource usage, drafts exact Markdown issue bodies, and suggests specific owners for each violation.</text>
</svg>
