    <path d="M28 35 L32 31 Q36 27 40 31 L44 35" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M34 29 L38 25 Q42 21 46 25 L50 29" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <text x="66" y="30" font-size="18" font-weight="800" fill="#FFFFFF">LangChain OSS</text>
    <text x="66" y="52" font-size="12" font-weight="600" fill="rgba(255,255,255,0.85)" class="mono">prompt | llm | parser</text>

    <!-- Metrics - all green -->
