  <g id="anim-card-azure" transform="translate(300, 252)" filter="url(#card-shadow)">
    <rect width="240" height="340" rx="12" fill="#FFFFFF" stroke="#F0F2F5" stroke-width="1.5"/>
    <rect width="240" height="52" rx="12" fill="#FFF7E6"/>
    <rect width="240" height="12" y="40" fill="#FFF7E6"/>
    <path d="M40 32 Q40 20 52 20 Q54 12 64 14 Q68 8 78 12 Q86 12 86 20 Q96 20 96 30 Q96 40 86 40 L50 40 Q40 40 40 32Z" fill="none" stroke="#BFBFBF" stroke-width="2"/>
    <text x="120" y="30" font-size="15" font-weight="700" fill="#595959" text-anchor="middle">Azure OpenAI</text>
    <text x="120" y="47" font-size="11" font-weight="500" fill="#FA8C16" text-anchor="middle">Heavy SDK</text>

    <g transform="translate(20, 70)">
      <text x="0" y="16" font-size="12" font-weight="600" fill="#8C8C8C">Vendor Lock-in</text>
      <rect x="100" y="4" width="120" height="16" rx="3" fill="#FA8C16" opacity="0.15"/>
      <rect x="100" y="4" width="80" height="16" rx="3" fill="#FA8C16"/>
      <text x="220" y="16" font-size="11" font-weight="700" fill="#FA8C16" text-anchor="end">MED</text>
