      <rect x="100" y="4" width="120" height="16" rx="3" fill="#FA8C16" opacity="0.15"/>
      <rect x="100" y="4" width="50" height="16" rx="3" fill="#FA8C16"/>
      <text x="220" y="16" font-size="11" font-weight="700" fill="#FA8C16" text-anchor="end">OK</text>
    </g>
    <g transform="translate(20, 140)">
