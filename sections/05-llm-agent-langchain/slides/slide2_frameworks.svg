      <text x="0" y="16" font-size="13" font-weight="600" fill="#8C8C8C">Vendor Lock-in</text>
      <rect x="130" y="4" width="225" height="18" rx="4" fill="#F6FFED"/>
      <rect x="130" y="4" width="22" height="18" rx="4" fill="#52C41A"/>
      <text x="355" y="17" font-size="12" font-weight="700" fill="#52C41A" text-anchor="end">NONE ✓</text>
    </g>
    <g transform="translate(24, 124)">
      <text x="0" y="16" font-size="13" font-weight="600" fill="#8C8C8C">Local Testing</text>
      <rect x="130" y="4" width="225" height="18" rx="4" fill="#F6FFED"/>
      <rect x="130" y="4" width="225" height="18" rx="4" fill="#52C41A"/>
      <text x="355" y="17" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="end">EASY ✓</text>
