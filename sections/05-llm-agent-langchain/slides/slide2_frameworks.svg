    <text x="395" y="31" font-size="17" font-weight="700" fill="#5B8FF9" text-anchor="middle">Structured decisions in. Typed JSON out.</text>
  </g>

  <text x="1220" y="690" font-size="13" font-weight="500" fill="#BFBFBF" text-anchor="end">2 / 9</text>
</svg>
