<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=JetBrains+Mono:wght@400;600&amp;display=swap');
      text { font-family: 'Inter', -apple-system, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
    <filter id="card-shadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#1B2559" flood-opacity="0.08"/>
    </filter>
    <filter id="winner-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#5B8FF9" flood-opacity="0.3"/>
    </filter>
    <pattern id="bg-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#F0F2F5" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- White background + grid -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect width="1280" height="720" fill="url(#bg-grid)" opacity="0.6"/>
  <rect x="0" y="0" width="6" height="720" fill="#5B8FF9"/>

  <!-- Header -->
  <rect x="40" y="32" width="160" height="28" rx="4" fill="#F0F5FF"/>
  <text x="120" y="51" font-size="12" font-weight="700" fill="#5B8FF9" text-anchor="middle" letter-spacing="1.5">SECTION 05</text>

  <text x="40" y="110" font-size="44" font-weight="800" fill="#141414" letter-spacing="-1">Agent Harness</text>
  <text x="40" y="162" font-size="44" font-weight="800" fill="#5B8FF9" letter-spacing="-1">Shootout</text>
  <text x="40" y="200" font-size="17" font-weight="400" fill="#8C8C8C">Cloud SDKs lock you in. We need typed local pipelines.</text>
  <line x1="40" y1="222" x2="1240" y2="222" stroke="#F0F2F5" stroke-width="1.5"/>

  <!-- ── Comparison Table ── -->

  <!-- AWS Bedrock -->
  <g id="anim-card-aws" transform="translate(40, 252)" filter="url(#card-shadow)">
    <rect width="240" height="340" rx="12" fill="#FFFFFF" stroke="#F0F2F5" stroke-width="1.5"/>
    <!-- Red header -->
    <rect width="240" height="52" rx="12" fill="#FFF5F3"/>
    <rect width="240" height="12" y="40" fill="#FFF5F3"/>
    <!-- Cloud icon -->
    <path d="M40 32 Q40 20 52 20 Q54 12 64 14 Q68 8 78 12 Q86 12 86 20 Q96 20 96 30 Q96 40 86 40 L50 40 Q40 40 40 32Z" fill="none" stroke="#BFBFBF" stroke-width="2"/>
    <text x="120" y="30" font-size="15" font-weight="700" fill="#595959" text-anchor="middle">AWS Bedrock</text>
    <text x="120" y="47" font-size="11" font-weight="500" fill="#FF4D4F" text-anchor="middle">Cloud Locked</text>

    <!-- Metric rows -->
    <g transform="translate(20, 70)">
      <text x="0" y="16" font-size="12" font-weight="600" fill="#8C8C8C">Vendor Lock-in</text>
      <rect x="100" y="4" width="120" height="16" rx="3" fill="#FF4D4F" opacity="0.15"/>
      <rect x="100" y="4" width="108" height="16" rx="3" fill="#FF4D4F"/>
      <text x="220" y="16" font-size="11" font-weight="700" fill="#FF4D4F" text-anchor="end">HIGH</text>
    </g>
    <g transform="translate(20, 105)">
      <text x="0" y="16" font-size="12" font-weight="600" fill="#8C8C8C">Local Testing</text>
      <rect x="100" y="4" width="120" height="16" rx="3" fill="#FF4D4F" opacity="0.15"/>
      <rect x="100" y="4" width="20" height="16" rx="3" fill="#FF4D4F"/>
      <text x="220" y="16" font-size="11" font-weight="700" fill="#FF4D4F" text-anchor="end">HARD</text>
    </g>
    <g transform="translate(20, 140)">
      <text x="0" y="16" font-size="12" font-weight="600" fill="#8C8C8C">SDK Weight</text>
      <rect x="100" y="4" width="120" height="16" rx="3" fill="#FA8C16" opacity="0.15"/>
      <rect x="100" y="4" width="90" height="16" rx="3" fill="#FA8C16"/>
      <text x="220" y="16" font-size="11" font-weight="700" fill="#FA8C16" text-anchor="end">HEAVY</text>
    </g>
    <g transform="translate(20, 175)">
      <text x="0" y="16" font-size="12" font-weight="600" fill="#8C8C8C">Custom URL</text>
      <rect x="100" y="4" width="120" height="16" rx="3" fill="#FF4D4F" opacity="0.15"/>
      <rect x="100" y="4" width="18" height="16" rx="3" fill="#FF4D4F"/>
      <text x="220" y="16" font-size="11" font-weight="700" fill="#FF4D4F" text-anchor="end">✗</text>
    </g>
    <g transform="translate(20, 210)">
      <text x="0" y="16" font-size="12" font-weight="600" fill="#8C8C8C">Typed Output</text>
      <rect x="100" y="4" width="120" height="16" rx="3" fill="#FA8C16" opacity="0.15"/>
      <rect x="100" y="4" width="45" height="16" rx="3" fill="#FA8C16"/>
      <text x="220" y="16" font-size="11" font-weight="700" fill="#FA8C16" text-anchor="end">MANUAL</text>
    </g>
    <!-- Score -->
    <rect x="20" y="264" width="200" height="44" rx="8" fill="#FFF5F3" stroke="#FFD6C8" stroke-width="1.5"/>
    <text x="120" y="283" font-size="11" font-weight="600" fill="#8C8C8C" text-anchor="middle">FitScore</text>
    <text x="120" y="303" font-size="22" font-weight="900" fill="#FF4D4F" text-anchor="middle">3 / 10</text>
  </g>

