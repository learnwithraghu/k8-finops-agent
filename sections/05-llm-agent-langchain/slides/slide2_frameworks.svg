<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF" />
  
  <defs>
    <!-- Check Icon -->
    <g id="icon-check">
      <circle cx="0" cy="0" r="12" fill="#34A853" />
      <path d="M-5,0 L-2,4 L6,-4" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    </g>
    
    <!-- Cross Icon -->
    <g id="icon-cross">
      <circle cx="0" cy="0" r="12" fill="#EF5350" />
      <path d="M-4,-4 L4,4 M-4,4 L4,-4" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" />
    </g>

    <!-- LangChain Logo -->
    <g id="icon-langchain" transform="scale(1.5) translate(-12, -12)">
      <path d="M7.531 15.976a7.534 7.534 0 000-10.651L2.206 0A7.537 7.537 0 000 5.326c0 1.996.794 3.913 2.206 5.325l5.325 5.325zM18.674 16.469a7.535 7.535 0 00-10.65 0l5.325 5.325a7.536 7.536 0 0010.651 0l-5.326-5.325zM2.218 21.782a7.536 7.536 0 005.326 2.206v-7.531H.012c0 1.996.795 3.914 2.206 5.325zM20.73 8.595a7.534 7.534 0 00-10.651.001l5.325 5.326 5.326-5.327z" fill="#37474F"/>
    </g>

    <!-- Generic Agent Icon (for others) -->
    <g id="icon-agent">
      <circle cx="0" cy="0" r="16" fill="none" stroke="#4285F4" stroke-width="2"/>
      <path d="M-6,-4 L-2,-4 M6,-4 L2,-4 M-4,4 Q0,8 4,4" fill="none" stroke="#4285F4" stroke-width="2" stroke-linecap="round"/>
    </g>
    
    <!-- Cloud Icon -->
    <g id="icon-cloud">
      <path d="M0,10 A8,8 0 0,0 8,2 A10,10 0 0,0 -8,-6 A12,12 0 0,0 -12,10 Z" fill="none" stroke="#4285F4" stroke-width="2.5" stroke-linecap="round" />
    </g>
  </defs>

  <!-- Title -->
  <text x="80" y="80" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#232F3E">The Agent Framework Landscape</text>
  <text x="80" y="120" font-family="Arial, sans-serif" font-size="20" fill="#607D8B">Comparing tools to build our LLM decision engine</text>

  <!-- Framework Cards -->
  
  <!-- LlamaIndex -->
  <g transform="translate(60, 250)">
    <rect x="0" y="0" width="260" height="180" rx="8" fill="#F8F9FA" stroke="#CFD8DC" stroke-width="1.5" />
    <use href="#icon-agent" x="130" y="40" />
    <text x="130" y="90" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#37474F" text-anchor="middle">LlamaIndex</text>
    <text x="130" y="120" font-family="Arial, sans-serif" font-size="16" fill="#607D8B" text-anchor="middle">Excellent for RAG &amp;</text>
    <text x="130" y="145" font-family="Arial, sans-serif" font-size="16" fill="#607D8B" text-anchor="middle">data connections</text>
    <use href="#icon-cross" x="130" y="180" />
  </g>

  <!-- AutoGen -->
  <g transform="translate(340, 250)">
    <rect x="0" y="0" width="260" height="180" rx="8" fill="#F8F9FA" stroke="#CFD8DC" stroke-width="1.5" />
    <use href="#icon-agent" x="130" y="40" />
    <text x="130" y="90" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#37474F" text-anchor="middle">AutoGen / CrewAI</text>
    <text x="130" y="120" font-family="Arial, sans-serif" font-size="16" fill="#607D8B" text-anchor="middle">Multi-agent</text>
    <text x="130" y="145" font-family="Arial, sans-serif" font-size="16" fill="#607D8B" text-anchor="middle">conversational swarms</text>
    <use href="#icon-cross" x="130" y="180" />
  </g>

  <!-- Cloud Managed Agents -->
  <g transform="translate(620, 250)">
    <rect x="0" y="0" width="260" height="180" rx="8" fill="#F8F9FA" stroke="#CFD8DC" stroke-width="1.5" />
    <use href="#icon-cloud" x="130" y="35" />
    <text x="130" y="90" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#37474F" text-anchor="middle">Cloud Agents</text>
    <text x="130" y="120" font-family="Arial, sans-serif" font-size="16" fill="#607D8B" text-anchor="middle">Bedrock / Vertex AI</text>
    <text x="130" y="145" font-family="Arial, sans-serif" font-size="16" fill="#607D8B" text-anchor="middle">Vendor lock-in, harder testing</text>
    <use href="#icon-cross" x="130" y="180" />
  </g>

  <!-- LangChain (Highlighted) -->
  <g transform="translate(900, 230)">
    <rect x="0" y="0" width="280" height="220" rx="12" fill="#E8F0FE" stroke="#4285F4" stroke-width="3" />
    <use href="#icon-langchain" x="140" y="50" />
    <text x="140" y="110" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1E88E5" text-anchor="middle">LangChain</text>
    <text x="140" y="145" font-family="Arial, sans-serif" font-size="18" fill="#37474F" text-anchor="middle">Structured workflows,</text>
    <text x="140" y="170" font-family="Arial, sans-serif" font-size="18" fill="#37474F" text-anchor="middle">robust parsers &amp; adapters</text>
    <use href="#icon-check" x="140" y="220" />
    <!-- Badge -->
    <rect x="195" y="-15" width="90" height="30" rx="15" fill="#34A853" />
    <text x="240" y="5" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFF" text-anchor="middle">Our Choice</text>
  </g>

  <!-- Conclusion text at bottom -->
  <rect x="150" y="520" width="980" height="80" rx="8" fill="#F1F3F4" />
  <text x="640" y="565" font-family="Arial, sans-serif" font-size="20" fill="#232F3E" text-anchor="middle">For K8s FinOps, we don't need swarms of chatting agents. We need <tspan font-weight="bold">predictable, typed data pipelines.</tspan></text>

</svg>
