<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <g id="lucide-cloud">
      <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z" fill="none" stroke="#607D8B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g id="lucide-x">
      <path d="M18 6 6 18" fill="none" stroke="#EF5350" stroke-width="2.2" stroke-linecap="round"/>
      <path d="m6 6 12 12" fill="none" stroke="#EF5350" stroke-width="2.2" stroke-linecap="round"/>
    </g>
    <g id="lucide-check">
      <path d="M20 6 9 17l-5-5" fill="none" stroke="#02C39A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g id="lucide-link">
      <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" fill="none" stroke="#028090" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" fill="none" stroke="#028090" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </defs>

  <rect width="1280" height="720" fill="#FFFFFF"/>

  <g id="anim-titlebar">
    <text x="80" y="88" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#232F3E">Agent Harness Shootout</text>
    <text x="80" y="128" font-family="Arial, sans-serif" font-size="20" fill="#607D8B">Cloud SDKs lock you in. We need typed local pipelines.</text>
  </g>

  <g id="anim-card-aws" transform="translate(80,260)">
    <path d="M 4 6 L 198 4 L 200 148 L 6 150 Z" fill="#FAFAFA" stroke="#232F3E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <use href="#lucide-cloud" x="24" y="24" width="28" height="28"/>
    <text x="24" y="82" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#232F3E">AWS Bedrock</text>
    <use href="#lucide-x" x="24" y="100" width="24" height="24"/>
  </g>

  <g id="anim-card-azure" transform="translate(300,260)">
    <path d="M 6 4 L 200 6 L 198 150 L 4 148 Z" fill="#FAFAFA" stroke="#232F3E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <use href="#lucide-cloud" x="24" y="24" width="28" height="28"/>
    <text x="24" y="82" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#232F3E">Azure OpenAI</text>
    <use href="#lucide-x" x="24" y="100" width="24" height="24"/>
  </g>

  <g id="anim-card-gcp" transform="translate(520,260)">
    <path d="M 4 6 L 198 4 L 200 148 L 6 150 Z" fill="#FAFAFA" stroke="#232F3E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <use href="#lucide-cloud" x="24" y="24" width="28" height="28"/>
    <text x="24" y="82" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#232F3E">GCP Vertex AI</text>
    <use href="#lucide-x" x="24" y="100" width="24" height="24"/>
  </g>

  <g id="anim-card-langchain" transform="translate(780,220)">
    <path d="M 8 6 L 418 4 L 420 268 L 6 270 Z" fill="#F5FFFC" stroke="#02C39A" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 28 28 L 392 26 L 394 52 L 26 54 Z" fill="#02C39A" stroke="none"/>
    <text x="210" y="46" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">WINNER</text>
    <use href="#lucide-link" x="40" y="80" width="36" height="36"/>
    <text x="90" y="108" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#232F3E">LangChain OSS</text>
    <text x="90" y="140" font-family="Arial, sans-serif" font-size="15" fill="#607D8B">prompt | llm | parser</text>
    <g transform="translate(36,170)">
      <use href="#lucide-check" x="0" y="0" width="22" height="22"/>
      <text x="30" y="18" font-family="Arial, sans-serif" font-size="15" fill="#232F3E">typed outputs</text>
    </g>
    <g transform="translate(36,210)">
      <use href="#lucide-check" x="0" y="0" width="22" height="22"/>
      <text x="30" y="18" font-family="Arial, sans-serif" font-size="15" fill="#232F3E">any base_url</text>
    </g>
  </g>

  <g id="anim-bottom-note" transform="translate(80,540)">
    <path d="M 4 6 L 1116 4 L 1118 58 L 6 60 Z" fill="#FAFAFA" stroke="#028090" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="560" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#232F3E" text-anchor="middle">Structured decisions in. Typed JSON out.</text>
  </g>
</svg>
