    <rect width="380" height="360" rx="16" fill="#FFFFFF" stroke="#5B8FF9" stroke-width="2.5"/>
    <!-- Header band -->
    <rect width="380" height="64" rx="16" fill="#5B8FF9"/>
    <rect width="380" height="16" y="48" fill="#5B8FF9"/>
    <!-- Winner badge -->
