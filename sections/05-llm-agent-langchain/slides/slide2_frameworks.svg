    <text x="120" y="283" font-size="11" font-weight="600" fill="#8C8C8C" text-anchor="middle">FitScore</text>
    <text x="120" y="303" font-size="22" font-weight="900" fill="#FF4D4F" text-anchor="middle">4 / 10</text>
  </g>

  <!-- VS Arrow -->
  <text x="823" y="440" font-size="30" font-weight="900" fill="#E8E8E8" text-anchor="middle">VS</text>

