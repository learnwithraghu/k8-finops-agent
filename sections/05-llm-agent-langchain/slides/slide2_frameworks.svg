      <rect x="130" y="4" width="225" height="18" rx="4" fill="#F6FFED"/>
      <rect x="130" y="4" width="225" height="18" rx="4" fill="#52C41A"/>
      <text x="355" y="17" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="end">YES ✓</text>
