<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <g id="lucide-triangle-alert">
      <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3" fill="none" stroke="#EF5350" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M12 9v4" fill="none" stroke="#EF5350" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M12 17h.01" fill="none" stroke="#EF5350" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </defs>

  <rect width="1280" height="720" fill="#FFFFFF"/>

  <g id="anim-titlebar">
    <text x="80" y="88" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#232F3E">Raw Scan Output</text>
    <text x="80" y="128" font-family="Arial, sans-serif" font-size="20" fill="#607D8B">Violations without routing or next steps.</text>
    <path d="M 80 148 L 168 146 L 170 174 L 78 176 Z" fill="#FFF0F2" stroke="#EF5350" stroke-width="1.8" stroke-linecap="round"/>
    <text x="124" y="166" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#EF5350" text-anchor="middle">BEFORE</text>
  </g>

  <g id="anim-terminal" transform="translate(80,200)">
    <path d="M 6 4 L 720 6 L 722 360 L 4 358 Z" fill="#FAFAFA" stroke="#232F3E" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="28" cy="32" r="6" fill="#EF5350"/>
    <circle cx="48" cy="32" r="6" fill="#FFB84D"/>
    <circle cx="68" cy="32" r="6" fill="#02C39A"/>
    <text x="360" y="38" font-family="Arial, sans-serif" font-size="14" fill="#607D8B" text-anchor="middle">section-04 terminal</text>

    <g transform="translate(32,72)">
      <use href="#lucide-triangle-alert" x="0" y="0" width="22" height="22"/>
      <text x="32" y="18" font-family="Courier New, monospace" font-size="15" font-weight="bold" fill="#EF5350">VIOLATION</text>
      <text x="140" y="18" font-family="Courier New, monospace" font-size="14" fill="#232F3E">payment-gateway-svc</text>
      <text x="32" y="52" font-family="Courier New, monospace" font-size="13" fill="#607D8B">Missing tag: owner</text>
      <text x="32" y="78" font-family="Courier New, monospace" font-size="13" fill="#607D8B">Missing tag: cost-center</text>
    </g>

    <path d="M 28 200 L 660 198 L 662 248 L 26 250 Z" fill="#FFF8F8" stroke="#EF5350" stroke-width="1.8" stroke-linecap="round"/>
    <text x="344" y="228" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#232F3E" text-anchor="middle">Facts only — no draft, no routing</text>
  </g>

  <g id="anim-summary" transform="translate(860,240)">
    <path d="M 4 6 L 296 4 L 298 220 L 6 222 Z" fill="#FAFAFA" stroke="#232F3E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="28" y="48" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#232F3E">Missing</text>
    <g transform="translate(28,80)">
      <use href="#lucide-triangle-alert" x="0" y="0" width="20" height="20"/>
      <text x="30" y="16" font-family="Arial, sans-serif" font-size="15" fill="#232F3E">owner routing</text>
    </g>
    <g transform="translate(28,130)">
      <use href="#lucide-triangle-alert" x="0" y="0" width="20" height="20"/>
      <text x="30" y="16" font-family="Arial, sans-serif" font-size="15" fill="#232F3E">issue draft</text>
    </g>
    <g transform="translate(28,180)">
      <use href="#lucide-triangle-alert" x="0" y="0" width="20" height="20"/>
      <text x="30" y="16" font-family="Arial, sans-serif" font-size="15" fill="#232F3E">priority</text>
    </g>
  </g>
</svg>
