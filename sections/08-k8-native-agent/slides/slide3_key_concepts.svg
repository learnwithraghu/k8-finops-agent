<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <linearGradient id="card-gradient-1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="card-gradient-2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="card-gradient-3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <linearGradient id="card-gradient-4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#E1BEE7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#F8F9FA"/>
  
  <!-- Title -->
  <text x="640" y="60" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#0F1689" text-anchor="middle">Key Concepts</text>
  
  <!-- 2x2 Grid of Concept Cards -->
  
  <!-- Card 1: Templating -->
  <g>
    <rect x="80" y="120" width="540" height="260" rx="12" fill="url(#card-gradient-1)" stroke="#34A853" stroke-width="3"/>
    <circle cx="180" cy="180" r="32" fill="#34A853"/>
    <text x="180" y="192" font-family="Arial, sans-serif" font-size="36" fill="#FFFFFF" text-anchor="middle">📝</text>
    <text x="250" y="192" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#1E8E3E">Templating</text>
    <text x="100" y="240" font-family="Arial, sans-serif" font-size="18" fill="#3C4043">
      <tspan x="100" dy="0">• Go template syntax: {{ .Values.key }}</tspan>
      <tspan x="100" dy="30">• Replace hardcoded values dynamically</tspan>
      <tspan x="100" dy="30">• Reusable across environments</tspan>
      <tspan x="100" dy="30">• Example: {{ .Values.schedule }}</tspan>
    </text>
  </g>
  
  <!-- Card 2: ConfigMaps vs Secrets -->
  <g>
    <rect x="660" y="120" width="540" height="260" rx="12" fill="url(#card-gradient-2)" stroke="#1E88E5" stroke-width="3"/>
    <circle cx="760" cy="180" r="32" fill="#1E88E5"/>
    <text x="760" y="192" font-family="Arial, sans-serif" font-size="36" fill="#FFFFFF" text-anchor="middle">🔐</text>
    <text x="830" y="192" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#1565C0">ConfigMaps vs Secrets</text>
    <text x="680" y="240" font-family="Arial, sans-serif" font-size="18" fill="#3C4043">
      <tspan x="680" dy="0">• ConfigMap: tagging rules, LLM config</tspan>
      <tspan x="680" dy="30">• Secret: API keys (external to Helm)</tspan>
      <tspan x="680" dy="30">• Mounted as files in /app/config</tspan>
      <tspan x="680" dy="30">• Security best practice: secrets outside charts</tspan>
    </text>
  </g>
  
  <!-- Card 3: In-Cluster Config -->
  <g>
    <rect x="80" y="420" width="540" height="260" rx="12" fill="url(#card-gradient-3)" stroke="#F57C00" stroke-width="3"/>
    <circle cx="180" cy="480" r="32" fill="#F57C00"/>
    <text x="180" y="492" font-family="Arial, sans-serif" font-size="36" fill="#FFFFFF" text-anchor="middle">☸️</text>
    <text x="250" y="492" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#E65100">In-Cluster Config</text>
    <text x="100" y="540" font-family="Arial, sans-serif" font-size="18" fill="#3C4043">
      <tspan x="100" dy="0">• Uses ServiceAccount token</tspan>
      <tspan x="100" dy="30">• No kubeconfig file needed</tspan>
      <tspan x="100" dy="30">• RBAC: read-only ClusterRole</tspan>
      <tspan x="100" dy="30">• Secure and namespace-scoped</tspan>
    </text>
  </g>
  
  <!-- Card 4: Lifecycle Management -->
  <g>
    <rect x="660" y="420" width="540" height="260" rx="12" fill="url(#card-gradient-4)" stroke="#9C27B0" stroke-width="3"/>
    <circle cx="760" cy="480" r="32" fill="#9C27B0"/>
    <text x="760" y="492" font-family="Arial, sans-serif" font-size="36" fill="#FFFFFF" text-anchor="middle">🔄</text>
    <text x="830" y="492" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#6A1B9A">Lifecycle Management</text>
    <text x="680" y="540" font-family="Arial, sans-serif" font-size="18" fill="#3C4043">
      <tspan x="680" dy="0">• helm install, upgrade, rollback</tspan>
      <tspan x="680" dy="30">• Version tracking and history</tspan>
      <tspan x="680" dy="30">• helm test for validation</tspan>
      <tspan x="680" dy="30">• Standardized deployment workflow</tspan>
    </text>
  </g>
</svg>
