<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <linearGradient id="helm-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F1689"/>
      <stop offset="100%" stop-color="#277FFF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#F8F9FA"/>
  
  <!-- Title -->
  <text x="640" y="60" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#0F1689" text-anchor="middle">Helm Chart Structure</text>
  
  <!-- Directory Tree Box -->
  <rect x="80" y="120" width="520" height="550" rx="8" fill="#263238" stroke="#028090" stroke-width="2"/>
  
  <!-- Tree content -->
  <text font-family="Consolas, monospace" font-size="16" fill="#FFFFFF">
    <tspan x="110" y="160" font-weight="bold" fill="#02C39A">helm/</tspan>
    <tspan x="110" y="190">├── </tspan><tspan fill="#A5D6A7">Chart.yaml</tspan><tspan fill="#78909C">          # Metadata</tspan>
    <tspan x="110" y="220">├── </tspan><tspan fill="#A5D6A7">values.yaml</tspan><tspan fill="#78909C">         # Config</tspan>
    <tspan x="110" y="250">├── </tspan><tspan fill="#A5D6A7">README.md</tspan>
    <tspan x="110" y="280">├── </tspan><tspan fill="#A5D6A7">.helmignore</tspan>
    <tspan x="110" y="310">└── </tspan><tspan font-weight="bold" fill="#02C39A">templates/</tspan>
    <tspan x="140" y="340">├── </tspan><tspan fill="#FFD54F">_helpers.tpl</tspan><tspan fill="#78909C">   # Functions</tspan>
    <tspan x="140" y="370">├── </tspan><tspan fill="#FFD54F">NOTES.txt</tspan><tspan fill="#78909C">      # Post-install</tspan>
    <tspan x="140" y="400">├── </tspan><tspan fill="#FFD54F">namespace.yaml</tspan>
    <tspan x="140" y="430">├── </tspan><tspan fill="#FFD54F">serviceaccount.yaml</tspan>
    <tspan x="140" y="460">├── </tspan><tspan fill="#FFD54F">rbac.yaml</tspan>
    <tspan x="140" y="490">├── </tspan><tspan fill="#FFD54F">configmap.yaml</tspan>
    <tspan x="140" y="520">├── </tspan><tspan fill="#FFD54F">cronjob.yaml</tspan>
    <tspan x="140" y="550">└── </tspan><tspan fill="#FFD54F">test.yaml</tspan><tspan fill="#78909C">      # Helm test</tspan>
  </text>
  
  <!-- Component Cards -->
  <!-- Chart.yaml -->
  <rect x="650" y="120" width="550" height="90" rx="8" fill="#FFFFFF" stroke="#1E88E5" stroke-width="2"/>
  <text x="680" y="150" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0F1689">Chart.yaml</text>
  <text x="680" y="180" font-family="Arial, sans-serif" font-size="16" fill="#5F6368">
    Chart metadata: name, version, description
  </text>
  <text x="680" y="202" font-family="Arial, sans-serif" font-size="16" fill="#5F6368">
    Tracks chart version separately from app version
  </text>
  
  <!-- values.yaml -->
  <rect x="650" y="230" width="550" height="90" rx="8" fill="#FFFFFF" stroke="#34A853" stroke-width="2"/>
  <text x="680" y="260" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0F1689">values.yaml</text>
  <text x="680" y="290" font-family="Arial, sans-serif" font-size="16" fill="#5F6368">
    Default configuration: schedule, resources, tagging rules
  </text>
  <text x="680" y="312" font-family="Arial, sans-serif" font-size="16" fill="#5F6368">
    Embeds entire tagging policy as ConfigMap data
  </text>
  
  <!-- templates/ -->
  <rect x="650" y="340" width="550" height="90" rx="8" fill="#FFFFFF" stroke="#F57C00" stroke-width="2"/>
  <text x="680" y="370" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0F1689">templates/</text>
  <text x="680" y="400" font-family="Arial, sans-serif" font-size="16" fill="#5F6368">
    Go templates with {{ .Values }} interpolation
  </text>
  <text x="680" y="422" font-family="Arial, sans-serif" font-size="16" fill="#5F6368">
    Generates namespace, RBAC, ConfigMaps, CronJob
  </text>
  
  <!-- _helpers.tpl -->
  <rect x="650" y="450" width="550" height="90" rx="8" fill="#FFFFFF" stroke="#9C27B0" stroke-width="2"/>
  <text x="680" y="480" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0F1689">_helpers.tpl</text>
  <text x="680" y="510" font-family="Arial, sans-serif" font-size="16" fill="#5F6368">
    Reusable template functions for labels and names
  </text>
  <text x="680" y="532" font-family="Arial, sans-serif" font-size="16" fill="#5F6368">
    DRY principle: Define once, use everywhere
  </text>
  
  <!-- NOTES.txt -->
  <rect x="650" y="560" width="550" height="90" rx="8" fill="#FFFFFF" stroke="#028090" stroke-width="2"/>
  <text x="680" y="590" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0F1689">NOTES.txt</text>
  <text x="680" y="620" font-family="Arial, sans-serif" font-size="16" fill="#5F6368">
    Post-install instructions shown to user
  </text>
  <text x="680" y="642" font-family="Arial, sans-serif" font-size="16" fill="#5F6368">
    Guides next steps after helm install completes
  </text>
</svg>
