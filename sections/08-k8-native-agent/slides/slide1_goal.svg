<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <linearGradient id="helm-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F1689"/>
      <stop offset="100%" stop-color="#277FFF"/>
    </linearGradient>
    <linearGradient id="k8s-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#326CE5"/>
      <stop offset="100%" stop-color="#2450C7"/>
    </linearGradient>
    <linearGradient id="accent-teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#028090"/>
      <stop offset="100%" stop-color="#02C39A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#F8F9FA"/>
  
  <!-- Header bar -->
  <rect width="1280" height="120" fill="url(#helm-blue)"/>
  
  <!-- Title -->
  <text x="640" y="50" font-family="Arial, sans-serif" font-size="24" font-weight="300" fill="#FFFFFF" text-anchor="middle">Section 08</text>
  <text x="640" y="90" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Helm-Based Deployment</text>
  
  <!-- Subtitle -->
  <text x="640" y="170" font-family="Arial, sans-serif" font-size="22" fill="#5F6368" text-anchor="middle" font-style="italic">
    Package the FinOps Agent as a Professional Helm Chart
  </text>
  
  <!-- Goal Box -->
  <rect x="100" y="230" width="1080" height="180" rx="12" fill="#FFFFFF" stroke="#028090" stroke-width="3"/>
  <text x="640" y="270" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#0F1689" text-anchor="middle">🎯 Goal</text>
  <text x="640" y="315" font-family="Arial, sans-serif" font-size="20" fill="#3C4043" text-anchor="middle">
    Deploy Section 05 LLM agent inside Kubernetes as a scheduled CronJob
  </text>
  <text x="640" y="350" font-family="Arial, sans-serif" font-size="20" fill="#3C4043" text-anchor="middle">
    Use Helm for templating, versioning, and lifecycle management
  </text>
  <text x="640" y="385" font-family="Arial, sans-serif" font-size="20" fill="#3C4043" text-anchor="middle">
    Professional packaging - No more raw Kubernetes manifests
  </text>
  
  <!-- Three Key Benefits -->
  <g transform="translate(150, 450)">
    <!-- Benefit 1: Templating -->
    <rect width="300" height="200" rx="8" fill="#E8F5E9" stroke="#34A853" stroke-width="2"/>
    <circle cx="150" cy="50" r="28" fill="#34A853"/>
    <text x="150" y="60" font-family="Arial, sans-serif" font-size="32" fill="#FFFFFF" text-anchor="middle">📝</text>
    <text x="150" y="110" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E8E3E" text-anchor="middle">Templating</text>
    <text x="150" y="140" font-family="Arial, sans-serif" font-size="14" fill="#3C4043" text-anchor="middle">Reusable configs via</text>
    <text x="150" y="162" font-family="Arial, sans-serif" font-size="14" fill="#3C4043" text-anchor="middle">values.yaml</text>
    <text x="150" y="184" font-family="Arial, sans-serif" font-size="14" fill="#3C4043" text-anchor="middle">No hardcoded values</text>
  </g>
  
  <g transform="translate(490, 450)">
    <!-- Benefit 2: Versioning -->
    <rect width="300" height="200" rx="8" fill="#E3F2FD" stroke="#1E88E5" stroke-width="2"/>
    <circle cx="150" cy="50" r="28" fill="#1E88E5"/>
    <text x="150" y="60" font-family="Arial, sans-serif" font-size="32" fill="#FFFFFF" text-anchor="middle">📦</text>
    <text x="150" y="110" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1565C0" text-anchor="middle">Versioning</text>
    <text x="150" y="140" font-family="Arial, sans-serif" font-size="14" fill="#3C4043" text-anchor="middle">Track all changes</text>
    <text x="150" y="162" font-family="Arial, sans-serif" font-size="14" fill="#3C4043" text-anchor="middle">with helm history</text>
    <text x="150" y="184" font-family="Arial, sans-serif" font-size="14" fill="#3C4043" text-anchor="middle">Easy rollback</text>
  </g>
  
  <g transform="translate(830, 450)">
    <!-- Benefit 3: Testing -->
    <rect width="300" height="200" rx="8" fill="#FFF3E0" stroke="#F57C00" stroke-width="2"/>
    <circle cx="150" cy="50" r="28" fill="#F57C00"/>
    <text x="150" y="60" font-family="Arial, sans-serif" font-size="32" fill="#FFFFFF" text-anchor="middle">✅</text>
    <text x="150" y="110" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#E65100" text-anchor="middle">Testing</text>
    <text x="150" y="140" font-family="Arial, sans-serif" font-size="14" fill="#3C4043" text-anchor="middle">Built-in helm test</text>
    <text x="150" y="162" font-family="Arial, sans-serif" font-size="14" fill="#3C4043" text-anchor="middle">Validate deployment</text>
    <text x="150" y="184" font-family="Arial, sans-serif" font-size="14" fill="#3C4043" text-anchor="middle">before production</text>
  </g>
</svg>
