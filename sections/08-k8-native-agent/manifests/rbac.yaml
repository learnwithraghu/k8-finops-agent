apiVersion: v1
kind: ServiceAccount
metadata:
  name: finops-agent
  namespace: finops-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: finops-agent-reader
rules:
  # The agent needs read-only access to the resource types it scans.
  - apiGroups: [""]
    resources: ["namespaces", "pods", "services", "configmaps", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: finops-agent-reader
subjects:
  - kind: ServiceAccount
    name: finops-agent
    namespace: finops-agent
roleRef:
  kind: ClusterRole
  name: finops-agent-reader
  apiGroup: rbac.authorization.k8s.io
