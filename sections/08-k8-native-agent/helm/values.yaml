# Default values for k8-finops-agent Helm chart

# Namespace configuration
namespace:
  name: finops-agent
  labels:
    app.kubernetes.io/name: finops-agent
    app.kubernetes.io/part-of: k8-finops-agent

# Image configuration - assumes local build
image:
  repository: finops-agent
  tag: latest
  pullPolicy: Never  # For local Kind deployment

# Job configuration
# The Helm chart deploys a one-shot Job that runs once on install.
backoffLimit: 1

# Resource limits and requests
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# LLM configuration (non-sensitive)
llm:
  baseUrl: "https://api.ai.kodekloud.com/v1"
  modelId: "gpt-4o"
  maxTokens: 1024
  temperature: 0.3

# Logging configuration
logLevel: INFO

# Secret name (must be created manually before helm install)
secretName: finops-agent-llm

# RBAC configuration
rbac:
  create: true
  serviceAccountName: finops-agent

# Optional: namespace filtering (uncomment to scan only specific namespace)
# targetNamespace: ""

# Tagging rules configuration - embedded from config/tagging-rules.yaml
# Users can customize these rules by editing values.yaml and upgrading the chart
taggingRules:
  # Required tags that must be present on all resources
  required_tags:
    - owner
    - environment
    - cost-center
    - application
    - tier
  
  # Alternative Kubernetes label keys (checked in addition to above)
  label_mappings:
    owner:
      - app.kubernetes.io/owner
      - owner
    environment:
      - app.kubernetes.io/env
      - environment
      - env
    cost-center:
      - app.kubernetes.io/cost-center
      - cost-center
      - costcenter
    application:
      - app.kubernetes.io/name
      - app
      - application
    tier:
      - app.kubernetes.io/tier
      - tier
    compliance:
      - compliance-level
      - compliance
  
  # Airline booking context cost centers
  cost_centers:
    - booking-engine      # Core booking logic
    - payment             # Payment processing
    - inventory           # Flight/hotel inventory
    - customer-service    # Support tools
    - analytics           # Data/analytics
    - platform            # Shared infrastructure
  
  # Valid environments
  environments:
    - dev
    - staging
    - prod
  
  # Valid tiers
  tiers:
    - frontend
    - backend
    - database
    - cache
    - messaging
  
  # Compliance levels
  compliance_levels:
    - pci-dss      # Payment Card Industry
    - sox          # Sarbanes-Oxley
    - standard     # No special compliance
  
  # Resource types to scan
  resource_types:
    - Deployment
    - Service
    - ConfigMap
    - PersistentVolumeClaim
    - Ingress
    - Pod
  
  # Namespaces to exclude from scanning (system namespaces)
  excluded_namespaces:
    - kube-system
    - kube-public
    - kube-node-lease
    - local-path-storage
