apiVersion: v1
kind: Pod
metadata:
  name: {{ include "k8-finops-agent.fullname" . }}-test
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "k8-finops-agent.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  serviceAccountName: {{ include "k8-finops-agent.serviceAccountName" . }}
  restartPolicy: Never
  containers:
    - name: finops-agent-test
      image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
      imagePullPolicy: {{ .Values.image.pullPolicy }}
      command: ["python", "-m", "agent.main"]
      envFrom:
        - configMapRef:
            name: {{ include "k8-finops-agent.fullname" . }}-llm-config
        - secretRef:
            name: {{ .Values.secretName }}
      {{- if .Values.targetNamespace }}
      env:
        - name: TARGET_NAMESPACE
          value: {{ .Values.targetNamespace | quote }}
      {{- end }}
      volumeMounts:
        - name: tagging-rules
          mountPath: /app/config
          readOnly: true
      resources:
        {{- toYaml .Values.resources | nindent 8 }}
  volumes:
    - name: tagging-rules
      configMap:
        name: {{ include "k8-finops-agent.fullname" . }}-tagging-rules
