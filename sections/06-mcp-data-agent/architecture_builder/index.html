<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Section 06: MCP Data Collector Builder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F4F6F8;
      --canvas-bg: #FFFFFF;
      --surface: #F8F9FA;
      --surface-hover: #FFF8F0;
      --border: #D5DBDB;
      --border-glow: #FF9900;
      --accent: #FF9900;
      --accent-dark: #EC7211;
      --text: #232F3E;
      --text-muted: #607D8B;
      --wire: #AAB7B8;
      --wire-active: #FF9900;
      --error: #EF5350;
      --warning: #FF9900;
      --success: #34A853;
      --toolbar-h: 56px;
      --palette-w: 220px;
      --slot-w: 150px;
      --slot-h: 84px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    #toolbar {
      height: var(--toolbar-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: #FFFFFF;
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }

    #toolbar h1 {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .toolbar-left { display: flex; align-items: baseline; gap: 10px; }
    .subtitle { font-size: 0.72rem; color: var(--text-muted); }
    .toolbar-actions { display: flex; gap: 10px; }

    .btn {
      padding: 8px 18px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:hover { background: var(--surface-hover); border-color: var(--border-glow); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      border-color: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      box-shadow: 0 0 16px rgba(255, 153, 0, 0.35);
      transform: translateY(-1px);
    }

    .btn-primary.running {
      animation: pulse-btn 1s ease infinite;
      pointer-events: none;
      opacity: 0.85;
    }

    @keyframes pulse-btn {
      0%, 100% { box-shadow: 0 0 8px rgba(255, 153, 0, 0.3); }
      50% { box-shadow: 0 0 20px rgba(255, 153, 0, 0.55); }
    }

    #app {
      display: flex;
      height: calc(100vh - var(--toolbar-h));
    }

    #palette {
      width: var(--palette-w);
      flex-shrink: 0;
      background: #FFFFFF;
      border-right: 1px solid var(--border);
      padding: 14px 10px;
      overflow-y: auto;
    }

    #palette h2 {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .palette-section { margin-bottom: 14px; }

    .palette-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px 8px 12px;
      margin-bottom: 5px;
      border-radius: 9px;
      border: 1px solid transparent;
      border-left: 3px solid rgba(255, 153, 0, 0.65);
      background: var(--surface);
      cursor: grab;
      transition: all 0.2s;
      user-select: none;
    }

    .palette-item:hover {
      border-color: var(--border-glow);
      background: var(--surface-hover);
      box-shadow: 0 0 10px rgba(255, 153, 0, 0.12);
    }

    .palette-item:active { cursor: grabbing; }

    .palette-item .icon-wrap {
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      flex-shrink: 0;
    }

    .palette-item .icon-wrap svg { width: 18px; height: 18px; }

    .palette-item span {
      font-size: 0.74rem;
      font-weight: 500;
      line-height: 1.2;
    }

    .palette-hint {
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      background: #FFFBF2;
      border: 1px solid rgba(255, 153, 0, 0.25);
      font-size: 0.68rem;
      color: var(--text-muted);
      line-height: 1.55;
    }

    .palette-empty {
      font-size: 0.66rem;
      color: var(--text-muted);
      font-style: italic;
      padding: 4px 2px 8px;
    }

    .palette-placed-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 8px 7px 10px;
      margin-bottom: 5px;
      border-radius: 9px;
      border: 1px solid rgba(52, 168, 83, 0.35);
      border-left: 3px solid var(--success);
      background: #F5FFF8;
      cursor: grab;
      transition: all 0.2s;
      user-select: none;
    }

    .palette-placed-item:hover {
      border-color: var(--success);
      box-shadow: 0 0 10px rgba(52, 168, 83, 0.15);
    }

    .palette-placed-item:active { cursor: grabbing; }

    .palette-placed-item .icon-wrap {
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--success);
      flex-shrink: 0;
    }

    .palette-placed-item .icon-wrap svg { width: 16px; height: 16px; }

    .palette-placed-item .placed-label {
      font-size: 0.7rem;
      font-weight: 500;
      line-height: 1.2;
      flex: 1;
    }

    .palette-placed-item .step-badge {
      font-size: 0.58rem;
      font-weight: 700;
      color: var(--success);
      background: rgba(52, 168, 83, 0.12);
      padding: 2px 6px;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .slot.filled { cursor: grab; }
    .slot.filled:active { cursor: grabbing; }

    #hint-callout {
      position: fixed;
      z-index: 60;
      max-width: 300px;
      padding: 12px 14px;
      border-radius: 10px;
      background: #F0F7FF;
      border: 1px solid rgba(66, 133, 244, 0.35);
      box-shadow: 0 4px 16px rgba(35, 47, 62, 0.12);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    #hint-callout.visible { opacity: 1; }

    #hint-callout.fading { opacity: 0; }

    #hint-callout .hint-title {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #4285F4;
      margin-bottom: 6px;
      font-weight: 700;
    }

    #hint-callout .hint-text {
      font-size: 0.68rem;
      color: var(--text);
      line-height: 1.55;
    }

    .btn-hint {
      border-color: rgba(66, 133, 244, 0.4);
      color: #4285F4;
    }

    .btn-hint:hover {
      background: #F0F7FF;
      border-color: #4285F4;
    }

    .btn-solve {
      border-color: rgba(52, 168, 83, 0.45);
      color: var(--success);
    }

    .btn-solve:hover {
      background: rgba(52, 168, 83, 0.08);
      border-color: var(--success);
    }

    .placement-ghost {
      position: fixed;
      z-index: 1000;
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 8px;
      background: #FFFFFF;
      border: 2px solid var(--success);
      box-shadow: 0 6px 20px rgba(35, 47, 62, 0.18);
      font-size: 0.75rem;
      font-weight: 600;
    }

    .placement-ghost .icon-wrap {
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--success);
      flex-shrink: 0;
    }

    .placement-ghost .icon-wrap svg { width: 16px; height: 16px; }

    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #EEF1F3;
    }

    #canvas-viewport {
      width: 100%;
      height: 100%;
      overflow: hidden;
      cursor: grab;
      touch-action: none;
    }

    #canvas-viewport.panning { cursor: grabbing; }

    #canvas {
      width: 1280px;
      height: 480px;
      position: relative;
      background-color: var(--canvas-bg);
      background-image: radial-gradient(circle, #E8ECED 1px, transparent 1px);
      background-size: 24px 24px;
      transform-origin: 0 0;
      will-change: transform;
    }

    #canvas-frame {
      position: absolute;
      left: 16px;
      top: 64px;
      width: 1248px;
      height: 400px;
      border-radius: 16px;
      border: 1px solid rgba(255, 153, 0, 0.25);
      background: #FAFAFA;
      box-shadow: inset 0 0 30px rgba(255, 153, 0, 0.04);
      pointer-events: none;
      z-index: 0;
    }

    .canvas-controls {
      position: absolute;
      bottom: 52px;
      right: 16px;
      display: flex;
      gap: 6px;
      z-index: 12;
    }

    .canvas-controls .btn {
      padding: 6px 12px;
      min-width: 36px;
      font-size: 0.8rem;
    }

    .row-label {
      position: absolute;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      opacity: 0.7;
    }

    #wire-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .wire-visible {
      fill: none;
      stroke: var(--wire);
      stroke-width: 2;
      transition: stroke 0.2s;
    }

    .wire-visible.active {
      stroke: var(--wire-active);
      stroke-width: 3;
      filter: drop-shadow(0 0 4px rgba(255, 153, 0, 0.5));
    }

    .wire-pulse {
      fill: none;
      stroke: var(--accent);
      stroke-width: 4;
      stroke-linecap: round;
      opacity: 0;
      pointer-events: none;
    }

    .wire-pulse.animating {
      opacity: 1;
      stroke-dasharray: 12 200;
      animation: wire-travel 0.85s linear forwards;
    }

    @keyframes wire-travel {
      from { stroke-dashoffset: 212; }
      to { stroke-dashoffset: -212; }
    }

    .wire-particle {
      fill: var(--accent);
      opacity: 0;
      filter: drop-shadow(0 0 4px rgba(255, 153, 0, 0.6));
    }

    .wire-particle.animating { opacity: 1; }

    #slots-layer {
      position: absolute;
      inset: 0;
      z-index: 2;
    }
    #zones-layer {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .zone-frame {
      position: absolute;
      border-radius: 14px;
      border: 2px dashed rgba(255, 153, 0, 0.35);
      background: rgba(255, 251, 242, 0.45);
    }

    .zone-frame.tint-green {
      border-color: rgba(52, 168, 83, 0.45);
      background: rgba(245, 255, 248, 0.55);
    }

    .zone-frame.tint-red {
      border-color: rgba(239, 83, 80, 0.4);
      background: rgba(255, 248, 248, 0.55);
    }

    .zone-frame.tint-blue {
      border-color: rgba(66, 133, 244, 0.35);
      background: rgba(240, 247, 255, 0.5);
    }

    .zone-frame.tint-amber {
      border-color: rgba(255, 153, 0, 0.4);
      background: rgba(255, 251, 242, 0.65);
    }

    .zone-label {
      position: absolute;
      top: 8px;
      left: 12px;
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      font-weight: 700;
    }

    .slot.hub {
      width: 170px;
      height: 92px;
    }

    .slot.wide {
      width: 220px;
    }

    .wire-visible.dashed {
      stroke-dasharray: 6 6;
    }


    .slot {
      position: absolute;
      width: var(--slot-w);
      height: var(--slot-h);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      transition: box-shadow 0.2s, border-color 0.2s, transform 0.15s;
    }

    .slot.empty {
      border: 2px dashed rgba(255, 153, 0, 0.55);
      background: #FFFBF2;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
      animation: slot-pulse 2.5s ease infinite;
    }

    @keyframes slot-pulse {
      0%, 100% { border-color: rgba(255, 153, 0, 0.4); }
      50% { border-color: rgba(255, 153, 0, 0.75); }
    }

    .slot.filled {
      border: 1.5px solid var(--border);
      background: linear-gradient(145deg, #FFFFFF 0%, var(--surface) 100%);
      box-shadow: 0 2px 12px rgba(35, 47, 62, 0.08), 0 0 10px rgba(255, 153, 0, 0.1);
      cursor: default;
    }

    .slot.drop-target {
      border-color: var(--accent) !important;
      box-shadow: 0 0 18px rgba(255, 153, 0, 0.3);
      transform: scale(1.04);
    }

    .slot.error {
      border-color: var(--error) !important;
      box-shadow: 0 0 16px rgba(239, 83, 80, 0.35);
      animation: shake 0.45s ease;
    }

    .slot.warning {
      border-color: var(--warning) !important;
      box-shadow: 0 0 14px rgba(255, 153, 0, 0.3);
    }

    .slot.success-flash {
      border-color: var(--success) !important;
      box-shadow: 0 0 16px rgba(52, 168, 83, 0.35);
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    .slot-story-hint {
      font-size: 0.64rem;
      color: var(--text-muted);
      font-style: italic;
      padding: 0 8px;
      line-height: 1.35;
    }

    .slot-step {
      font-size: 0.58rem;
      color: var(--accent);
      opacity: 0.85;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .slot-content {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      width: 100%;
    }

    .slot-icon {
      width: 30px;
      height: 30px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 153, 0, 0.1);
      border-radius: 7px;
      color: var(--accent);
    }

    .slot-icon svg { width: 18px; height: 18px; }

    .slot-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-align: left;
      line-height: 1.2;
    }

    .slot-clear {
      position: absolute;
      top: -7px;
      right: -7px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: #FFFFFF;
      color: var(--text-muted);
      font-size: 0.75rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      z-index: 5;
    }

    .slot-clear:hover {
      background: var(--error);
      border-color: var(--error);
      color: #fff;
    }

    #status {
      position: fixed;
      bottom: 14px;
      left: calc(var(--palette-w) + 50%);
      transform: translateX(-50%);
      max-width: 620px;
      padding: 8px 18px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid var(--border);
      font-size: 0.76rem;
      color: var(--text-muted);
      z-index: 10;
      pointer-events: none;
      text-align: center;
      line-height: 1.4;
      box-shadow: 0 2px 12px rgba(35, 47, 62, 0.08);
    }

    #status.active { color: var(--accent); }
    #status.error { color: var(--error); border-color: rgba(239, 83, 80, 0.4); }
    #status.success { color: var(--success); border-color: rgba(52, 168, 83, 0.4); }

    #icon-sprites { display: none; }
  </style>
</head>
<body>

  <div id="toolbar">
    <div class="toolbar-left">
      <h1>Section 06: MCP Data Collector Builder</h1>
      <span class="subtitle">Build the prompt → MCP → raw snapshot loop (no LLM yet)</span>
    </div>
    <div class="toolbar-actions">
      <button class="btn btn-hint" id="btn-hint">Need a hint?</button>
      <button class="btn btn-solve" id="btn-auto-solve">Auto Solve</button>
      <button class="btn" id="btn-reset">Reset</button>
      <button class="btn btn-primary" id="btn-run">▶ Collect Snapshot</button>
    </div>
  </div>

  <div id="app">
    <aside id="palette">
      <div class="palette-section">
        <h2>Available</h2>
        <div id="palette-available"></div>
      </div>
      <div class="palette-section">
        <h2>On canvas</h2>
        <div id="palette-placed"></div>
      </div>
      <div class="palette-hint">
        Placed components move to <strong>On canvas</strong>. Drag them to reassign slots. <strong>Run Flow</strong> validates your work.
      </div>
    </aside>

    <div id="canvas-wrap">
      <div id="canvas-viewport">
        <div id="canvas">
                    <div id="canvas-frame"></div>
          <span class="row-label" style="left: 24px; top: 52px;">MCP hub</span>
          <span class="row-label" style="left: 420px; top: 300px;">JSON sink</span>
          <div id="zones-layer"></div>
          <svg id="wire-layer"></svg>
          <div id="slots-layer"></div>
        </div>
      </div>
      <div class="canvas-controls">
        <button class="btn" id="btn-zoom-out" title="Zoom out" aria-label="Zoom out">−</button>
        <button class="btn" id="btn-zoom-in" title="Zoom in" aria-label="Zoom in">+</button>
        <button class="btn" id="btn-fit" title="Fit diagram">Fit</button>
        <button class="btn" id="btn-center" title="Center diagram">Center</button>
      </div>
      <div id="hint-callout" aria-live="polite" role="status">
        <div class="hint-title">Hint</div>
        <div class="hint-text" id="hint-text"></div>
      </div>
      <div id="status">Route MCP tool spokes into the JSON sink</div>
    </div>
  </div>

  <svg id="icon-sprites" xmlns="http://www.w3.org/2000/svg">
    <symbol id="icon-docker" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 12H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11Z"/>
      <path d="M6 12h.01"/><path d="M10 12h.01"/><path d="M14 12h.01"/>
    </symbol>
    <symbol id="icon-ship" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 21c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.5 0 2.5 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M19.38 20A11.6 11.6 0 0 0 21 14l-9-4-9 4c0 2.9.94 5.34 2.81 7.24"/><path d="M12 10V2l5 4-5 4"/>
    </symbol>
    <symbol id="icon-terminal" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

    </symbol>
    <symbol id="icon-hexagon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
    </symbol>
    <symbol id="icon-folder" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/>

    <symbol id="icon-helm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/>

      <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/>
    </symbol>
    <symbol id="icon-plug" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22v-5"/><path d="M9 8V2"/><path d="M15 8V2"/><path d="M18 8v5a6 6 0 0 1-6 6 6 6 0 0 1-6-6V8Z"/>
    </symbol>
    <symbol id="icon-bot" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/>
    </symbol>
  </svg>

  <script>
  (function () {
    'use strict';

    const SLOT_W = 150;
    const SLOT_H = 84;

    const LAYOUT = {
      runLabel: '▶ Collect Snapshot',

    const DRAG_MIME = 'application/x-builder';

    function setDragPayload(e, type, sourceSlotId) {
      const payload = JSON.stringify({ type, sourceSlotId: sourceSlotId || null });
      e.dataTransfer.setData(DRAG_MIME, payload);
      e.dataTransfer.setData('text/plain', type);
      e.dataTransfer.effectAllowed = 'move';
    }

    function getDragPayload(e) {
      try {
        const raw = e.dataTransfer.getData(DRAG_MIME);
        if (raw) return JSON.parse(raw);
      } catch (_) { /* ignore */ }
      const type = e.dataTransfer.getData('text/plain');
      return type ? { type, sourceSlotId: null } : null;
    }

    function getPlacedTypes() {

    function shuffleArray(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function getDiagramBounds() {
      const pad = 32;
      let minX = 24;
      let minY = 52;
      let maxX = 0;
      let maxY = 0;
      SLOT_DEFS.forEach(slot => {
        minX = Math.min(minX, slot.x);
        minY = Math.min(minY, slot.y);
        maxX = Math.max(maxX, slot.x + SLOT_W);
        maxY = Math.max(maxY, slot.y + SLOT_H);
      });
      return {
        minX: minX - pad,
        minY: minY - pad,
        maxX: maxX + pad,
        maxY: maxY + pad,
      };
    }

    function applyViewTransform() {
      canvasEl.style.transform = `translate(${viewState.x}px, ${viewState.y}px) scale(${viewState.scale})`;
    }

    function fitDiagramToView() {
      const bounds = getDiagramBounds();
      const vw = canvasViewport.clientWidth;
      const vh = canvasViewport.clientHeight;
      const bw = bounds.maxX - bounds.minX;
      const bh = bounds.maxY - bounds.minY;
      const scale = Math.min(
        MAX_SCALE,
        Math.max(MIN_SCALE, Math.min(vw / bw, vh / bh) * 0.92)
      );
      viewState.scale = scale;
      viewState.x = (vw - bw * scale) / 2 - bounds.minX * scale;
      viewState.y = (vh - bh * scale) / 2 - bounds.minY * scale;
      applyViewTransform();
    }

    function centerView() {
      fitDiagramToView();
    }

    function zoomBy(delta, clientX, clientY) {
      if (isRunning) return;
      const rect = canvasViewport.getBoundingClientRect();
      const px = clientX - rect.left;
      const py = clientY - rect.top;
      const oldScale = viewState.scale;
      const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, oldScale + delta));
      const ratio = newScale / oldScale;
      viewState.x = px - ratio * (px - viewState.x);
      viewState.y = py - ratio * (py - viewState.y);
      viewState.scale = newScale;
      applyViewTransform();
    }

    function setupCanvasNavigation() {
      canvasEl.addEventListener('pointerdown', e => {
        if (isRunning) return;
        if (e.target.closest('.slot')) return;
        if (e.button !== 0) return;
        panState = {
          pointerId: e.pointerId,
          startX: e.clientX,
          startY: e.clientY,
          origX: viewState.x,
          origY: viewState.y,
        };
        canvasEl.setPointerCapture(e.pointerId);
        canvasViewport.classList.add('panning');
      });

      canvasEl.addEventListener('pointermove', e => {
        if (!panState || e.pointerId !== panState.pointerId) return;
        viewState.x = panState.origX + (e.clientX - panState.startX);
        viewState.y = panState.origY + (e.clientY - panState.startY);
        applyViewTransform();
      });

      function endPan(e) {
        if (!panState || e.pointerId !== panState.pointerId) return;
        canvasEl.releasePointerCapture(e.pointerId);
        panState = null;
        canvasViewport.classList.remove('panning');
      }

      canvasEl.addEventListener('pointerup', endPan);
      canvasEl.addEventListener('pointercancel', endPan);

      canvasViewport.addEventListener('wheel', e => {
        if (isRunning) return;
        e.preventDefault();
        const delta = e.deltaY > 0 ? -0.08 : 0.08;
        zoomBy(delta, e.clientX, e.clientY);
      }, { passive: false });

      btnZoomIn.addEventListener('click', () => {
        const rect = canvasViewport.getBoundingClientRect();
        zoomBy(0.12, rect.left + rect.width / 2, rect.top + rect.height / 2);
      });

      btnZoomOut.addEventListener('click', () => {
        const rect = canvasViewport.getBoundingClientRect();
        zoomBy(-0.12, rect.left + rect.width / 2, rect.top + rect.height / 2);
      });

      btnFit.addEventListener('click', fitDiagramToView);
      btnCenter.addEventListener('click', centerView);

      window.addEventListener('resize', fitDiagramToView);
    }

    function getSlot(id) {
      return slots.find(s => s.id === id);
    }

    function slotCenter(slot, side) {
      const cx = slot.x + SLOT_W / 2;
      const cy = slot.y + SLOT_H / 2;
      if (side === 'out') return { x: slot.x + SLOT_W, y: cy };
      if (side === 'in') return { x: slot.x, y: cy };
      if (side === 'bottom') return { x: cx, y: slot.y + SLOT_H };
      if (side === 'top') return { x: cx, y: slot.y };
      return { x: cx, y: cy };
    }

    function bezierPath(x1, y1, x2, y2) {
      const dx = Math.abs(x2 - x1) * 0.55;
      const cx1 = x1 + (x2 >= x1 ? dx : -dx);
      const cx2 = x2 - (x2 >= x1 ? dx : -dx);
      return `M ${x1} ${y1} C ${cx1} ${y1}, ${cx2} ${y2}, ${x2} ${y2}`;
    }

    function wirePath(fromId, toId) {
      const from = getSlot(fromId);
      const to = getSlot(toId);
      if (!from || !to) return "";
      const hub = LAYOUT.hubId || "s2";
      const sink = LAYOUT.sinkId || "s8";
      let p1, p2;
      if (toId === hub) {
        p1 = slotCenter(from, "out");
        p2 = slotCenter(to, "in");
      } else if (fromId === hub && toId === sink) {
        p1 = slotCenter(from, "bottom");
        p2 = slotCenter(to, "top");
      } else if (fromId === hub) {
        p1 = slotCenter(from, "right");
        p2 = slotCenter(to, "left");
      } else {
        p1 = slotCenter(from, "out");
        p2 = slotCenter(to, "in");
      }
      return bezierPath(p1.x, p1.y, p2.x, p2.y);
    }

        el.style.height = zone.h + 'px';
        el.innerHTML = '<span class="zone-label">' + zone.label + '</span>';
        layer.appendChild(el);

      const placedSlots = slots.filter(s => s.filled);
      if (!placedSlots.length) {
        container.innerHTML = '<div class="palette-empty">Nothing placed yet</div>';
        return;
      }
      placedSlots.forEach(slot => {
        const meta = COMPONENTS[slot.filled];
        const item = document.createElement('div');
        item.className = 'palette-placed-item';
        item.dataset.type = slot.filled;
        item.dataset.sourceSlotId = slot.id;
        item.draggable = true;
        item.innerHTML = `
          <div class="icon-wrap"><svg><use href="#${meta.icon}"/></svg></div>
          <span class="placed-label">${meta.label}</span>
          <span class="step-badge">Step ${slot.step}</span>`;
        item.addEventListener('dragstart', e => {
          if (isRunning) { e.preventDefault(); return; }
          setDragPayload(e, slot.filled, slot.id);
        });
        container.appendChild(item);
      });
    }

    function renderPalette() {
      renderAvailable();
      renderPlaced();
    }

    function shufflePaletteOrder() {
      availableOrder = shuffleArray(Object.keys(COMPONENTS));
    }

    function assignComponentToSlot(slot, payload) {
      const { type, sourceSlotId } = payload;
      if (!type || !COMPONENTS[type]) return false;

      if (sourceSlotId) {
        const source = getSlot(sourceSlotId);
        if (!source) return false;
        if (source.id === slot.id) return false;
        if (slot.filled) {
          source.filled = slot.filled;
        } else {
          source.filled = null;
        }
        slot.filled = type;
        return true;
      }

      if (!isTypeAvailable(type)) return false;
      slot.filled = type;
      return true;
    }

    function renderWires(activeWireIds) {
      const activeSet = new Set(activeWireIds || []);
      wireLayer.querySelectorAll('.wire-group').forEach(el => el.remove());

      WIRE_DEFS.forEach(wire => {
        const d = wirePath(wire.from, wire.to);
        if (!d) return;

        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.classList.add('wire-group');
        g.dataset.wireId = wire.id;

        const visible = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        visible.setAttribute('d', d);
        visible.classList.add('wire-visible');
        visible.dataset.wireId = wire.id;
        if (activeSet.has(wire.id)) visible.classList.add('active');
        if (wire.dashed) visible.classList.add('dashed');

        const pulse = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        pulse.setAttribute('d', d);
        pulse.classList.add('wire-pulse');
        pulse.dataset.wireId = wire.id;

        const particle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        particle.setAttribute('r', '5');
        particle.classList.add('wire-particle');
        particle.dataset.wireId = wire.id;

        g.appendChild(visible);
        g.appendChild(pulse);
        g.appendChild(particle);
        wireLayer.appendChild(g);
      });
    }

function renderSlots() {
      slotsLayer.innerHTML = '';
      slots.forEach(slot => {
        let cls = 'slot ' + (slot.filled ? 'filled' : 'empty');
        if (slot.hub) cls += ' hub';
        if (slot.wide) cls += ' wide';
        const el = document.createElement('div');
        el.className = cls;
        el.dataset.slotId = slot.id;
        if (slot.zoneTag) el.dataset.zoneTag = slot.zoneTag;
        el.style.left = slot.x + 'px';
        el.style.top = slot.y + 'px';

        if (slot.filled) {
          const meta = COMPONENTS[slot.filled];
          el.innerHTML = `
            <button class="slot-clear" title="Remove" aria-label="Remove">×</button>
            <div class="slot-content">
              <div class="slot-icon"><svg><use href="#${meta.icon}"/></svg></div>
              <div class="slot-label">${meta.label}</div>
            </div>`;
          el.draggable = true;
          el.addEventListener('dragstart', e => {
            if (isRunning) { e.preventDefault(); return; }
            e.stopPropagation();
            setDragPayload(e, slot.filled, slot.id);
          });
          el.querySelector('.slot-clear').addEventListener('click', e => {
            e.stopPropagation();
            if (isRunning) return;
            slot.filled = null;
            renderAll();
            setStatus('Component removed — drag a new one into the slot');
          });
        } else {
          el.innerHTML = `
            <div class="slot-step">Step ${slot.step}</div>
            <div class="slot-story-hint">${slot.storyHint}</div>`;
        }

        el.addEventListener('dragover', e => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'copy';
          el.classList.add('drop-target');
        });

        el.addEventListener('dragleave', () => {
          el.classList.remove('drop-target');
        });

        el.addEventListener('drop', e => {
          e.preventDefault();
          el.classList.remove('drop-target');
          if (isRunning) return;
          const payload = getDragPayload(e);
          if (!payload) return;
          if (assignComponentToSlot(slot, payload)) {
            clearSlotHighlights();
            renderAll();
            setStatus(`Placed ${COMPONENTS[payload.type].label} in step ${slot.step}`, 'active');
          }
        });

        slotsLayer.appendChild(el);
      });
    }

    function renderAll(activeWireIds) {
      renderZones();
      renderSlots();
      renderWires(activeWireIds);
      renderPalette();
    }

    function clearSlotHighlights() {
      document.querySelectorAll('.slot').forEach(el => {
        el.classList.remove('error', 'warning', 'success-flash');
      });
    }

    function getValidationMessage(slot, wrongType) {
      const msgs = VALIDATION_MESSAGES[slot.id];
      if (!msgs) return `Wrong component for step ${slot.step}.`;
      return msgs[wrongType] || msgs.default;
    }


    function getSlotsInValidationOrder() {
      if (typeof VALIDATION_GROUPS !== 'undefined') {
        return VALIDATION_GROUPS.flatMap(g => g.slots.map(getSlot)).filter(Boolean);
      }
      return slots.slice().sort((a, b) => a.step - b.step);
    }

    function focusSlotInView(slotId) {
      const slot = getSlot(slotId);
      if (!slot) return;
      const vw = canvasViewport.clientWidth;
      const vh = canvasViewport.clientHeight;
      const cx = slot.x + SLOT_W / 2;
      const cy = slot.y + SLOT_H / 2;
      const scale = viewState.scale;
      viewState.x = vw / 2 - cx * scale;
      viewState.y = vh / 2 - cy * scale;
      applyViewTransform();
    }

    function hideHintCallout() {
      clearTimeout(hintFadeTimer);
      hintFadeTimer = null;
      hintCallout.classList.remove('visible', 'fading');
    }

    function scheduleHintFade() {
      clearTimeout(hintFadeTimer);
      hintFadeTimer = setTimeout(() => {
        hintCallout.classList.add('fading');
        setTimeout(() => hideHintCallout(), 400);
      }, 10000);
    }

    function positionHintCallout(slotId) {
      const margin = 8;
      const pad = 12;

      if (slotId) {
        focusSlotInView(slotId);
        const slotEl = document.querySelector(`.slot[data-slot-id="${slotId}"]`);
        if (slotEl) {
          const rect = slotEl.getBoundingClientRect();
          hintCallout.style.visibility = 'hidden';
          hintCallout.classList.add('visible');
          const calloutW = hintCallout.offsetWidth || 280;
          const calloutH = hintCallout.offsetHeight || 80;
          let left = rect.left + rect.width / 2 - calloutW / 2;
          let top = rect.bottom + margin;
          if (top + calloutH > window.innerHeight - pad) {
            top = rect.top - calloutH - margin;
          }
          left = Math.max(pad, Math.min(left, window.innerWidth - calloutW - pad));
          top = Math.max(pad, Math.min(top, window.innerHeight - calloutH - pad));
          hintCallout.style.left = left + 'px';
          hintCallout.style.top = top + 'px';
          hintCallout.style.visibility = 'visible';
          return;
        }
      }

      const vp = canvasViewport.getBoundingClientRect();
      hintCallout.style.visibility = 'hidden';
      hintCallout.classList.add('visible');
      const calloutW = hintCallout.offsetWidth || 280;
      const left = Math.max(pad, vp.left + vp.width / 2 - calloutW / 2);
      hintCallout.style.left = left + 'px';
      hintCallout.style.top = (vp.top + 24) + 'px';
      hintCallout.style.visibility = 'visible';
    }

    function resolveAutoPlaceConflicts(targetSlot) {
      const type = targetSlot.expected;
      slots.forEach(s => {
        if (s.id !== targetSlot.id && s.filled === type) {
          s.filled = null;
        }
      });
      if (targetSlot.filled && targetSlot.filled !== type) {
        targetSlot.filled = null;
      }
    }

    function getSourceRectForType(type) {
      const paletteItem = document.querySelector(`#palette-available .palette-item[data-type="${type}"]`);
      if (paletteItem) return paletteItem.getBoundingClientRect();
      const palette = document.getElementById('palette');
      if (palette) {
        const r = palette.getBoundingClientRect();
        return { left: r.left + r.width / 2 - 40, top: r.top + 80, width: 80, height: 36 };
      }
      return { left: window.innerWidth / 2 - 40, top: window.innerHeight / 2 - 18, width: 80, height: 36 };
    }

    function animatePlacementGhost(type, slotId) {
      return new Promise(resolve => {
        const meta = COMPONENTS[type];
        const slotEl = document.querySelector(`.slot[data-slot-id="${slotId}"]`);
        if (!meta || !slotEl) {
          resolve();
          return;
        }

        const from = getSourceRectForType(type);
        const to = slotEl.getBoundingClientRect();
        const ghost = document.createElement('div');
        ghost.className = 'placement-ghost';
        ghost.innerHTML = `
          <div class="icon-wrap"><svg><use href="#${meta.icon}"/></svg></div>
          <span>${meta.label}</span>`;
        document.body.appendChild(ghost);

        const duration = 450;
        const start = performance.now();
        const fromX = from.left + from.width / 2;
        const fromY = from.top + from.height / 2;
        const toX = to.left + to.width / 2;
        const toY = to.top + to.height / 2;

        function tick(now) {
          const t = Math.min(1, (now - start) / duration);
          const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
          const x = fromX + (toX - fromX) * ease;
          const y = fromY + (toY - fromY) * ease;
          const scale = 1 + 0.08 * Math.sin(t * Math.PI);
          ghost.style.left = x + 'px';
          ghost.style.top = y + 'px';
          ghost.style.transform = `translate(-50%, -50%) scale(${scale})`;
          if (t < 1) requestAnimationFrame(tick);
          else {
            ghost.remove();
            resolve();
          }
        }

        ghost.style.left = fromX + 'px';
        ghost.style.top = fromY + 'px';
        ghost.style.transform = 'translate(-50%, -50%)';
        requestAnimationFrame(tick);
      });
    }

    async function autoSolve() {
      if (isRunning) return;
      isRunning = true;
      hideHintCallout();
      clearSlotHighlights();

      const ordered = getSlotsInValidationOrder();
      const needsFix = ordered.filter(s => s.filled !== s.expected);

      for (const slot of needsFix) {
        resolveAutoPlaceConflicts(slot);
        renderAll();
        await sleep(50);
        await animatePlacementGhost(slot.expected, slot.id);
        slot.filled = slot.expected;
        renderAll();
        setStatus(`Placed ${COMPONENTS[slot.expected].label} in step ${slot.step}`, 'active');
        await sleep(120);
      }

      isRunning = false;
      await runValidation();
    }

    function getNextHint() {
      const sorted = slots.slice().sort((a, b) => a.step - b.step);
      const wrong = sorted.find(s => s.filled && s.filled !== s.expected);
      if (wrong) {
        const msg = getValidationMessage(wrong, wrong.filled);
        return {
          slotId: wrong.id,
          text: `Step ${wrong.step} may not be right yet. ${msg.split('.')[0]}.`,
        };
      }
      const empty = sorted.find(s => !s.filled);
      if (!empty) {
        return { slotId: null, text: 'All slots are filled! Press ' + LAYOUT.runLabel.replace('▶ ', '') + ' to validate.' };
      }
      if (lastHintSlotId !== empty.id) {
        hintTiersUsed[empty.id] = 0;
        lastHintSlotId = empty.id;
      }
      const tiers = HINT_TIERS[empty.id] || [`Focus on step ${empty.step}: "${empty.storyHint}"`];
      const tier = hintTiersUsed[empty.id] || 0;
      hintTiersUsed[empty.id] = Math.min(tier + 1, tiers.length);
      return { slotId: empty.id, text: tiers[Math.min(tier, tiers.length - 1)] };
    }

    function showHint() {
      if (isRunning) return;
      const hint = getNextHint();
      hintTextEl.textContent = hint.text;
      hideHintCallout();
      positionHintCallout(hint.slotId);
      scheduleHintFade();
      if (hint.slotId) {
        const el = document.querySelector(`.slot[data-slot-id="${hint.slotId}"]`);
        if (el) {
          el.classList.add('warning');
          setTimeout(() => el.classList.remove('warning'), 1200);
        }
      }
    }

    function animateParticleAlongPath(wireId) {
      return new Promise(resolve => {
        const visible = wireLayer.querySelector(`.wire-visible[data-wire-id="${wireId}"]`);
        const pulse = wireLayer.querySelector(`.wire-pulse[data-wire-id="${wireId}"]`);
        const particle = wireLayer.querySelector(`.wire-particle[data-wire-id="${wireId}"]`);
        if (!visible || !pulse || !particle) {
          resolve();
          return;
        }

        pulse.classList.add('animating');
        const len = visible.getTotalLength();
        const start = performance.now();
        const duration = 750;

        particle.classList.add('animating');

        function tick(now) {
          const t = Math.min(1, (now - start) / duration);
          const pt = visible.getPointAtLength(t * len);
          particle.setAttribute('cx', pt.x);
          particle.setAttribute('cy', pt.y);
          if (t < 1) requestAnimationFrame(tick);
          else {
            pulse.classList.remove('animating');
            resolve();
          }
        }

        requestAnimationFrame(tick);
      });
    }


    async function runValidation() {
      if (isRunning) return;
      isRunning = true;
      btnRun.classList.add('running');
      btnRun.textContent = '● Running…';
      clearSlotHighlights();

      for (const group of VALIDATION_GROUPS) {
        setStatus('Checking ' + group.label + '…', 'active');
        await sleep(200);

        for (const slotId of group.slots) {
          const slot = getSlot(slotId);
          if (!slot) continue;
          const el = document.querySelector('.slot[data-slot-id="' + slot.id + '"]');
          const wireId = SLOT_WIRE_IN[slot.id];

          if (!slot.filled) {
            el.classList.add('warning');
            setStatus(group.label + ': "' + slot.storyHint + '" still needs a component', 'error');
            finishRun();
            return;
          }

          if (slot.filled !== slot.expected) {
            el.classList.add('error');
            setStatus(getValidationMessage(slot, slot.filled), 'error');
            finishRun();
            return;
          }

          const label = COMPONENTS[slot.filled].label;
          setStatus(group.label + ': ' + label + ' ✓', 'active');

          if (wireId) {
            renderWires([wireId]);
            await animateParticleAlongPath(wireId);
          }

          el.classList.add('success-flash');
          await sleep(300);
          el.classList.remove('success-flash');
        }
      }

      renderWires(WIRE_DEFS.map(w => w.id));
      setStatus(LAYOUT.successMsg, 'success');
      await sleep(2000);
      finishRun();
    }

    function finishRun() {
      isRunning = false;
      btnRun.classList.remove('running');
      btnRun.textContent = LAYOUT.runLabel;
    }

    function sleep(ms) {
      return new Promise(r => setTimeout(r, ms));
    }

    function resetAll() {
      if (isRunning) return;
      slots = SLOT_DEFS.map(s => ({ ...s, filled: null }));
      hintTiersUsed = {};
      lastHintSlotId = null;
      hideHintCallout();
      document.querySelectorAll('.placement-ghost').forEach(el => el.remove());
      clearSlotHighlights();
      shufflePaletteOrder();
      renderAll();
      fitDiagramToView();
      setStatus('Drag components onto the slots — order matters');
    }

    btnRun.addEventListener('click', runValidation);
    btnReset.addEventListener('click', resetAll);
    btnHint.addEventListener('click', showHint);
    btnAutoSolve.addEventListener('click', autoSolve);

    setupCanvasNavigation();
    shufflePaletteOrder();
    renderAll();
    fitDiagramToView();
  })();
  </script>
</body>
</html>
