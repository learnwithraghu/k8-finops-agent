apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "k8-finops-agent.fullname" . }}-llm-config
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "k8-finops-agent.labels" . | nindent 4 }}
data:
  OPENAI_BASE_URL: {{ .Values.llm.baseUrl | quote }}
  OPENAI_MODEL_ID: {{ .Values.llm.modelId | quote }}
  OPENAI_MAX_TOKENS: {{ .Values.llm.maxTokens | quote }}
  OPENAI_TEMPERATURE: {{ .Values.llm.temperature | quote }}
  LOG_LEVEL: {{ .Values.logLevel | quote }}
