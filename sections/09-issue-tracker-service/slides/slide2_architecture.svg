<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF" />

  <!-- Slide Header -->
  <text x="80" y="90" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#232F3E">02. Service Architecture</text>
  <text x="80" y="130" font-family="Arial, sans-serif" font-size="20" fill="#607D8B">Dockerized FastAPI backend serving an in-memory Kanban database and UI</text>

  <!-- Left: Clients (Browser & curl/Agent) -->
  <g transform="translate(100, 220)">
    <text x="0" y="-15" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#232F3E">Clients / Triggers</text>

    <!-- Browser Card -->
    <g transform="translate(0, 0)">
      <rect width="240" height="110" rx="8" fill="#F8F9FA" stroke="#4285F4" stroke-width="2"/>
      <rect width="240" height="30" rx="8" fill="#4285F4"/>
      <!-- Round corners fix for top of card -->
      <rect y="15" width="240" height="15" fill="#4285F4"/>
      <text x="120" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Web Browser</text>
      
      <text x="120" y="60" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#232F3E" text-anchor="middle">Kanban Board UI</text>
      <text x="120" y="85" font-family="Courier New, monospace" font-size="12" fill="#546E7A" text-anchor="middle">http://localhost:8085</text>
    </g>

    <!-- CLI/Agent Card -->
    <g transform="translate(0, 150)">
      <rect width="240" height="110" rx="8" fill="#F8F9FA" stroke="#FF9900" stroke-width="2"/>
      <rect width="240" height="30" rx="8" fill="#FF9900"/>
      <!-- Round corners fix -->
      <rect y="15" width="240" height="15" fill="#FF9900"/>
      <text x="120" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Python Agent / curl</text>
      
      <text x="120" y="60" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#232F3E" text-anchor="middle">API Calls (JSON)</text>
      <text x="120" y="85" font-family="Courier New, monospace" font-size="12" fill="#546E7A" text-anchor="middle">POST /create-issue</text>
    </g>
  </g>

  <!-- Connectors from Clients to Docker Container -->
  <!-- Browser line -->
  <path d="M 340 275 L 480 275" stroke="#4285F4" stroke-width="3" stroke-dasharray="4 4" />
  <path d="M 480 270 L 495 275 L 480 280 Z" fill="#4285F4" />
  <text x="410" y="260" font-family="Arial, sans-serif" font-size="12" fill="#4285F4" text-anchor="middle">HTTP GET</text>

  <!-- Agent line -->
  <path d="M 340 425 L 480 425" stroke="#FF9900" stroke-width="3" />
  <path d="M 480 420 L 495 425 L 480 430 Z" fill="#FF9900" />
  <text x="410" y="410" font-family="Arial, sans-serif" font-size="12" fill="#FF9900" text-anchor="middle">REST HTTP API</text>

  <!-- Right: Docker Container -->
  <g transform="translate(520, 180)">
    <!-- Container Boundary -->
    <rect width="640" height="380" rx="12" fill="#ECEFF1" stroke="#37474F" stroke-dasharray="8 6" stroke-width="2.5"/>
    <text x="25" y="-15" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#37474F">Docker Container (finops-issue-tracker:latest)</text>
    <text x="615" y="-15" font-family="Arial, sans-serif" font-size="14" fill="#37474F" text-anchor="end">Host Port 8085 → Container Port 8000</text>

    <!-- Inside FastAPI Service -->
    <g transform="translate(30, 40)">
      <rect width="580" height="310" rx="8" fill="#FFFFFF" stroke="#34A853" stroke-width="2"/>
      <rect width="580" height="35" rx="8" fill="#34A853"/>
      <rect y="20" width="580" height="15" fill="#34A853"/>
      <text x="290" y="23" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">FastAPI Application (app/main.py)</text>

      <!-- Sub-Components inside FastAPI -->
      <!-- 1. Endpoints router -->
      <g transform="translate(30, 70)">
        <rect width="230" height="90" rx="6" fill="#F1F8F5" stroke="#34A853" stroke-width="1.5"/>
        <text x="115" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2E7D32" text-anchor="middle">API &amp; Docs Engine</text>
        <text x="115" y="55" font-family="Courier New, monospace" font-size="11" fill="#37474F" text-anchor="middle">/create-issue (POST)</text>
        <text x="115" y="72" font-family="Courier New, monospace" font-size="11" fill="#37474F" text-anchor="middle">/issue/{id} (GET, PATCH)</text>
      </g>

      <!-- 2. Static UI Files -->
      <g transform="translate(320, 70)">
        <rect width="230" height="90" rx="6" fill="#F1F8F5" stroke="#34A853" stroke-width="1.5"/>
        <text x="115" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2E7D32" text-anchor="middle">Static Content Router</text>
        <text x="115" y="55" font-family="Courier New, monospace" font-size="11" fill="#37474F" text-anchor="middle">index.html, styles.css</text>
        <text x="115" y="72" font-family="Courier New, monospace" font-size="11" fill="#37474F" text-anchor="middle">app.js (Kanban Board UI)</text>
      </g>

      <!-- Connector line from endpoints to memory store -->
      <path d="M 145 160 L 145 200" stroke="#34A853" stroke-width="2" />
      <path d="M 145 200 L 140 190 H 150 Z" fill="#34A853" />

      <!-- 3. In-Memory Store -->
      <g transform="translate(30, 200)">
        <rect width="520" height="85" rx="6" fill="#FFF9C4" stroke="#FBC02D" stroke-width="1.5"/>
        <text x="260" y="30" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#F57F17" text-anchor="middle">In-Memory Issue Store (app/store.py)</text>
        <text x="260" y="55" font-family="Arial, sans-serif" font-size="13" fill="#37474F" text-anchor="middle">Simple thread-safe python list dictionary holding issue records</text>
        <text x="260" y="72" font-family="Arial, sans-serif" font-size="11" fill="#757575" text-anchor="middle">*Issues are reset whenever the container is restarted*</text>
      </g>
    </g>
  </g>

  <!-- Bottom Goals Summary -->
  <rect x="80" y="610" width="1120" height="60" rx="8" fill="#F1F3F4" />
  <text x="110" y="646" font-family="Arial, sans-serif" font-size="18" fill="#232F3E"><tspan font-weight="bold" fill="#4285F4">Key concept:</tspan> The issue tracker is fully self-contained inside Docker. It serves the UI and processes REST API requests on a single port (8085).</text>
</svg>
