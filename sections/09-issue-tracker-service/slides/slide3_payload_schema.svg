<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF" />

  <!-- Slide Header -->
  <text x="80" y="90" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#232F3E">03. API Contract &amp; JSON Payload</text>
  <text x="80" y="130" font-family="Arial, sans-serif" font-size="20" fill="#607D8B">Defining the schema required to programmatically create issues from the agent</text>

  <!-- Left: Stylized IDE Window -->
  <g transform="translate(80, 180)">
    <!-- IDE Container -->
    <rect width="520" height="390" rx="12" fill="#1E1E1E" stroke="#333333" stroke-width="2"/>
    <!-- Browser Dots -->
    <circle cx="20" cy="20" r="6" fill="#EF5350" />
    <circle cx="40" cy="20" r="6" fill="#FFB300" />
    <circle cx="60" cy="20" r="6" fill="#34A853" />
    <text x="260" y="25" font-family="Courier New, monospace" font-size="12" fill="#888888" text-anchor="middle">POST /create-issue payload.json</text>
    
    <!-- Code Editor Area -->
    <g transform="translate(20, 50)" font-family="Courier New, monospace" font-size="13" fill="#D4D4D4">
      <!-- Highlight Rects behind key rows for visual connection -->
      <!-- Highlight 1: Resource Metadata (Line 6,7) -->
      <rect x="10" y="88" width="360" height="36" fill="#4285F4" opacity="0.15" rx="4"/>
      <!-- Highlight 2: Financial Metrics (Line 9,11) -->
      <rect x="10" y="142" width="360" height="36" fill="#34A853" opacity="0.15" rx="4"/>
      <!-- Highlight 3: Ownership (Line 12,13) -->
      <rect x="10" y="196" width="360" height="36" fill="#FF9900" opacity="0.15" rx="4"/>

      <!-- Text lines -->
      <text x="10" y="20" fill="#9CDCFE">{</text>
      <text x="30" y="38" fill="#9CDCFE">"title"</text><text x="98" y="38" fill="#D4D4D4">:</text> <text x="110" y="38" fill="#CE9178">"[FinOps] payment - UNALLOCATED"</text><text x="390" y="38" fill="#D4D4D4">,</text>
      <text x="30" y="56" fill="#9CDCFE">"summary"</text><text x="114" y="56" fill="#D4D4D4">:</text> <text x="126" y="56" fill="#CE9178">"Missing owner metadata"</text><text x="320" y="56" fill="#D4D4D4">,</text>
      <text x="30" y="74" fill="#9CDCFE">"category"</text><text x="122" y="74" fill="#D4D4D4">:</text> <text x="134" y="74" fill="#CE9178">"unallocated"</text><text x="240" y="74" fill="#D4D4D4">,</text>
      
      <!-- Highlighted block 1 -->
      <text x="30" y="102" fill="#9CDCFE">"namespace"</text><text x="130" y="102" fill="#D4D4D4">:</text> <text x="142" y="102" fill="#CE9178">"payment"</text><text x="220" y="102" fill="#D4D4D4">,</text>
      <text x="30" y="120" fill="#9CDCFE">"resource_name"</text><text x="162" y="120" fill="#D4D4D4">:</text> <text x="174" y="120" fill="#CE9178">"payment-processor"</text><text x="340" y="120" fill="#D4D4D4">,</text>
      
      <!-- Highlighted block 2 -->
      <text x="30" y="156" fill="#9CDCFE">"priority"</text><text x="122" y="156" fill="#D4D4D4">:</text> <text x="134" y="156" fill="#CE9178">"high"</text><text x="180" y="156" fill="#D4D4D4">,</text>
      <text x="30" y="174" fill="#9CDCFE">"cost_impact"</text><text x="146" y="174" fill="#D4D4D4">:</text> <text x="158" y="174" fill="#B5CEA8">8.47</text><text x="200" y="174" fill="#D4D4D4">,</text>

      <!-- Highlighted block 3 -->
      <text x="30" y="210" fill="#9CDCFE">"suggested_owner"</text><text x="180" y="210" fill="#D4D4D4">:</text> <text x="192" y="210" fill="#CE9178">"payment-team"</text><text x="310" y="210" fill="#D4D4D4">,</text>
      <text x="30" y="228" fill="#9CDCFE">"suggested_cost_center"</text><text x="238" y="228" fill="#D4D4D4">:</text> <text x="250" y="228" fill="#CE9178">"payment"</text><text x="330" y="228" fill="#D4D4D4">,</text>

      <text x="30" y="260" fill="#9CDCFE">"reasoning"</text><text x="122" y="260" fill="#D4D4D4">:</text> <text x="134" y="260" fill="#CE9178">"Missing tags..."</text><text x="260" y="260" fill="#D4D4D4">,</text>
      <text x="30" y="278" fill="#9CDCFE">"source"</text><text x="98" y="278" fill="#D4D4D4">:</text> <text x="110" y="278" fill="#CE9178">"bedrock"</text>
      <text x="10" y="300" fill="#9CDCFE">}</text>
    </g>
  </g>

  <!-- Right: Diagnostic Callout Cards -->
  <g transform="translate(680, 180)">
    
    <!-- Connector Lines (Dotted Paths from IDE highlights to Callout Cards) -->
    <!-- Line 1 to Infrastructure context -->
    <path d="M -230 102 L -50 45 L 0 45" stroke="#4285F4" stroke-width="1.5" stroke-dasharray="3 3" fill="none"/>
    <!-- Line 2 to Financial Metrics -->
    <path d="M -230 162 L -50 155 L 0 155" stroke="#34A853" stroke-width="1.5" stroke-dasharray="3 3" fill="none"/>
    <!-- Line 3 to Ownership Routing -->
    <path d="M -230 216 L -50 265 L 0 265" stroke="#FF9900" stroke-width="1.5" stroke-dasharray="3 3" fill="none"/>

    <!-- Callout Card 1: K8s Infrastructure Metadata -->
    <g transform="translate(0, 0)">
      <rect width="480" height="90" rx="8" fill="#F4F8FD" stroke="#4285F4" stroke-width="1.5"/>
      <text x="20" y="30" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1A73E8">Kubernetes Context</text>
      <text x="20" y="52" font-family="Arial, sans-serif" font-size="13" fill="#37474F">Maps the ticket directly to live Kubernetes objects.</text>
      <text x="20" y="72" font-family="Arial, sans-serif" font-size="12" fill="#546E7A"><tspan font-weight="bold">Fields:</tspan> namespace, resource_name, resource_kind</text>
    </g>

    <!-- Callout Card 2: Financial Impact & Priority -->
    <g transform="translate(0, 110)">
      <rect width="480" height="90" rx="8" fill="#F4FAF5" stroke="#34A853" stroke-width="1.5"/>
      <text x="20" y="30" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#137333">Impact &amp; Priority Evaluation</text>
      <text x="20" y="52" font-family="Arial, sans-serif" font-size="13" fill="#37474F">Estimates the monthly waste to sort and filter issues by ROI.</text>
      <text x="20" y="72" font-family="Arial, sans-serif" font-size="12" fill="#546E7A"><tspan font-weight="bold">Fields:</tspan> cost_impact (float), priority (low | medium | high | critical)</text>
    </g>

    <!-- Callout Card 3: Ownership Routing -->
    <g transform="translate(0, 220)">
      <rect width="480" height="90" rx="8" fill="#FFF9F5" stroke="#FF9900" stroke-width="1.5"/>
      <text x="20" y="30" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#E65100">Ownership &amp; Routing</text>
      <text x="20" y="52" font-family="Arial, sans-serif" font-size="13" fill="#37474F">Provides details for routing the ticket to the correct team.</text>
      <text x="20" y="72" font-family="Arial, sans-serif" font-size="12" fill="#546E7A"><tspan font-weight="bold">Fields:</tspan> suggested_owner, suggested_cost_center</text>
    </g>
  </g>

  <!-- Footer Goals Summary -->
  <rect x="80" y="610" width="1120" height="60" rx="8" fill="#F1F3F4" />
  <text x="110" y="646" font-family="Arial, sans-serif" font-size="18" fill="#232F3E"><tspan font-weight="bold" fill="#4285F4">Why this matters:</tspan> In Section 07, the LLM agent will build this precise payload structure and send it to the tracker to auto-create tickets.</text>
</svg>
