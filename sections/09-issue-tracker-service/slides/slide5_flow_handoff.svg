<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF" />

  <!-- Slide Header -->
  <text x="80" y="90" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#232F3E">05. Ticket Creation &amp; Lifecycle</text>
  <text x="80" y="130" font-family="Arial, sans-serif" font-size="20" fill="#607D8B">Tracking how programmatic API findings materialize on the Kanban board</text>

  <!-- Step 1: Trigger -->
  <g transform="translate(80, 200)">
    <!-- Container -->
    <rect width="280" height="320" rx="12" fill="#F8F9FA" stroke="#FF9900" stroke-width="2" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 L 268 0 A 12 12 0 0 1 280 12 L 280 50 L 0 50 Z" fill="#FF9900" />
    <text x="140" y="32" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">1. API POST Trigger</text>
    
    <!-- API representation -->
    <rect x="20" y="75" width="240" height="225" rx="6" fill="#1E1E1E" />
    <text x="35" y="105" font-family="Courier New, monospace" font-size="13" font-weight="bold" fill="#34A853">POST /create-issue</text>
    
    <text x="35" y="140" font-family="Courier New, monospace" font-size="11" fill="#9CDCFE">{</text>
    <text x="50" y="160" font-family="Courier New, monospace" font-size="11" fill="#9CDCFE">"title"</text><text x="95" y="160" font-family="Courier New, monospace" font-size="11" fill="#D4D4D4">:</text> <text x="105" y="160" font-family="Courier New, monospace" font-size="11" fill="#CE9178">"[FinOps] leak"</text><text x="210" y="160" fill="#D4D4D4">,</text>
    <text x="50" y="180" font-family="Courier New, monospace" font-size="11" fill="#9CDCFE">"cost_impact"</text><text x="130" y="180" font-family="Courier New, monospace" font-size="11" fill="#D4D4D4">:</text> <text x="140" y="180" font-family="Courier New, monospace" font-size="11" fill="#B5CEA8">8.47</text><text x="170" y="180" fill="#D4D4D4">,</text>
    <text x="50" y="200" font-family="Courier New, monospace" font-size="11" fill="#9CDCFE">"priority"</text><text x="115" y="200" font-family="Courier New, monospace" font-size="11" fill="#D4D4D4">:</text> <text x="125" y="200" font-family="Courier New, monospace" font-size="11" fill="#CE9178">"high"</text><text x="170" y="200" fill="#D4D4D4">,</text>
    <text x="50" y="220" font-family="Courier New, monospace" font-size="11" fill="#9CDCFE">"category"</text><text x="115" y="220" font-family="Courier New, monospace" font-size="11" fill="#D4D4D4">:</text> <text x="125" y="220" font-family="Courier New, monospace" font-size="11" fill="#CE9178">"waste"</text>
    <text x="35" y="240" font-family="Courier New, monospace" font-size="11" fill="#9CDCFE">}</text>
  </g>

  <!-- Arrow 1 to 2 -->
  <g transform="translate(380, 360)">
    <path d="M 0 0 L 70 0" stroke="#FF9900" stroke-width="4" />
    <path d="M 70 -8 L 82 0 L 70 8 Z" fill="#FF9900" />
  </g>

  <!-- Step 2: Store Processing -->
  <g transform="translate(480, 200)">
    <rect width="280" height="320" rx="12" fill="#F8F9FA" stroke="#4285F4" stroke-width="2" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 L 268 0 A 12 12 0 0 1 280 12 L 280 50 L 0 50 Z" fill="#4285F4" />
    <text x="140" y="32" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">2. DB Record Created</text>

    <!-- Database properties cards -->
    <g transform="translate(20, 75)">
      <rect width="240" height="50" rx="6" fill="#E8F0FE" stroke="#4285F4" stroke-width="1" />
      <text x="15" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1A73E8">Key Generated:</text>
      <text x="15" y="40" font-family="Courier New, monospace" font-size="13" fill="#232F3E">FINOPS-0001 (auto-increment)</text>
    </g>

    <g transform="translate(20, 140)">
      <rect width="240" height="50" rx="6" fill="#E8F0FE" stroke="#4285F4" stroke-width="1" />
      <text x="15" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1A73E8">Default Status:</text>
      <text x="15" y="40" font-family="Courier New, monospace" font-size="13" fill="#232F3E">status = "backlog"</text>
    </g>

    <g transform="translate(20, 205)">
      <rect width="240" height="75" rx="6" fill="#E8F0FE" stroke="#4285F4" stroke-width="1" />
      <text x="15" y="20" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1A73E8">Timestamps:</text>
      <text x="15" y="38" font-family="Courier New, monospace" font-size="11" fill="#232F3E">created_at: ISO-8601 UTC</text>
      <text x="15" y="55" font-family="Courier New, monospace" font-size="11" fill="#232F3E">updated_at: ISO-8601 UTC</text>
    </g>
  </g>

  <!-- Arrow 2 to 3 -->
  <g transform="translate(780, 360)">
    <path d="M 0 0 L 70 0" stroke="#4285F4" stroke-width="4" />
    <path d="M 70 -8 L 82 0 L 70 8 Z" fill="#4285F4" />
  </g>

  <!-- Step 3: UI Kanban Card -->
  <g transform="translate(880, 200)">
    <rect width="320" height="320" rx="12" fill="#F8F9FA" stroke="#34A853" stroke-width="2" />
    <path d="M 0 12 A 12 12 0 0 1 12 0 L 308 0 A 12 12 0 0 1 320 12 L 320 50 L 0 50 Z" fill="#34A853" />
    <text x="160" y="32" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">3. Kanban Board Updates</text>

    <!-- Mini Board UI Column back drop -->
    <rect x="20" y="70" width="280" height="230" rx="6" fill="#ECEFF1" />
    <text x="35" y="92" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#37474F">BACKLOG COLUMN</text>

    <!-- Kanban Card representation -->
    <g transform="translate(30, 110)">
      <rect width="260" height="120" rx="6" fill="#FFFFFF" stroke="#34A853" stroke-width="1.5" />
      <text x="15" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2E7D32">FINOPS-0001</text>
      
      <!-- Cost Badge -->
      <rect x="180" y="12" width="65" height="20" rx="10" fill="#EAEFD3" />
      <text x="212" y="26" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2E7D32" text-anchor="middle">$8.47/mo</text>

      <text x="15" y="55" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#232F3E">[FinOps] payment - UNALLOCATED</text>
      <text x="15" y="75" font-family="Arial, sans-serif" font-size="11" fill="#757575">Category: unallocated</text>
      
      <line x1="15" y1="90" x2="245" y2="90" stroke="#ECEFF1" stroke-width="1"/>
      <!-- High priority tag -->
      <rect x="15" y="96" width="45" height="16" rx="3" fill="#FFEBEE" />
      <text x="37" y="108" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">HIGH</text>

      <!-- Assignee avatar representation -->
      <circle cx="230" cy="104" r="8" fill="#ECEFF1" stroke="#37474F" stroke-width="1"/>
      <text x="230" y="107" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#37474F" text-anchor="middle">?</text>
    </g>

    <!-- Drag & Drop hint -->
    <path d="M 220 250 C 200 280, 120 280, 100 250" stroke="#34A853" stroke-width="1.5" stroke-dasharray="3 3" fill="none" />
    <path d="M 100 250 L 105 255 M 100 250 L 108 247" stroke="#34A853" stroke-width="1.5" />
    <text x="160" y="278" font-family="Arial, sans-serif" font-size="11" fill="#34A853" text-anchor="middle">Interactive drag &amp; drop to To Do / In Progress / Done</text>
  </g>

  <!-- Footer Goals Summary -->
  <rect x="80" y="610" width="1120" height="60" rx="8" fill="#F1F3F4" />
  <text x="110" y="646" font-family="Arial, sans-serif" font-size="18" fill="#232F3E"><tspan font-weight="bold" fill="#4285F4">Developer Action:</tspan> Moving a ticket triggers a <tspan font-family="Courier New, monospace" font-weight="bold">PATCH /issue/{id}</tspan> call. The board UI handles both drag-and-drop and API updates seamlessly.</text>
</svg>
