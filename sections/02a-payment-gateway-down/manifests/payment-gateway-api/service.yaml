apiVersion: v1
kind: Service
metadata:
  name: payment-gateway-api
  namespace: payment
  labels:
    app: payment-gateway-api
    # Intentionally missing: owner, team, cost-center, tier, environment
spec:
  selector:
    app: payment-gateway-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
