apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-gateway-api-config
  namespace: payment
  labels:
    app: payment-gateway-api
    # Intentionally missing: owner, team, cost-center, tier, environment
data:
  nginx.conf: |
    worker_processes 1;
    events { worker_connections 1024; }
    http {
        server {
            listen 8080;
            server_name _;

            location /health {
                add_header Content-Type application/json always;
                return 200 '{"status":"ok","service":"payment-gateway-api","version":"1.4.2"}';
            }

            location /charge {
                add_header Content-Type application/json always;
                add_header Access-Control-Allow-Origin * always;
                return 200 '{"status":"success","transaction_id":"txn_airpay_1234567890","amount":49900,"currency":"USD","message":"Payment processed successfully"}';
            }

            location / {
                add_header Content-Type application/json always;
                return 404 '{"error":"not_found","message":"Endpoint not found"}';
            }
        }
    }
