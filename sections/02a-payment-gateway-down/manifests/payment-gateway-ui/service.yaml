apiVersion: v1
kind: Service
metadata:
  name: payment-gateway
  namespace: payment
  labels:
    app: payment-gateway
    # Intentionally missing: owner, team, cost-center, tier, environment
spec:
  selector:
    app: payment-gateway
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
