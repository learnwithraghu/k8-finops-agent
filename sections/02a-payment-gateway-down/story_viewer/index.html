<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Section 02a — Payment Gateway Down</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FFFFFF;
      --charcoal: #232F3E;
      --muted: #607D8B;
      --teal: #028090;
      --mint: #02C39A;
      --warm: #FFB84D;
      --red: #EF5350;
      --card: #FAFAFA;
      --tint-ok: #F5FFFC;
      --tint-warn: #FFF8F8;
      --tint-policy: #FFFBF2;
      --nav-h: 88px;
      --header-h: 52px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: Arial, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--charcoal);
    }

    #header {
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      border-bottom: 1px solid #E8ECF0;
      background: #fff;
    }

    #header h1 {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    #header .scene-label {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 600;
    }

    #dots {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #D5DBDB;
      transition: background 0.3s, transform 0.3s;
    }

    .dot.active {
      background: var(--teal);
      transform: scale(1.25);
    }

    .dot.done {
      background: var(--mint);
    }

    #stage-wrap {
      height: calc(100vh - var(--header-h) - var(--nav-h));
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    #stage {
      width: 100%;
      height: 100%;
      max-width: 1920px;
      position: relative;
    }

    .scene {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    .scene.active {
      opacity: 1;
      pointer-events: auto;
    }

    .scene svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Draw-on animation */
    .draw {
      stroke-dasharray: var(--len, 1000);
      stroke-dashoffset: var(--len, 1000);
    }

    .draw.animate {
      animation: drawStroke var(--dur, 0.6s) ease forwards;
      animation-delay: var(--delay, 0s);
    }

    @keyframes drawStroke {
      to { stroke-dashoffset: 0; }
    }

    .fade-in {
      opacity: 0;
    }

    .fade-in.animate {
      animation: fadeIn var(--dur, 0.5s) ease forwards;
      animation-delay: var(--delay, 0s);
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .scale-in {
      opacity: 0;
      transform-origin: center;
      transform: scale(0.6);
    }

    .scale-in.animate {
      animation: scaleIn var(--dur, 0.45s) cubic-bezier(0.34, 1.4, 0.64, 1) forwards;
      animation-delay: var(--delay, 0s);
    }

    @keyframes scaleIn {
      to { opacity: 1; transform: scale(1); }
    }

    .pulse-after.animate {
      animation: subtlePulse 2s ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }

    @keyframes subtlePulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.65; }
    }

    .shake.animate {
      animation: shake 0.5s ease;
      animation-delay: var(--delay, 0s);
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    #nav {
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 36px;
      border-top: 1px solid #E8ECF0;
      background: #fff;
    }

    .nav-btn {
      width: 64px;
      height: 64px;
      border: 2.5px solid var(--charcoal);
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      color: var(--charcoal);
    }

    .nav-btn svg {
      width: 28px;
      height: 28px;
    }

    .nav-btn:hover:not(:disabled) {
      background: var(--tint-ok);
      border-color: var(--teal);
      color: var(--teal);
      transform: scale(1.05);
    }

    .nav-btn:disabled {
      opacity: 0.25;
      cursor: not-allowed;
      border-color: #CBD5E1;
    }

    .nav-btn.hidden {
      visibility: hidden;
      pointer-events: none;
    }

    #nav-hint {
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
      flex: 1;
      padding: 0 20px;
    }

    #nav-hint strong {
      color: var(--teal);
    }
  </style>
</head>
<body>

  <script>
    const SCENES = [
      { id: 'scene-0', title: 'Symptom, not catastrophe', duration: 5200 },
      { id: 'scene-1', title: 'Follow the traffic', duration: 5200 },
      { id: 'scene-2', title: 'The ownership wall', duration: 5800 },
    ];

    let current = 0;
    let animComplete = false;
    let animTimer = null;

    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');
    const sceneLabel = document.getElementById('scene-label');
    const navHint = document.getElementById('nav-hint');
    const dots = document.querySelectorAll('.dot');

    function prepDrawPaths(svg) {
      svg.querySelectorAll('.draw').forEach(el => {
        if (el.getTotalLength) {
          const len = el.getTotalLength();
          el.style.setProperty('--len', len);
          el.style.strokeDasharray = len;
          el.style.strokeDashoffset = len;
        }
      });
    }

    function resetScene(sceneEl) {
      sceneEl.querySelectorAll('.animate').forEach(el => el.classList.remove('animate'));
      sceneEl.querySelectorAll('.draw').forEach(el => {
        if (el.getTotalLength) {
          const len = el.getTotalLength();
          el.style.strokeDashoffset = len;
        }
      });
      sceneEl.querySelectorAll('.fade-in, .scale-in').forEach(el => {
        el.style.opacity = '0';
        if (el.classList.contains('scale-in')) {
          el.style.transform = 'scale(0.6)';
        }
      });
    }

    function playScene(index) {
      if (animTimer) clearTimeout(animTimer);
      animComplete = false;
      btnNext.disabled = true;

      document.querySelectorAll('.scene').forEach((s, i) => {
        s.classList.toggle('active', i === index);
        resetScene(s);
      });

      const sceneEl = document.getElementById(SCENES[index].id);
      const svg = sceneEl.querySelector('svg');
      prepDrawPaths(svg);

      const groups = sceneEl.querySelectorAll('.anim');
      let maxEnd = 0;

      groups.forEach(group => {
        const baseDelay = parseInt(group.dataset.delay || '0', 10);
        const children = group.querySelectorAll('.draw, .fade-in, .scale-in, .shake, .pulse-after');

        children.forEach((child, ci) => {
          const stagger = ci * 120;
          const delay = baseDelay + stagger;
          const dur = child.classList.contains('draw') ? 700 : 500;
          child.style.setProperty('--delay', `${delay}ms`);
          child.style.setProperty('--dur', `${dur}ms`);

          requestAnimationFrame(() => {
            requestAnimationFrame(() => child.classList.add('animate'));
          });

          maxEnd = Math.max(maxEnd, delay + dur);
        });
      });

      const total = Math.max(maxEnd + 400, SCENES[index].duration);
      animTimer = setTimeout(() => {
        animComplete = true;
        if (index < SCENES.length - 1) {
          btnNext.disabled = false;
          navHint.innerHTML = 'Click <strong>→</strong> for the next scene';
        } else {
          navHint.innerHTML = 'End of story — proceed to the <strong>live demo</strong>';
        }
      }, total);

      updateChrome(index);
    }

    function updateChrome(index) {
      sceneLabel.textContent = `Scene ${index + 1} of ${SCENES.length} — ${SCENES[index].title}`;
      btnPrev.classList.toggle('hidden', index === 0);
      btnPrev.disabled = index === 0;

      dots.forEach((d, i) => {
        d.classList.remove('active', 'done');
        if (i === index) d.classList.add('active');
        else if (i < index) d.classList.add('done');
      });

      if (index === 0) {
        navHint.innerHTML = 'Watch the whiteboard draw… then click <strong>→</strong> to continue';
      }
    }

    function goTo(index) {
      if (index < 0 || index >= SCENES.length) return;
      current = index;
      playScene(current);
    }

    btnNext.addEventListener('click', () => {
      if (!animComplete || current >= SCENES.length - 1) return;
      goTo(current + 1);
    });

    btnPrev.addEventListener('click', () => {
      if (current <= 0) return;
      goTo(current - 1);
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' && animComplete && current < SCENES.length - 1) {
        goTo(current + 1);
      } else if (e.key === 'ArrowLeft' && current > 0) {
        goTo(current - 1);
      } else if (e.key === 'f' || e.key === 'F') {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen?.();
        } else {
          document.exitFullscreen?.();
        }
      }
    });

    // Init
    document.querySelectorAll('.scene svg').forEach(prepDrawPaths);
    playScene(0);
  </script>
</body>
</html>
