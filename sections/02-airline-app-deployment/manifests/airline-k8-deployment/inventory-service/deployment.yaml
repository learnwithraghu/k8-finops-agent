apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: inventory
  labels:
    app.kubernetes.io/name: inventory-service
    app.kubernetes.io/tier: backend
    cost-center: inventory
    environment: prod
    owner: inventory-team
    criticality: P2
    # All required tags present - properly tagged baseline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory
  template:
    metadata:
      labels:
        app: inventory
    spec:
      containers:
      - name: inventory
        image: nginx:alpine
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "256Mi"
            cpu: "250m"
