apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-api
  namespace: booking-api
  labels:
    app.kubernetes.io/name: booking-api
    app.kubernetes.io/tier: backend
    cost-center: booking-engine
    environment: prod
    # Missing: owner, criticality
spec:
  replicas: 1
  selector:
    matchLabels:
      app: booking-api
  template:
    metadata:
      labels:
        app: booking-api
    spec:
      containers:
      - name: booking-api
        image: nginx:alpine
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        volumeMounts:
        - name: nginx-conf
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        - name: html-content
          mountPath: /usr/share/nginx/html/index.html
          subPath: index.html
      volumes:
      - name: nginx-conf
        configMap:
          name: booking-api-config
          items:
          - key: nginx.conf
            path: nginx.conf
      - name: html-content
        configMap:
          name: booking-api-config
          items:
          - key: index.html
            path: index.html
