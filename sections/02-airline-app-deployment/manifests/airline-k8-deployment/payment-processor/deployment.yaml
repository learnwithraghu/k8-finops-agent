apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-processor
  namespace: payment
  labels:
    environment: prod
    owner: payments-team
    app.kubernetes.io/tier: backend
    cost-center: payment
    # Missing: application, criticality
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment
  template:
    metadata:
      labels:
        app: payment
    spec:
      containers:
      - name: payment
        image: nginx:alpine
        ports:
        - containerPort: 8443
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "512Mi"
            cpu: "500m"
