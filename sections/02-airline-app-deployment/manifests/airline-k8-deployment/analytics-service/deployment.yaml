apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-collector
  namespace: default
  labels:
    app: analytics
    # Minimal tags - in default namespace with missing required tags
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-collector
  template:
    metadata:
      labels:
        app: analytics-collector
    spec:
      containers:
      - name: analytics
        image: nginx:alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "100m"
