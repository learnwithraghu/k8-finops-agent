<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <!-- Background - Dark Blue/Slate for Demo to differentiate -->
  <rect width="1280" height="720" fill="#1A2238" />

  <!-- Grid decoration overlay -->
  <g stroke="#ffffff" opacity="0.05" stroke-width="1">
    <path d="M 0 90 L 1280 90" />
    <path d="M 0 180 L 1280 180" />
    <path d="M 0 270 L 1280 270" />
    <path d="M 0 360 L 1280 360" />
    <path d="M 0 450 L 1280 450" />
    <path d="M 0 540 L 1280 540" />
    <path d="M 0 630 L 1280 630" />
    <path d="M 160 0 L 160 720" />
    <path d="M 320 0 L 320 720" />
    <path d="M 480 0 L 480 720" />
    <path d="M 640 0 L 640 720" />
    <path d="M 800 0 L 800 720" />
    <path d="M 960 0 L 960 720" />
    <path d="M 1120 0 L 1120 720" />
  </g>

  <!-- Glowing background effect -->
  <circle cx="640" cy="360" r="300" fill="#4285F4" opacity="0.1" filter="blur(80px)" />

  <!-- Demo Header -->
  <rect x="540" y="80" width="200" height="46" rx="23" fill="#FFE9D6" stroke="#FF9900" stroke-width="2" />
  <text x="640" y="110" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#E65100" text-anchor="middle">LIVE DEMO 01</text>

  <text x="640" y="180" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Running &amp; Exploring the Tracker</text>
  <text x="640" y="220" font-family="Arial, sans-serif" font-size="18" fill="#90A4AE" text-anchor="middle">Let's build, launch, and inspect the issue tracker application</text>

  <!-- Step 1 Box -->
  <g transform="translate(180, 270)">
    <rect width="440" height="150" rx="12" fill="#202A44" stroke="#4285F4" stroke-width="2"/>
    <text x="30" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#90A4AE">STEP 1: BUILD THE IMAGE</text>
    <rect x="25" y="55" width="390" height="65" rx="6" fill="#111827" />
    <text x="40" y="93" font-family="Courier New, monospace" font-size="12" fill="#34A853">docker build -t finops-issue-tracker:latest \
  sections/06-issue-tracker-service/service</text>
  </g>

  <!-- Step 2 Box -->
  <g transform="translate(660, 270)">
    <rect width="440" height="150" rx="12" fill="#202A44" stroke="#4285F4" stroke-width="2"/>
    <text x="30" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#90A4AE">STEP 2: RUN THE CONTAINER</text>
    <rect x="25" y="55" width="390" height="65" rx="6" fill="#111827" />
    <text x="40" y="93" font-family="Courier New, monospace" font-size="12" fill="#34A853">docker run --rm -p 8085:8000 \
  --name finops-issue-tracker finops-issue-tracker:latest</text>
  </g>

  <!-- Targets Box -->
  <g transform="translate(180, 460)">
    <rect width="920" height="120" rx="12" fill="#202A44" stroke="#34A853" stroke-width="2"/>
    <text x="30" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#90A4AE">STEP 3: VISIT LOCAL ENDPOINTS</text>
    
    <g transform="translate(30, 60)">
      <!-- Board UI -->
      <text x="20" y="20" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Kanban Board UI:</text>
      <text x="170" y="20" font-family="Courier New, monospace" font-size="16" fill="#34A853">http://localhost:8085</text>

      <!-- Swagger -->
      <text x="480" y="20" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">OpenAPI Swagger Docs:</text>
      <text x="680" y="20" font-family="Courier New, monospace" font-size="16" fill="#34A853">http://localhost:8085/docs</text>
    </g>
  </g>

  <!-- Footer Info -->
  <text x="640" y="660" font-family="Arial, sans-serif" font-size="14" fill="#90A4AE" text-anchor="middle">Verify that you see an empty Kanban Board and that Swagger endpoints are interactive.</text>
</svg>
