<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF" />

  <!-- Slide Header -->
  <text x="80" y="90" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#232F3E">06. Summary &amp; Next Steps</text>
  <text x="80" y="130" font-family="Arial, sans-serif" font-size="20" fill="#607D8B">Bridging human tracking with programmatic agent automation</text>

  <!-- Left: Section 06 Achievements -->
  <g transform="translate(80, 190)">
    <rect width="520" height="360" rx="16" fill="#F8F9FA" stroke="#34A853" stroke-width="2" />
    <path d="M 0 16 A 16 16 0 0 1 16 0 L 504 0 A 16 16 0 0 1 520 16 L 520 60 L 0 60 Z" fill="#34A853" />
    <text x="260" y="38" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">What We Achieved</text>

    <!-- Checklist items -->
    <g transform="translate(30, 95)">
      <!-- Check icon -->
      <circle cx="15" cy="15" r="10" fill="#E6F4EA" stroke="#34A853" stroke-width="1.5"/>
      <path d="M 10 15 L 14 19 L 20 11" fill="none" stroke="#34A853" stroke-width="2" stroke-linecap="round"/>
      <text x="45" y="18" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#232F3E">Deployed Local Tracker</text>
      <text x="45" y="38" font-family="Arial, sans-serif" font-size="14" fill="#546E7A">Built and ran container with FastAPI &amp; UI board</text>
    </g>

    <g transform="translate(30, 175)">
      <circle cx="15" cy="15" r="10" fill="#E6F4EA" stroke="#34A853" stroke-width="1.5"/>
      <path d="M 10 15 L 14 19 L 20 11" fill="none" stroke="#34A853" stroke-width="2" stroke-linecap="round"/>
      <text x="45" y="18" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#232F3E">Established Payload Contracts</text>
      <text x="45" y="38" font-family="Arial, sans-serif" font-size="14" fill="#546E7A">Mapped cost and owner data into FastAPI models</text>
    </g>

    <g transform="translate(30, 255)">
      <circle cx="15" cy="15" r="10" fill="#E6F4EA" stroke="#34A853" stroke-width="1.5"/>
      <path d="M 10 15 L 14 19 L 20 11" fill="none" stroke="#34A853" stroke-width="2" stroke-linecap="round"/>
      <text x="45" y="18" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#232F3E">Demonstrated Manual Handoff</text>
      <text x="45" y="38" font-family="Arial, sans-serif" font-size="14" fill="#546E7A">Created issues via curl and dragged them on board</text>
    </g>
  </g>

  <!-- Right: Section 07 Preview (The Road Ahead) -->
  <g transform="translate(680, 190)">
    <rect width="520" height="360" rx="16" fill="#F8F9FA" stroke="#FF9900" stroke-width="2" />
    <path d="M 0 16 A 16 16 0 0 1 16 0 L 504 0 A 16 16 0 0 1 520 16 L 520 60 L 0 60 Z" fill="#FF9900" />
    <text x="260" y="38" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Next: Section 07 Integration</text>

    <!-- Flow diagram from Agent to Tracker -->
    <g transform="translate(40, 80)">
      <!-- Agent box -->
      <rect x="0" y="30" width="130" height="80" rx="8" fill="#FFE9D6" stroke="#FF9900" stroke-width="2" />
      <text x="65" y="65" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#E65100" text-anchor="middle">Python Agent</text>
      <text x="65" y="85" font-family="Arial, sans-serif" font-size="11" fill="#232F3E" text-anchor="middle">(LangChain/LLM)</text>

      <!-- Connection arrow -->
      <g transform="translate(140, 70)">
        <path d="M 0 0 L 140 0" stroke="#FF9900" stroke-width="4" stroke-dasharray="6 4" />
        <path d="M 140 -8 L 152 0 L 140 8 Z" fill="#FF9900" />
        <text x="70" y="-12" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FF9900" text-anchor="middle">Automated POST</text>
      </g>

      <!-- Tracker box -->
      <rect x="300" y="30" width="130" height="80" rx="8" fill="#E8F0FE" stroke="#4285F4" stroke-width="2" />
      <text x="365" y="65" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1A73E8" text-anchor="middle">Issue Tracker</text>
      <text x="365" y="85" font-family="Arial, sans-serif" font-size="11" fill="#232F3E" text-anchor="middle">(FastAPI Board)</text>
    </g>

    <!-- Details of Section 07 -->
    <g transform="translate(40, 215)">
      <rect width="440" height="110" rx="8" fill="#FFFFFF" stroke="#ECEFF1" stroke-width="1.5" />
      <text x="20" y="28" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#232F3E">The Automation Goal:</text>
      <text x="20" y="52" font-family="Arial, sans-serif" font-size="13" fill="#546E7A">Connect the LLM reasoning agent directly to the tracker API.</text>
      <text x="20" y="72" font-family="Arial, sans-serif" font-size="13" fill="#546E7A">The agent will auto-raise tickets for tag violations, orphaned</text>
      <text x="20" y="92" font-family="Arial, sans-serif" font-size="13" fill="#546E7A">volumes, and over-provisioned CPU allocations.</text>
    </g>
  </g>

  <!-- Footer Goals Summary -->
  <rect x="80" y="610" width="1120" height="60" rx="8" fill="#F1F3F4" />
  <text x="110" y="646" font-family="Arial, sans-serif" font-size="18" fill="#232F3E"><tspan font-weight="bold" fill="#4285F4">Handoff to Section 07:</tspan> Let's transition to connecting our local Python LLM agent directly to the API we just explored.</text>
</svg>
