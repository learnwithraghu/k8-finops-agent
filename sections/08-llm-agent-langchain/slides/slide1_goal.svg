<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=JetBrains+Mono:wght@400;600&amp;display=swap');
      text { font-family: 'Inter', -apple-system, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
    <filter id="card-shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#1B2559" flood-opacity="0.08"/>
    </filter>
    <filter id="accent-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#FF6B35" flood-opacity="0.25"/>
    </filter>
    <!-- Subtle grid pattern -->
    <pattern id="bg-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#F0F2F5" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- White background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect width="1280" height="720" fill="url(#bg-grid)" opacity="0.6"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="720" fill="#5B8FF9"/>

  <!-- Top section label -->
  <rect x="40" y="32" width="160" height="28" rx="4" fill="#F0F5FF"/>
  <text x="120" y="51" font-size="12" font-weight="700" fill="#5B8FF9" text-anchor="middle" letter-spacing="1.5">SECTION 05</text>

  <!-- Main headline -->
  <text x="40" y="110" font-size="44" font-weight="800" fill="#141414" letter-spacing="-1">Data Without</text>
  <text x="40" y="162" font-size="44" font-weight="800" fill="#5B8FF9" letter-spacing="-1">Decisions</text>

  <!-- Subtitle -->
  <text x="40" y="200" font-size="17" font-weight="400" fill="#8C8C8C">Rich K8s facts from Section 04 — still no FinOps decision.</text>

  <!-- Divider line -->
  <line x1="40" y1="222" x2="580" y2="222" stroke="#F0F2F5" stroke-width="1.5"/>

  <!-- ── Left Panel: K8s Data Card ── -->
  <g id="anim-data-card" transform="translate(40, 248)" filter="url(#card-shadow)">
    <rect width="360" height="340" rx="12" fill="#FFFFFF" stroke="#F0F2F5" stroke-width="1.5"/>
    <!-- Card header band -->
    <rect width="360" height="52" rx="12" fill="#5B8FF9"/>
    <rect width="360" height="12" y="40" fill="#5B8FF9"/>
    <!-- Hexagon K8s icon -->
    <polygon points="30,14 44,6 58,14 58,30 44,38 30,30" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
    <circle cx="44" cy="22" r="5" fill="white"/>
    <text x="72" y="30" font-size="16" font-weight="700" fill="#FFFFFF">K8s Facts Bank</text>
    <text x="72" y="47" font-size="11" font-weight="500" fill="rgba(255,255,255,0.75)">Section 04 scanner output</text>

    <!-- Stats row -->
    <g transform="translate(24, 74)">
      <rect width="90" height="64" rx="8" fill="#F6F8FF"/>
      <text x="45" y="34" font-size="22" font-weight="800" fill="#5B8FF9" text-anchor="middle">12</text>
      <text x="45" y="52" font-size="11" font-weight="600" fill="#8C8C8C" text-anchor="middle">Resources</text>
    </g>
    <g transform="translate(126, 74)">
      <rect width="90" height="64" rx="8" fill="#FFF7F0"/>
      <text x="45" y="34" font-size="22" font-weight="800" fill="#FF6B35" text-anchor="middle">8</text>
      <text x="45" y="52" font-size="11" font-weight="600" fill="#8C8C8C" text-anchor="middle">Violations</text>
    </g>
    <g transform="translate(228, 74)">
      <rect width="90" height="64" rx="8" fill="#F6FFF8"/>
      <text x="45" y="34" font-size="22" font-weight="800" fill="#52C41A" text-anchor="middle">4</text>
      <text x="45" y="52" font-size="11" font-weight="600" fill="#8C8C8C" text-anchor="middle">Compliant</text>
    </g>

    <!-- Data list items -->
    <g transform="translate(24, 162)">
      <circle cx="8" cy="8" r="4" fill="#5B8FF9"/>
      <text x="22" y="13" font-size="14" font-weight="600" fill="#262626">labels · cpu · memory · pvc</text>
    </g>
    <g transform="translate(24, 196)">
      <circle cx="8" cy="8" r="4" fill="#5B8FF9"/>
      <text x="22" y="13" font-size="14" font-weight="600" fill="#262626">namespace · orphan status</text>
    </g>
    <g transform="translate(24, 230)">
      <circle cx="8" cy="8" r="4" fill="#5B8FF9"/>
      <text x="22" y="13" font-size="14" font-weight="600" fill="#262626">missing owner · cost-center</text>
    </g>
    <g transform="translate(24, 264)">
      <circle cx="8" cy="8" r="4" fill="#52C41A"/>
      <text x="22" y="13" font-size="14" font-weight="600" fill="#52C41A">scan complete ✓</text>
    </g>

    <!-- Progress bar -->
    <text x="24" y="312" font-size="11" font-weight="600" fill="#8C8C8C">Compliance rate</text>
    <rect x="24" y="318" width="312" height="8" rx="4" fill="#F0F2F5"/>
    <rect x="24" y="318" width="104" height="8" rx="4" fill="#FF6B35"/>
    <text x="340" y="327" font-size="11" font-weight="700" fill="#FF6B35" text-anchor="end">33%</text>
  </g>

  <!-- ── Center: Gap Indicator ── -->
  <g id="anim-gap" transform="translate(440, 340)">
    <!-- Broken chain links -->
    <circle cx="60" cy="40" r="22" fill="none" stroke="#FFE0D0" stroke-width="8"/>
    <circle cx="60" cy="40" r="22" fill="none" stroke="#FF6B35" stroke-width="3" stroke-dasharray="6 4"/>
    <circle cx="100" cy="70" r="22" fill="none" stroke="#FFE0D0" stroke-width="8"/>
    <circle cx="100" cy="70" r="22" fill="none" stroke="#FF6B35" stroke-width="3" stroke-dasharray="6 4"/>
    <!-- X mark in gap -->
    <line x1="74" y1="50" x2="86" y2="62" stroke="#FF6B35" stroke-width="3" stroke-linecap="round"/>
    <line x1="86" y1="50" x2="74" y2="62" stroke="#FF6B35" stroke-width="3" stroke-linecap="round"/>
    <!-- Label -->
    <rect x="15" y="108" width="130" height="38" rx="8" fill="#FFF2EC" stroke="#FF6B35" stroke-width="1.5"/>
    <text x="80" y="123" font-size="11" font-weight="700" fill="#FF6B35" text-anchor="middle">NO BRIDGE</text>
    <text x="80" y="139" font-size="10" font-weight="500" fill="#FF6B35" text-anchor="middle">Broken Parser</text>
  </g>

  <!-- ── Right Panel: Manual Parser card ── -->
  <g id="anim-parser-card" transform="translate(640, 248)" filter="url(#card-shadow)">
    <rect width="360" height="340" rx="12" fill="#FFFFFF" stroke="#FFD6C8" stroke-width="1.5"/>
    <!-- Card header band - red/error style -->
    <rect width="360" height="52" rx="12" fill="#FF6B35"/>
    <rect width="360" height="12" y="40" fill="#FF6B35"/>
    <!-- X icon -->
    <circle cx="32" cy="22" r="12" fill="rgba(255,255,255,0.2)"/>
    <line x1="27" y1="17" x2="37" y2="27" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="37" y1="17" x2="27" y2="27" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <text x="56" y="30" font-size="16" font-weight="700" fill="#FFFFFF">Manual Parser</text>
    <text x="56" y="47" font-size="11" font-weight="500" fill="rgba(255,255,255,0.75)">Brittle if-else code</text>

    <!-- Error items -->
    <g transform="translate(24, 82)">
      <rect width="312" height="52" rx="8" fill="#FFF5F3"/>
      <rect x="0" y="0" width="4" height="52" rx="2" fill="#FF6B35"/>
      <text x="20" y="26" font-size="14" font-weight="700" fill="#262626">Alias mismatch failures</text>
      <text x="20" y="44" font-size="12" font-weight="400" fill="#8C8C8C">label-owner ≠ owner-team</text>
    </g>
    <g transform="translate(24, 150)">
      <rect width="312" height="52" rx="8" fill="#FFF5F3"/>
      <rect x="0" y="0" width="4" height="52" rx="2" fill="#FF6B35"/>
      <text x="20" y="26" font-size="14" font-weight="700" fill="#262626">No owner routing</text>
      <text x="20" y="44" font-size="12" font-weight="400" fill="#8C8C8C">Cannot assign to team</text>
    </g>
    <g transform="translate(24, 218)">
      <rect width="312" height="52" rx="8" fill="#FFF5F3"/>
      <rect x="0" y="0" width="4" height="52" rx="2" fill="#FF6B35"/>
      <text x="20" y="26" font-size="14" font-weight="700" fill="#262626">No issue draft</text>
      <text x="20" y="44" font-size="12" font-weight="400" fill="#8C8C8C">Zero actionable output</text>
    </g>

    <!-- Bottom error tag -->
    <rect x="24" y="288" width="312" height="28" rx="6" fill="#FF6B35" opacity="0.1"/>
    <text x="180" y="307" font-size="12" font-weight="700" fill="#FF6B35" text-anchor="middle">BREAKS WHEN POLICY CHANGES</text>
  </g>

  <!-- ── Bottom CTA Banner ── -->
  <g id="anim-brain-cta" transform="translate(40, 620)" filter="url(#card-shadow)">
    <rect width="960" height="68" rx="12" fill="#141414"/>
    <!-- Left accent -->
    <rect width="8" height="68" rx="4" fill="#5B8FF9"/>
    <!-- Brain icon simplified -->
    <circle cx="46" cy="34" r="18" fill="#5B8FF9" opacity="0.2"/>
    <text x="46" y="40" font-size="20" text-anchor="middle" fill="#5B8FF9">⬡</text>
    <!-- Text -->
    <text x="78" y="30" font-size="20" font-weight="800" fill="#FFFFFF">UPGRADE THE BRAIN</text>
    <text x="78" y="52" font-size="13" font-weight="400" fill="#8C8C8C">LangChain + LLM turns raw facts into structured FinOps decisions</text>
    <!-- Arrow -->
    <text x="920" y="40" font-size="24" fill="#5B8FF9" text-anchor="middle">→</text>
  </g>

  <!-- Section counter -->
  <text x="1220" y="680" font-size="13" font-weight="500" fill="#BFBFBF" text-anchor="end">1 / 9</text>
</svg>
