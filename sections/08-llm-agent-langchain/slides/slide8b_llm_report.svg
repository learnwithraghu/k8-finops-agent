<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=JetBrains+Mono:wght@400;600&amp;display=swap');
      text { font-family: 'Inter', -apple-system, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
    <filter id="card-shadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#1B2559" flood-opacity="0.08"/>
    </filter>
    <filter id="green-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#52C41A" flood-opacity="0.3"/>
    </filter>
    <pattern id="bg-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#F0F2F5" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect width="1280" height="720" fill="url(#bg-grid)" opacity="0.6"/>
  <rect x="0" y="0" width="6" height="720" fill="#52C41A"/>

  <!-- Header with green accent for "after" state -->
  <rect x="40" y="32" width="160" height="28" rx="4" fill="#F6FFED"/>
  <text x="120" y="51" font-size="12" font-weight="700" fill="#52C41A" text-anchor="middle" letter-spacing="1.5">SECTION 05</text>
  <text x="40" y="110" font-size="44" font-weight="800" fill="#141414" letter-spacing="-1">LLM-Enhanced</text>
  <text x="40" y="162" font-size="44" font-weight="800" fill="#52C41A" letter-spacing="-1">Report</text>
  <text x="40" y="200" font-size="17" font-weight="400" fill="#8C8C8C">Same resource. Now it reads like a handoff.</text>

  <!-- AFTER badge -->
  <rect x="40" y="214" width="80" height="28" rx="14" fill="#F6FFED" stroke="#52C41A" stroke-width="1.5"/>
  <text x="80" y="233" font-size="12" font-weight="800" fill="#52C41A" text-anchor="middle" letter-spacing="1">AFTER</text>

  <line x1="40" y1="254" x2="1240" y2="254" stroke="#F0F2F5" stroke-width="1.5"/>

  <!-- ── Left: Surgical Dashboard ── -->
  <g id="anim-report" transform="translate(40, 272)" filter="url(#card-shadow)">
    <rect width="780" height="340" rx="12" fill="#FFFFFF" stroke="#E8EAED" stroke-width="1.5"/>
    <!-- Header -->
    <rect width="780" height="52" rx="12" fill="#F6FFED"/>
    <rect width="780" height="12" y="40" fill="#F6FFED"/>
    <!-- Sparkle icon -->
    <text x="24" y="34" font-size="22" fill="#52C41A">✦</text>
    <text x="52" y="34" font-size="16" font-weight="700" fill="#237804">Surgical Vitals Dashboard</text>
    <!-- ECG line -->
    <path d="M 410 28 L 440 28 L 445 18 L 450 38 L 455 20 L 460 28 L 510 28" fill="none" stroke="#52C41A" stroke-width="2" stroke-linecap="round"/>

    <!-- Resource row: payment-gateway-svc -->
    <g id="anim-card-1" transform="translate(24, 68)">
      <rect width="732" height="120" rx="10" fill="#FAFBFC" stroke="#E8EAED" stroke-width="1.5"/>
      <!-- Resource name -->
      <text x="20" y="38" font-size="18" font-weight="800" fill="#262626">payment-gateway-svc</text>
      <!-- Status badges -->
      <rect x="20" y="50" width="96" height="24" rx="8" fill="#FFFBE6" stroke="#FAAD14" stroke-width="1.5"/>
      <text x="68" y="67" font-size="11" font-weight="800" fill="#7C5000" text-anchor="middle" letter-spacing="1">UNOWNED</text>
      <rect x="128" y="50" width="76" height="24" rx="8" fill="#FFF0F0" stroke="#FF4D4F" stroke-width="1.5"/>
      <text x="166" y="67" font-size="11" font-weight="800" fill="#A8071A" text-anchor="middle" letter-spacing="1">HIGH</text>
      <rect x="216" y="50" width="130" height="24" rx="8" fill="#F0F5FF" stroke="#5B8FF9" stroke-width="1.5"/>
      <text x="281" y="67" font-size="11" font-weight="600" fill="#2563EB" text-anchor="middle">payment-team</text>
      <!-- Treatment line -->
      <text x="20" y="102" font-size="13" font-weight="500" fill="#595959">✅ Suggested Treatment: Assign to payment-team. Add owner + cost-center tags.</text>
    </g>

    <!-- Card 2: Issue Draft -->
    <g id="anim-card-2" transform="translate(24, 204)">
      <rect width="356" height="112" rx="10" fill="#FFFFFF" stroke="#52C41A" stroke-width="1.5"/>
      <rect width="6" height="112" rx="3" fill="#52C41A"/>
      <!-- Clipboard icon area -->
      <rect x="16" y="18" width="40" height="40" rx="6" fill="#F6FFED"/>
      <text x="36" y="42" font-size="18" text-anchor="middle" fill="#52C41A">📋</text>
      <text x="68" y="36" font-size="14" font-weight="700" fill="#262626">Treatment: Issue Draft Ready</text>
      <text x="68" y="54" font-size="12" font-weight="400" fill="#8C8C8C">GitHub issue pre-drafted</text>
      <rect x="16" y="76" width="320" height="24" rx="6" fill="#F6FFED"/>
      <text x="176" y="92" font-size="11" font-weight="600" fill="#237804" text-anchor="middle" class="mono">→ POST /repos/org/k8s-finops/issues</text>
    </g>

    <!-- Card 3: JSON Output -->
    <g id="anim-card-3" transform="translate(396, 204)">
      <rect width="360" height="112" rx="10" fill="#FFFFFF" stroke="#5B8FF9" stroke-width="1.5"/>
      <rect width="6" height="112" rx="3" fill="#5B8FF9"/>
      <rect x="16" y="18" width="40" height="40" rx="6" fill="#F0F5FF"/>
      <text x="36" y="42" font-size="18" text-anchor="middle" fill="#5B8FF9">{ }</text>
      <text x="68" y="36" font-size="14" font-weight="700" fill="#262626">Output: Structured JSON</text>
      <text x="68" y="54" font-size="12" font-weight="400" fill="#8C8C8C">Pydantic ResourceDecision model</text>
      <rect x="16" y="76" width="330" height="24" rx="6" fill="#F0F5FF"/>
      <text x="181" y="92" font-size="11" font-weight="600" fill="#3B82F6" text-anchor="middle" class="mono">is_compliant: false, priority: "high"</text>
    </g>
  </g>

  <!-- ── Right: Handoff / What Next ── -->
  <g id="anim-question" transform="translate(860, 272)" filter="url(#card-shadow)">
    <rect width="380" height="340" rx="12" fill="#FFFFFF" stroke="#E8EAED" stroke-width="1.5"/>
    <!-- Blue top accent -->
    <rect width="380" height="6" rx="3" fill="#5B8FF9"/>

    <!-- Question mark area -->
    <circle cx="190" cy="120" r="60" fill="#F6F8FF" stroke="#C7D7FF" stroke-width="2"/>
    <text x="190" y="136" font-size="64" font-weight="900" fill="#5B8FF9" text-anchor="middle">?</text>

    <text x="190" y="220" font-size="20" font-weight="800" fill="#262626" text-anchor="middle">How do we</text>
    <text x="190" y="248" font-size="20" font-weight="800" fill="#262626" text-anchor="middle">track this?</text>
    <text x="190" y="274" font-size="14" font-weight="400" fill="#8C8C8C" text-anchor="middle">Decisions made — now we need</text>
    <text x="190" y="292" font-size="14" font-weight="400" fill="#8C8C8C" text-anchor="middle">a tracker to store &amp; route them.</text>

    <!-- CTA button -->
    <rect x="70" y="308" width="240" height="20" rx="10" fill="#5B8FF9"/>
    <text x="190" y="323" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">SECTION 06 →</text>
  </g>

  <!-- Improvement metrics row -->
  <g transform="translate(40, 638)">
    <g transform="translate(0, 0)" filter="url(#card-shadow)">
      <rect width="240" height="52" rx="10" fill="#F6FFED" stroke="#52C41A" stroke-width="1"/>
      <text x="120" y="24" font-size="11" font-weight="600" fill="#52C41A" text-anchor="middle">Actionability</text>
      <text x="120" y="42" font-size="18" font-weight="900" fill="#237804" text-anchor="middle">100% ↑</text>
    </g>
    <g transform="translate(256, 0)" filter="url(#card-shadow)">
      <rect width="240" height="52" rx="10" fill="#F6FFED" stroke="#52C41A" stroke-width="1"/>
      <text x="120" y="24" font-size="11" font-weight="600" fill="#52C41A" text-anchor="middle">Owner Routing</text>
      <text x="120" y="42" font-size="18" font-weight="900" fill="#237804" text-anchor="middle">Resolved ✓</text>
    </g>
    <g transform="translate(512, 0)" filter="url(#card-shadow)">
      <rect width="240" height="52" rx="10" fill="#F6FFED" stroke="#52C41A" stroke-width="1"/>
      <text x="120" y="24" font-size="11" font-weight="600" fill="#52C41A" text-anchor="middle">Issue Draft</text>
      <text x="120" y="42" font-size="18" font-weight="900" fill="#237804" text-anchor="middle">Auto-Generated ✓</text>
    </g>
    <g transform="translate(768, 0)" filter="url(#card-shadow)">
      <rect width="240" height="52" rx="10" fill="#F6FFED" stroke="#52C41A" stroke-width="1"/>
      <text x="120" y="24" font-size="11" font-weight="600" fill="#52C41A" text-anchor="middle">Priority Score</text>
      <text x="120" y="42" font-size="18" font-weight="900" fill="#237804" text-anchor="middle">Classified ✓</text>
    </g>
  </g>

  <text x="1220" y="700" font-size="13" font-weight="500" fill="#BFBFBF" text-anchor="end">8b / 9</text>
</svg>
