<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=JetBrains+Mono:wght@400;600&amp;display=swap');
      text { font-family: 'Inter', -apple-system, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
    <filter id="card-shadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#1B2559" flood-opacity="0.08"/>
    </filter>
    <pattern id="bg-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#F0F2F5" stroke-width="1"/>
    </pattern>
    <!-- Arrow markers -->
    <marker id="arr-blue" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#5B8FF9"/>
    </marker>
    <marker id="arr-amber" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#FAAD14"/>
    </marker>
    <marker id="arr-green" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#52C41A"/>
    </marker>
    <marker id="arr-purple" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#722ED1"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect width="1280" height="720" fill="url(#bg-grid)" opacity="0.6"/>
  <rect x="0" y="0" width="6" height="720" fill="#5B8FF9"/>

  <!-- Header -->
  <rect x="40" y="32" width="160" height="28" rx="4" fill="#F0F5FF"/>
  <text x="120" y="51" font-size="12" font-weight="700" fill="#5B8FF9" text-anchor="middle" letter-spacing="1.5">SECTION 05</text>
  <text x="40" y="110" font-size="44" font-weight="800" fill="#141414" letter-spacing="-1">Agent Pipeline</text>
  <text x="40" y="162" font-size="44" font-weight="800" fill="#5B8FF9" letter-spacing="-1">Blocks</text>
  <text x="40" y="200" font-size="17" font-weight="400" fill="#8C8C8C">Scan, fuse, infer, structure, report.</text>
  <line x1="40" y1="222" x2="1240" y2="222" stroke="#F0F2F5" stroke-width="1.5"/>

  <!-- ── Assembly Line ── -->
  <!-- Belt line (horizontal rail) -->
  <rect x="80" y="470" width="1120" height="12" rx="6" fill="#F0F2F5"/>
  <rect x="80" y="472" width="1120" height="8" rx="4" fill="#5B8FF9" opacity="0.15"/>

  <!-- Conveyor rollers -->
  <circle cx="140" cy="484" r="8" fill="#E8EAED" stroke="#D9D9D9" stroke-width="1.5"/>
  <circle cx="290" cy="484" r="8" fill="#E8EAED" stroke="#D9D9D9" stroke-width="1.5"/>
  <circle cx="490" cy="484" r="8" fill="#E8EAED" stroke="#D9D9D9" stroke-width="1.5"/>
  <circle cx="690" cy="484" r="8" fill="#E8EAED" stroke="#D9D9D9" stroke-width="1.5"/>
  <circle cx="890" cy="484" r="8" fill="#E8EAED" stroke="#D9D9D9" stroke-width="1.5"/>
  <circle cx="1100" cy="484" r="8" fill="#E8EAED" stroke="#D9D9D9" stroke-width="1.5"/>

  <!-- Connection arrows between stations -->
  <line x1="222" y1="400" x2="300" y2="400" stroke="#5B8FF9" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="422" y1="400" x2="500" y2="400" stroke="#FAAD14" stroke-width="2" marker-end="url(#arr-amber)"/>
  <line x1="622" y1="400" x2="700" y2="400" stroke="#52C41A" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="822" y1="400" x2="900" y2="400" stroke="#52C41A" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="1022" y1="400" x2="1100" y2="400" stroke="#722ED1" stroke-width="2" marker-end="url(#arr-purple)"/>

  <!-- ── Step 1: K8sScanner ── -->
  <g id="anim-step-1" transform="translate(80, 288)">
    <!-- Arm bracket -->
    <line x1="56" y1="0" x2="56" y2="36" stroke="#E8EAED" stroke-width="3" stroke-linecap="round"/>
    <rect x="40" y="0" width="32" height="8" rx="4" fill="#E8EAED"/>
    <!-- Station circle -->
    <circle cx="56" cy="92" r="56" fill="#F6F8FF" stroke="#5B8FF9" stroke-width="2.5"/>
    <!-- Magnifier icon -->
    <circle cx="48" cy="84" r="18" fill="none" stroke="#5B8FF9" stroke-width="3.5"/>
    <line x1="62" y1="98" x2="76" y2="112" stroke="#5B8FF9" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Labels -->
    <text x="56" y="170" font-size="15" font-weight="700" fill="#262626" text-anchor="middle">K8sScanner</text>
    <rect x="-20" y="180" width="152" height="20" rx="4" fill="#F0F5FF"/>
    <text x="56" y="195" font-size="10" font-weight="700" fill="#5B8FF9" text-anchor="middle" letter-spacing="1.5">STATION 01</text>
  </g>

  <!-- ── Step 2: PROMPT_TEMPLATE ── -->
  <g id="anim-step-2" transform="translate(300, 288)">
    <line x1="56" y1="0" x2="56" y2="36" stroke="#E8EAED" stroke-width="3" stroke-linecap="round"/>
    <rect x="40" y="0" width="32" height="8" rx="4" fill="#E8EAED"/>
    <circle cx="56" cy="92" r="56" fill="#FFFBE6" stroke="#FAAD14" stroke-width="2.5"/>
    <!-- Document icon -->
    <rect x="34" y="70" width="44" height="44" rx="6" fill="none" stroke="#FAAD14" stroke-width="3"/>
    <path d="M34 82 L46 82 L46 78 L66 78" fill="none" stroke="#FAAD14" stroke-width="3" stroke-linecap="round"/>
    <line x1="44" y1="92" x2="68" y2="92" stroke="#FAAD14" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="44" y1="102" x2="68" y2="102" stroke="#FAAD14" stroke-width="2.5" stroke-linecap="round"/>
    <text x="56" y="170" font-size="15" font-weight="700" fill="#262626" text-anchor="middle">PROMPT</text>
    <rect x="-20" y="180" width="152" height="20" rx="4" fill="#FFFBE6"/>
    <text x="56" y="195" font-size="10" font-weight="700" fill="#FAAD14" text-anchor="middle" letter-spacing="1.5">STATION 02</text>
  </g>

  <!-- ── Step 3: ChatOpenAI ── -->
  <g id="anim-step-3" transform="translate(500, 288)">
    <line x1="56" y1="0" x2="56" y2="36" stroke="#E8EAED" stroke-width="3" stroke-linecap="round"/>
    <rect x="40" y="0" width="32" height="8" rx="4" fill="#E8EAED"/>
    <circle cx="56" cy="92" r="56" fill="#F6FFED" stroke="#52C41A" stroke-width="2.5"/>
    <!-- Brain icon simplified -->
    <path d="M44 80 Q38 72 44 64 Q50 58 58 64 Q66 58 72 64 Q78 72 72 80 Q80 88 72 96 Q66 102 58 96 Q50 102 44 96 Q36 88 44 80Z" fill="none" stroke="#52C41A" stroke-width="3"/>
    <text x="56" y="170" font-size="15" font-weight="700" fill="#262626" text-anchor="middle">ChatOpenAI</text>
    <rect x="-20" y="180" width="152" height="20" rx="4" fill="#F6FFED"/>
    <text x="56" y="195" font-size="10" font-weight="700" fill="#52C41A" text-anchor="middle" letter-spacing="1.5">STATION 03</text>
  </g>

  <!-- ── Step 4: Pydantic Parser ── -->
  <g id="anim-step-4" transform="translate(700, 288)">
    <line x1="56" y1="0" x2="56" y2="36" stroke="#E8EAED" stroke-width="3" stroke-linecap="round"/>
    <rect x="40" y="0" width="32" height="8" rx="4" fill="#E8EAED"/>
    <circle cx="56" cy="92" r="56" fill="#F6FFED" stroke="#52C41A" stroke-width="2.5"/>
    <!-- Braces { } icon -->
    <path d="M46 68 Q38 68 38 76 L38 88 Q38 96 30 96 Q38 96 38 104 L38 116 Q38 124 46 124" fill="none" stroke="#52C41A" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M66 68 Q74 68 74 76 L74 88 Q74 96 82 96 Q74 96 74 104 L74 116 Q74 124 66 124" fill="none" stroke="#52C41A" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="56" y="170" font-size="15" font-weight="700" fill="#262626" text-anchor="middle">Pydantic</text>
    <rect x="-20" y="180" width="152" height="20" rx="4" fill="#F6FFED"/>
    <text x="56" y="195" font-size="10" font-weight="700" fill="#52C41A" text-anchor="middle" letter-spacing="1.5">STATION 04</text>
  </g>

  <!-- ── Step 5: Report ── -->
  <g id="anim-step-5" transform="translate(900, 288)">
    <line x1="56" y1="0" x2="56" y2="36" stroke="#E8EAED" stroke-width="3" stroke-linecap="round"/>
    <rect x="40" y="0" width="32" height="8" rx="4" fill="#E8EAED"/>
    <circle cx="56" cy="92" r="56" fill="#F9F0FF" stroke="#722ED1" stroke-width="2.5"/>
    <!-- Clipboard icon -->
    <rect x="34" y="68" width="44" height="52" rx="4" fill="none" stroke="#722ED1" stroke-width="3"/>
    <rect x="44" y="62" width="24" height="12" rx="4" fill="none" stroke="#722ED1" stroke-width="3"/>
    <line x1="44" y1="88" x2="68" y2="88" stroke="#722ED1" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="44" y1="100" x2="68" y2="100" stroke="#722ED1" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="44" y1="112" x2="60" y2="112" stroke="#722ED1" stroke-width="2.5" stroke-linecap="round"/>
    <text x="56" y="170" font-size="15" font-weight="700" fill="#262626" text-anchor="middle">Report</text>
    <rect x="-20" y="180" width="152" height="20" rx="4" fill="#F9F0FF"/>
    <text x="56" y="195" font-size="10" font-weight="700" fill="#722ED1" text-anchor="middle" letter-spacing="1.5">STATION 05</text>
  </g>

  <!-- Code chain formula at bottom -->
  <g transform="translate(40, 538)" filter="url(#card-shadow)">
    <rect width="1200" height="80" rx="12" fill="#1E2130"/>
    <!-- Code line -->
    <text x="48" y="36" font-size="13" font-weight="600" fill="#6B7280" class="mono">LangChain chain:</text>
    <text x="200" y="36" font-size="18" font-weight="700" fill="#60A5FA" class="mono">prompt</text>
    <text x="300" y="36" font-size="18" font-weight="400" fill="#9CA3AF" class="mono"> | </text>
    <text x="326" y="36" font-size="18" font-weight="700" fill="#34D399" class="mono">llm</text>
    <text x="366" y="36" font-size="18" font-weight="400" fill="#9CA3AF" class="mono"> | </text>
    <text x="392" y="36" font-size="18" font-weight="700" fill="#A78BFA" class="mono">parser</text>
    <text x="48" y="60" font-size="12" font-weight="400" fill="#6B7280" class="mono">chain = prompt_tmpl | chat_openai | pydantic_output_parser</text>
  </g>

  <text x="1220" y="690" font-size="13" font-weight="500" fill="#BFBFBF" text-anchor="end">7 / 9</text>
</svg>
