<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF" />

  <!-- Slide Header -->
  <text x="80" y="90" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#232F3E">04. Parser Methods Needed</text>
  <text x="80" y="130" font-family="Arial, sans-serif" font-size="20" fill="#607D8B">Standardizing heterogeneous Kubernetes cluster units into clean metrics</text>

  <!-- Method 1: CPU Parser -->
  <g transform="translate(80, 200)">
    <rect width="520" height="180" rx="12" fill="#F8F9FA" stroke="#E0E0E0" stroke-width="2" />
    <rect x="0" y="0" width="520" height="45" rx="12" fill="#4285F4" />
    <rect x="0" y="33" width="520" height="12" fill="#4285F4" />
    <text x="24" y="28" font-family="monospace" font-size="18" font-weight="bold" fill="#FFFFFF">def parse_cpu(cpu_str) -> int (millicores)</text>
    
    <!-- Flow visual -->
    <text x="30" y="80" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#5F6368">INPUTS</text>
    <text x="30" y="110" font-family="monospace" font-size="16" fill="#232F3E">"500m" (string)</text>
    <text x="30" y="140" font-family="monospace" font-size="16" fill="#232F3E">"1.5"  (string)</text>

    <!-- Arrow -->
    <path d="M 230 110 L 290 110" stroke="#4285F4" stroke-width="3" fill="none" />
    <path d="M 290 105 L 305 110 L 290 115 Z" fill="#4285F4" />

    <text x="330" y="80" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#5F6368">OUTPUT (standardized)</text>
    <text x="330" y="110" font-family="monospace" font-size="16" fill="#34A853">500  (millicores)</text>
    <text x="330" y="140" font-family="monospace" font-size="16" fill="#34A853">1500 (millicores)</text>
  </g>

  <!-- Method 2: Memory Parser -->
  <g transform="translate(680, 200)">
    <rect width="520" height="180" rx="12" fill="#F8F9FA" stroke="#E0E0E0" stroke-width="2" />
    <rect x="0" y="0" width="520" height="45" rx="12" fill="#4285F4" />
    <rect x="0" y="33" width="520" height="12" fill="#4285F4" />
    <text x="24" y="28" font-family="monospace" font-size="18" font-weight="bold" fill="#FFFFFF">def parse_memory(mem_str) -> int (MiB)</text>
    
    <!-- Flow visual -->
    <text x="30" y="80" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#5F6368">INPUTS</text>
    <text x="30" y="110" font-family="monospace" font-size="16" fill="#232F3E">"256Mi" (string)</text>
    <text x="30" y="140" font-family="monospace" font-size="16" fill="#232F3E">"1Gi"   (string)</text>

    <!-- Arrow -->
    <path d="M 230 110 L 290 110" stroke="#4285F4" stroke-width="3" fill="none" />
    <path d="M 290 105 L 305 110 L 290 115 Z" fill="#4285F4" />

    <text x="330" y="80" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#5F6368">OUTPUT (standardized)</text>
    <text x="330" y="110" font-family="monospace" font-size="16" fill="#34A853">256  (MiB)</text>
    <text x="330" y="140" font-family="monospace" font-size="16" fill="#34A853">1024 (MiB)</text>
  </g>

  <!-- Method 3: Storage & Orphan Tracker -->
  <g transform="translate(80, 420)">
    <rect width="1120" height="220" rx="12" fill="#F8F9FA" stroke="#E0E0E0" stroke-width="2" />
    <rect x="0" y="0" width="1120" height="45" rx="12" fill="#FF9900" />
    <rect x="0" y="33" width="1120" height="12" fill="#FF9900" />
    <text x="24" y="28" font-family="monospace" font-size="18" font-weight="bold" fill="#FFFFFF">def get_mounted_pvcs(...) &amp; PVC Orphan Status Logic</text>

    <!-- Logic block diagram -->
    <g transform="translate(30, 70)">
      <rect width="250" height="110" rx="8" fill="#FFFFFF" stroke="#FF9900" stroke-width="1.5" />
      <text x="125" y="35" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#232F3E" text-anchor="middle">Step A: Scan Active Pods</text>
      <text x="20" y="65" font-family="Arial, sans-serif" font-size="13" fill="#5F6368">Queries active Pod specs in</text>
      <text x="20" y="85" font-family="Arial, sans-serif" font-size="13" fill="#5F6368">cluster to find used PVC names</text>
    </g>

    <!-- Arrow -->
    <path d="M 310 125 L 360 125" stroke="#FF9900" stroke-width="3" fill="none" />
    <path d="M 360 120 L 375 125 L 360 130 Z" fill="#FF9900" />

    <g transform="translate(390, 70)">
      <rect width="250" height="110" rx="8" fill="#FFFFFF" stroke="#FF9900" stroke-width="1.5" />
      <text x="125" y="35" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#232F3E" text-anchor="middle">Step B: Fetch PVCs list</text>
      <text x="20" y="65" font-family="Arial, sans-serif" font-size="13" fill="#5F6368">Gets all PVCs, calculates sizes</text>
      <text x="20" y="85" font-family="Arial, sans-serif" font-size="13" fill="#5F6368">normalized to GiB</text>
    </g>

    <!-- Arrow -->
    <path d="M 670 125 L 720 125" stroke="#FF9900" stroke-width="3" fill="none" />
    <path d="M 720 120 L 735 125 L 720 130 Z" fill="#FF9900" />

    <g transform="translate(750, 70)">
      <rect width="330" height="110" rx="8" fill="#FFFFFF" stroke="#34A853" stroke-width="2" />
      <text x="165" y="35" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#137333" text-anchor="middle">Step C: Flag Orphans</text>
      <text x="20" y="65" font-family="monospace" font-size="13" fill="#232F3E">is_orphaned = pvc not in mounted_pvcs</text>
      <text x="20" y="90" font-family="Arial, sans-serif" font-size="13" fill="#34A853" font-weight="bold">✓ Instantly exposes unused storage waste!</text>
    </g>
  </g>
</svg>
