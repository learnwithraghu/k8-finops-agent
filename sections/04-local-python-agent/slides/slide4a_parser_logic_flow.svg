<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF" />

  <!-- Slide Header -->
  <text x="80" y="70" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#232F3E">04A. Parser Logic Flow: CPU &amp; Memory</text>
  <text x="80" y="110" font-family="Arial, sans-serif" font-size="20" fill="#607D8B">Understanding the decision tree inside parse_cpu() and parse_memory()</text>

  <!-- CPU Parser Flow -->
  <g transform="translate(80, 160)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#4285F4">parse_cpu(cpu_str) Logic</text>
    
    <!-- Start box -->
    <rect x="180" y="30" width="200" height="50" rx="8" fill="#E3F2FD" stroke="#4285F4" stroke-width="2" />
    <text x="280" y="60" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1565C0" text-anchor="middle">INPUT: cpu_str</text>
    
    <!-- Decision 1: Empty check -->
    <path d="M 280 80 L 280 110" stroke="#5F6368" stroke-width="2" />
    <path d="M 275 105 L 280 115 L 285 105" fill="#5F6368" />
    
    <path d="M 160 135 L 400 135 L 380 155 L 400 175 L 160 175 L 180 155 Z" fill="#FFF3E0" stroke="#FF9800" stroke-width="2" />
    <text x="280" y="155" font-family="monospace" font-size="14" fill="#E65100" text-anchor="middle" font-weight="bold">cpu_str is None?</text>
    
    <!-- YES path -->
    <path d="M 160 155 L 80 155" stroke="#EF5350" stroke-width="2" />
    <text x="110" y="145" font-family="Arial, sans-serif" font-size="13" fill="#D32F2F" font-weight="bold">YES</text>
    <rect x="10" y="135" width="60" height="40" rx="6" fill="#FFEBEE" stroke="#EF5350" stroke-width="2" />
    <text x="40" y="160" font-family="monospace" font-size="14" fill="#C62828" text-anchor="middle" font-weight="bold">return 0</text>
    
    <!-- NO path -->
    <path d="M 280 175 L 280 205" stroke="#5F6368" stroke-width="2" />
    <text x="295" y="195" font-family="Arial, sans-serif" font-size="13" fill="#2E7D32" font-weight="bold">NO</text>
    <path d="M 275 200 L 280 210 L 285 200" fill="#5F6368" />
    
    <!-- Decision 2: ends with "m" -->
    <path d="M 160 230 L 400 230 L 380 250 L 400 270 L 160 270 L 180 250 Z" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" />
    <text x="280" y="250" font-family="monospace" font-size="14" fill="#2E7D32" text-anchor="middle" font-weight="bold">ends with "m"?</text>
    
    <!-- YES path - millis -->
    <path d="M 400 250 L 500 250" stroke="#4CAF50" stroke-width="2" />
    <text x="440" y="240" font-family="Arial, sans-serif" font-size="13" fill="#2E7D32" font-weight="bold">YES</text>
    <rect x="510" y="220" width="190" height="60" rx="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" />
    <text x="605" y="242" font-family="Arial, sans-serif" font-size="13" fill="#1B5E20" text-anchor="middle">Strip "m" suffix</text>
    <text x="605" y="262" font-family="monospace" font-size="13" fill="#2E7D32" text-anchor="middle" font-weight="bold">return int(value)</text>
    
    <!-- Example -->
    <rect x="510" y="288" width="190" height="32" rx="4" fill="#FFFFFF" stroke="#4CAF50" stroke-width="1" />
    <text x="605" y="308" font-family="monospace" font-size="12" fill="#5F6368" text-anchor="middle">"500m" -&gt; 500</text>
    
    <!-- NO path - decimal -->
    <path d="M 280 270 L 280 310" stroke="#5F6368" stroke-width="2" />
    <text x="295" y="295" font-family="Arial, sans-serif" font-size="13" fill="#2E7D32" font-weight="bold">NO</text>
    <path d="M 275 305 L 280 315 L 285 305" fill="#5F6368" />
    
    <rect x="185" y="320" width="190" height="60" rx="6" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" />
    <text x="280" y="342" font-family="Arial, sans-serif" font-size="13" fill="#0D47A1" text-anchor="middle">Convert to float</text>
    <text x="280" y="362" font-family="monospace" font-size="13" fill="#1565C0" text-anchor="middle" font-weight="bold">return int(value * 1000)</text>
    
    <!-- Example -->
    <rect x="185" y="388" width="190" height="32" rx="4" fill="#FFFFFF" stroke="#2196F3" stroke-width="1" />
    <text x="280" y="408" font-family="monospace" font-size="12" fill="#5F6368" text-anchor="middle">"0.5" -&gt; 500</text>
  </g>

  <!-- Memory Parser Flow -->
  <g transform="translate(760, 160)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#9C27B0">parse_memory(mem_str) Logic</text>
    
    <!-- Start box -->
    <rect x="90" y="30" width="220" height="50" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2" />
    <text x="200" y="60" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#6A1B9A" text-anchor="middle">INPUT: mem_str</text>
    
    <!-- Decision flow -->
    <path d="M 200 80 L 200 110" stroke="#5F6368" stroke-width="2" />
    <path d="M 195 105 L 200 115 L 205 105" fill="#5F6368" />
    
    <path d="M 90 135 L 310 135 L 295 155 L 310 175 L 90 175 L 105 155 Z" fill="#FFF3E0" stroke="#FF9800" stroke-width="2" />
    <text x="200" y="155" font-family="monospace" font-size="14" fill="#E65100" text-anchor="middle" font-weight="bold">mem_str is None?</text>
    
    <!-- YES path -->
    <path d="M 90 155 L 30 155" stroke="#EF5350" stroke-width="2" />
    <text x="50" y="145" font-family="Arial, sans-serif" font-size="13" fill="#D32F2F" font-weight="bold">YES</text>
    <rect x="0" y="135" width="20" height="40" rx="6" fill="#FFEBEE" stroke="#EF5350" stroke-width="2" />
    <text x="10" y="160" font-family="monospace" font-size="13" fill="#C62828" text-anchor="middle" font-weight="bold">0</text>
    
    <!-- NO path -->
    <path d="M 200 175 L 200 205" stroke="#5F6368" stroke-width="2" />
    <text x="215" y="195" font-family="Arial, sans-serif" font-size="13" fill="#2E7D32" font-weight="bold">NO</text>
    <path d="M 195 200 L 200 210 L 205 200" fill="#5F6368" />
    
    <!-- Decision tree for suffix -->
    <rect x="60" y="220" width="280" height="140" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2" />
    <text x="200" y="242" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#6A1B9A" text-anchor="middle">Check suffix and convert:</text>
    
    <g transform="translate(80, 255)">
      <text x="0" y="0" font-family="monospace" font-size="12" fill="#4A148C">if ends with "Gi":</text>
      <text x="160" y="0" font-family="monospace" font-size="12" fill="#6A1B9A" font-weight="bold">value * 1024</text>
      
      <text x="0" y="22" font-family="monospace" font-size="12" fill="#4A148C">if ends with "Mi":</text>
      <text x="160" y="22" font-family="monospace" font-size="12" fill="#6A1B9A" font-weight="bold">value</text>
      
      <text x="0" y="44" font-family="monospace" font-size="12" fill="#4A148C">if ends with "Ki":</text>
      <text x="160" y="44" font-family="monospace" font-size="12" fill="#6A1B9A" font-weight="bold">value / 1024</text>
      
      <text x="0" y="66" font-family="monospace" font-size="12" fill="#4A148C">else (bytes):</text>
      <text x="160" y="66" font-family="monospace" font-size="12" fill="#6A1B9A" font-weight="bold">value / 1048576</text>
    </g>
    
    <path d="M 200 360 L 200 385" stroke="#5F6368" stroke-width="2" />
    <path d="M 195 380 L 200 390 L 205 380" fill="#5F6368" />
    
    <!-- Output -->
    <rect x="95" y="395" width="210" height="50" rx="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" />
    <text x="200" y="425" font-family="monospace" font-size="14" fill="#2E7D32" text-anchor="middle" font-weight="bold">return int(MiB value)</text>
  </g>

  <!-- Examples section at bottom -->
  <g transform="translate(80, 600)">
    <rect width="1120" height="100" rx="10" fill="#F8F9FA" stroke="#E0E0E0" stroke-width="2" />
    <text x="20" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#232F3E">Key Insight: Conditional Logic Based on String Patterns</text>
    
    <text x="30" y="58" font-family="Arial, sans-serif" font-size="15" fill="#5F6368">CPU Parser: Detects suffix "m" to identify millicores vs decimal cores</text>
    <text x="30" y="80" font-family="Arial, sans-serif" font-size="15" fill="#5F6368">Memory Parser: Matches suffix pattern (Gi/Mi/Ki/bytes) to apply correct conversion factor</text>
  </g>
</svg>
