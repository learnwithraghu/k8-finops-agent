<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF" />

  <!-- Slide Header -->
  <text x="80" y="90" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#232F3E">05. Data vs. Decisions</text>
  <text x="80" y="130" font-family="Arial, sans-serif" font-size="20" fill="#607D8B">Tracing raw JSON properties to the business questions we must answer</text>

  <!-- Left: The JSON Structure Box -->
  <g transform="translate(80, 180)">
    <rect width="480" height="460" rx="12" fill="#FAFBFD" stroke="#CFD8DC" stroke-width="2" />
    <!-- Title bar -->
    <path d="M 0 12 A 12 12 0 0 1 12 0 L 468 0 A 12 12 0 0 1 480 12 L 480 40 L 0 40 Z" fill="#ECEFF1" />
    <!-- Small window buttons -->
    <circle cx="20" cy="20" r="5" fill="#FF5F56" />
    <circle cx="35" cy="20" r="5" fill="#FFBD2E" />
    <circle cx="50" cy="20" r="5" fill="#27C93F" />
    <text x="240" y="26" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#5F6368" text-anchor="middle">k8s_metadata.json</text>

    <!-- Code Block representation -->
    <g transform="translate(25, 60)" font-family="Courier New, monospace" font-size="14" fill="#263238">
      <text x="0" y="20" fill="#78909C">{</text>
      <text x="20" y="45" fill="#00838F">"metadata"</text>
      <text x="100" y="45" fill="#78909C">: { "resource_count": 12 },</text>
      
      <text x="20" y="75" fill="#00838F">"resources"</text>
      <text x="110" y="75" fill="#78909C">: [</text>
      
      <text x="40" y="105" fill="#78909C">{</text>
      
      <text x="60" y="135" fill="#00838F">"name"</text>
      <text x="110" y="135" fill="#78909C">: "payment-api-deployment",</text>
      
      <text x="60" y="165" fill="#00838F">"kind"</text>
      <text x="110" y="165" fill="#78909C">: "Deployment",</text>
      
      <!-- Highlight labels block -->
      <rect x="55" y="180" width="380" height="60" rx="4" fill="#FFF3E0" stroke="#FFE0B2" stroke-dasharray="4 2" />
      <text x="60" y="195" fill="#E65100" font-weight="bold">"labels"</text>
      <text x="130" y="195" fill="#E65100">: {</text>
      <text x="80" y="225" fill="#E65100">"app.kubernetes.io/env": "dev"</text>
      <text x="60" y="255" fill="#78909C">},</text>
      
      <!-- Highlight CPU Request -->
      <rect x="55" y="270" width="380" height="30" rx="4" fill="#E0F2F1" stroke="#B2DFDB" stroke-dasharray="4 2" />
      <text x="60" y="290" fill="#004D40" font-weight="bold">"cpu_request"</text>
      <text x="170" y="290" fill="#004D40">: 500,</text>
      
      <!-- Highlight is_orphaned -->
      <rect x="55" y="315" width="380" height="30" rx="4" fill="#E8F5E9" stroke="#C8E6C9" stroke-dasharray="4 2" />
      <text x="60" y="335" fill="#1B5E20" font-weight="bold">"is_orphaned"</text>
      <text x="170" y="335" fill="#1B5E20">: false</text>
      
      <text x="40" y="375" fill="#78909C">}</text>
      <text x="20" y="405" fill="#78909C">]</text>
      <text x="0" y="435" fill="#78909C">}</text>
    </g>
  </g>

  <!-- Connection / Flow Pointers -->
  <!-- Pointer 1: labels to Top Card -->
  <path d="M 520 390 C 580 390, 580 270, 660 270" stroke="#FF9900" stroke-width="2.5" fill="none" stroke-dasharray="6 4" />
  <circle cx="520" cy="390" r="4" fill="#FF9900" />
  <polygon points="655,265 665,270 655,275" fill="#FF9900" />

  <!-- Pointer 2: CPU to Middle Card -->
  <path d="M 520 465 C 580 465, 580 410, 660 410" stroke="#009688" stroke-width="2.5" fill="none" stroke-dasharray="6 4" />
  <circle cx="520" cy="465" r="4" fill="#009688" />
  <polygon points="655,405 665,410 655,415" fill="#009688" />

  <!-- Pointer 3: Orphan Status to Bottom Card -->
  <path d="M 520 510 C 580 510, 580 550, 660 550" stroke="#4CAF50" stroke-width="2.5" fill="none" stroke-dasharray="6 4" />
  <circle cx="520" cy="510" r="4" fill="#4CAF50" />
  <polygon points="655,545 665,550 655,555" fill="#4CAF50" />


  <!-- Right Side: Diagnostics & Decision Questions -->
  <g transform="translate(680, 180)">
    
    <!-- Card 1: Tag Compliance -->
    <g transform="translate(0, 0)">
      <rect width="440" height="135" rx="8" fill="#FFFDE7" stroke="#FFF59D" stroke-width="2" />
      <rect width="8" height="135" rx="4" fill="#FFB300" />
      <text x="25" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F57F17">TAG AUDIT POLICY ENGINE</text>
      <text x="25" y="60" font-family="Arial, sans-serif" font-size="14" fill="#232F3E">Is 'dev' a valid value for environment? (Yes)</text>
      <text x="25" y="85" font-family="Arial, sans-serif" font-size="14" fill="#232F3E">Are 'owner', 'cost-center', &amp; 'tier' present?</text>
      <text x="25" y="110" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#D50000">↳ NO. Missing required metadata tags!</text>
    </g>

    <!-- Card 2: Resource Costing -->
    <g transform="translate(0, 155)">
      <rect width="440" height="120" rx="8" fill="#E0F2F1" stroke="#B2DFDB" stroke-width="2" />
      <rect width="8" height="120" rx="4" fill="#00897B" />
      <text x="25" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#00695C">RESOURCE COST VALUATION</text>
      <text x="25" y="60" font-family="Arial, sans-serif" font-size="14" fill="#232F3E">CPU Request: 500m (0.5 Cores)</text>
      <text x="25" y="85" font-family="Arial, sans-serif" font-size="14" fill="#232F3E">What is the dollar cost of this CPU per month?</text>
      <text x="25" y="105" font-family="Arial, sans-serif" font-size="14" fill="#00695C">↳ Policy: $24/core/month → Current: $12.00</text>
    </g>

    <!-- Card 3: Storage Waste -->
    <g transform="translate(0, 295)">
      <rect width="440" height="120" rx="8" fill="#E8F5E9" stroke="#C8E6C9" stroke-width="2" />
      <rect width="8" height="120" rx="4" fill="#43A047" />
      <text x="25" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2E7D32">ORPHANED STORAGE DETECTION</text>
      <text x="25" y="60" font-family="Arial, sans-serif" font-size="14" fill="#232F3E">is_orphaned: false (Volume attached to Pod)</text>
      <text x="25" y="85" font-family="Arial, sans-serif" font-size="14" fill="#232F3E">If it were true: Flag as wasted capacity.</text>
      <text x="25" y="105" font-family="Arial, sans-serif" font-size="14" fill="#2E7D32">↳ Action: Safe to clean up and delete.</text>
    </g>

  </g>
</svg>
