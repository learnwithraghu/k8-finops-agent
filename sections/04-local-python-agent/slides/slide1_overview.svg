<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF" />

  <!-- Slide Header -->
  <text x="80" y="90" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#232F3E">01. Section Goal &amp; Overview</text>
  <text x="80" y="130" font-family="Arial, sans-serif" font-size="20" fill="#607D8B">Building the bridge between live Kubernetes metadata and the FinOps decision engine</text>

  <!-- Left: Kubernetes Cluster -->
  <g transform="translate(180, 200)">
    <!-- Main Card -->
    <rect width="320" height="360" rx="16" fill="#F8F9FA" stroke="#4285F4" stroke-width="2.5" />
    <path d="M 0 16 A 16 16 0 0 1 16 0 L 304 0 A 16 16 0 0 1 320 16 L 320 60 L 0 60 Z" fill="#4285F4" />
    
    <!-- Kubernetes wheel icon -->
    <g transform="translate(20, 16) scale(0.6)">
      <path d="M 25 0 L 47 11 L 47 36 L 25 47 L 3 36 L 3 11 Z" fill="#FFFFFF" />
      <circle cx="25" cy="23" r="5" fill="#4285F4" />
      <line x1="25" y1="23" x2="25" y2="7" stroke="#4285F4" stroke-width="3" />
      <line x1="25" y1="23" x2="11" y2="30" stroke="#4285F4" stroke-width="3" />
      <line x1="25" y1="23" x2="39" y2="30" stroke="#4285F4" stroke-width="3" />
    </g>
    <text x="175" y="38" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Kind Cluster (Live State)</text>

    <!-- Deployments Icon & Label -->
    <g transform="translate(30, 95)">
      <!-- Server Stack Icon -->
      <rect x="0" y="4" width="28" height="8" rx="2" fill="#E8F0FE" stroke="#4285F4" stroke-width="2"/>
      <rect x="0" y="16" width="28" height="8" rx="2" fill="#E8F0FE" stroke="#4285F4" stroke-width="2"/>
      <text x="45" y="20" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#232F3E">Deployments &amp; Pods</text>
    </g>

    <!-- Services Icon & Label -->
    <g transform="translate(30, 165)">
      <!-- Network Nodes Icon -->
      <circle cx="6" cy="14" r="5" fill="#E8F0FE" stroke="#4285F4" stroke-width="2"/>
      <circle cx="22" cy="6" r="5" fill="#E8F0FE" stroke="#4285F4" stroke-width="2"/>
      <circle cx="22" cy="22" r="5" fill="#E8F0FE" stroke="#4285F4" stroke-width="2"/>
      <line x1="11" y1="14" x2="17" y2="8" stroke="#4285F4" stroke-width="2"/>
      <line x1="11" y1="14" x2="17" y2="20" stroke="#4285F4" stroke-width="2"/>
      <text x="45" y="20" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#232F3E">Services &amp; ConfigMaps</text>
    </g>

    <!-- Persistent Volume Icon & Label -->
    <g transform="translate(30, 235)">
      <!-- Storage Cylinder Icon -->
      <ellipse cx="14" cy="8" rx="10" ry="4" fill="#E8F0FE" stroke="#4285F4" stroke-width="2"/>
      <path d="M 4 8 L 4 22 A 10 4 0 0 0 24 22 L 24 8" fill="none" stroke="#4285F4" stroke-width="2"/>
      <text x="45" y="20" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#232F3E">Persistent Volumes</text>
    </g>
  </g>

  <!-- Middle: Connector Arrow with Python logo -->
  <g transform="translate(530, 360)">
    <path d="M 0 0 L 170 0" stroke="#FF9900" stroke-width="6" stroke-dasharray="8 6" />
    <path d="M 170 -10 L 190 0 L 170 10 Z" fill="#FF9900" />
    
    <!-- Python Agent Badge -->
    <rect x="25" y="-45" width="130" height="90" rx="8" fill="#FFE9D6" stroke="#FF9900" stroke-width="2" />
    
    <!-- Python Icon embedded -->
    <g transform="translate(72, -35) scale(0.6)">
      <path d="M 17 2 C 8.7 2 8.7 8.2 8.7 8.2 L 8.7 11.4 L 17 11.4 L 17 12.6 L 5.9 12.6 C 5.9 12.6 2 12.6 2 20.8 C 2 29 5.9 29 5.9 29 L 8.3 29 L 8.3 25.8 C 8.3 22 11.4 19 15.2 19 L 23.5 19 C 23.5 19 29.8 19 29.8 12.6 C 29.8 6.2 23.5 2 23.5 2 L 17 2 Z" fill="#3776AB" />
      <path d="M 15 32 C 23.3 32 23.3 25.8 23.3 25.8 L 23.3 22.6 L 15 22.6 L 15 21.4 L 26.1 21.4 C 26.1 21.4 30 21.4 30 13.2 C 30 5 26.1 5 26.1 5 L 23.7 5 L 23.7 8.2 C 23.7 12 20.6 15 16.8 15 L 8.5 15 C 8.5 15 2.2 15 2.2 21.4 C 2.2 27.8 8.5 32 8.5 32 L 15 32 Z" fill="#FFE082" />
      <circle cx="12" cy="5" r="1.2" fill="#FFFFFF" />
      <circle cx="20" cy="29" r="1.2" fill="#111111" />
    </g>
    
    <text x="90" y="16" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FF9900" text-anchor="middle">Python Agent</text>
    <text x="90" y="32" font-family="Arial, sans-serif" font-size="11" fill="#232F3E" text-anchor="middle">collect.py</text>
  </g>

  <!-- Right: Raw Metadata JSON -->
  <g transform="translate(760, 200)">
    <!-- Main Card -->
    <rect width="320" height="360" rx="16" fill="#F8F9FA" stroke="#34A853" stroke-width="2.5" />
    <!-- Success Green Header -->
    <path d="M 0 16 A 16 16 0 0 1 16 0 L 304 0 A 16 16 0 0 1 320 16 L 320 60 L 0 60 Z" fill="#34A853" />
    
    <!-- JSON Document Icon -->
    <g transform="translate(25, 12)">
      <rect x="0" y="0" width="22" height="30" rx="3" fill="#FFFFFF" stroke="#34A853" stroke-width="2"/>
      <line x1="5" y1="8" x2="17" y2="8" stroke="#34A853" stroke-width="2"/>
      <line x1="5" y1="15" x2="17" y2="15" stroke="#34A853" stroke-width="2"/>
      <line x1="5" y1="22" x2="12" y2="22" stroke="#34A853" stroke-width="2"/>
    </g>
    
    <text x="175" y="38" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">JSON Metadata File</text>

    <!-- Structured Data Lines inside Card -->
    <rect x="30" y="90" width="260" height="40" rx="6" fill="#E6F4EA" />
    <text x="50" y="115" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#137333">"resources": [...]</text>

    <rect x="30" y="150" width="260" height="40" rx="6" fill="#E6F4EA" />
    <text x="50" y="175" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#137333">"cpu_request": 2000</text>

    <rect x="30" y="210" width="260" height="40" rx="6" fill="#E6F4EA" />
    <text x="50" y="235" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#137333">"is_orphaned": true</text>

    <!-- Footnote inside card -->
    <text x="160" y="310" font-family="Arial, sans-serif" font-size="14" fill="#607D8B" text-anchor="middle">No Decisions. Just Raw Facts.</text>
  </g>

  <!-- Bottom Goals Summary -->
  <rect x="80" y="610" width="1120" height="60" rx="8" fill="#F1F3F4" />
  <text x="110" y="646" font-family="Arial, sans-serif" font-size="18" fill="#232F3E"><tspan font-weight="bold" fill="#4285F4">Core Task:</tspan> Query live cluster configuration, normalize CPU/Memory/Storage units, and dump raw metadata for LLM consumption.</text>
</svg>
