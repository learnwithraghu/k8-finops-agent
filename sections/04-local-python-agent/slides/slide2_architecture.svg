<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF" />

  <!-- Slide Header -->
  <text x="80" y="90" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#232F3E">02. Architecture Overview</text>
  <text x="80" y="130" font-family="Arial, sans-serif" font-size="20" fill="#607D8B">How data moves from the Kubernetes API to the local JSON dump</text>

  <!-- Left: Inputs -->
  <g transform="translate(100, 240)">
    <!-- Config File Box -->
    <rect width="260" height="120" rx="10" fill="#FFF8E1" stroke="#FFB300" stroke-width="2" />
    <!-- Gear/Settings icon -->
    <g transform="translate(20, 20)">
      <circle cx="15" cy="15" r="8" fill="none" stroke="#FF9900" stroke-width="3"/>
      <path d="M 15 2 L 15 6 M 15 24 L 15 28 M 2 15 L 6 15 M 24 15 L 28 15 M 6 6 L 9 9 M 21 21 L 24 24 M 6 24 L 9 21 M 21 6 L 24 9" stroke="#FF9900" stroke-width="3" stroke-linecap="round"/>
    </g>
    <text x="65" y="42" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#B78103">tagging-rules.yaml</text>
    <text x="30" y="75" font-family="Arial, sans-serif" font-size="14" fill="#5F6368">- Excluded namespaces</text>
    <text x="30" y="95" font-family="Arial, sans-serif" font-size="14" fill="#5F6368">- Standard tag keys</text>

    <!-- Kubeconfig Box -->
    <rect y="160" width="260" height="120" rx="10" fill="#E8EAF6" stroke="#3F51B5" stroke-width="2" />
    <!-- Key/Lock icon -->
    <g transform="translate(20, 175)">
      <circle cx="12" cy="12" r="7" fill="none" stroke="#3F51B5" stroke-width="2.5"/>
      <path d="M 17 17 L 27 27 M 22 22 L 25 19 M 24 24 L 27 21" stroke="#3F51B5" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <text x="65" y="197" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#283593">Kubeconfig / Context</text>
    <text x="30" y="235" font-family="Arial, sans-serif" font-size="14" fill="#5F6368">- API Server endpoint</text>
    <text x="30" y="255" font-family="Arial, sans-serif" font-size="14" fill="#5F6368">- Authentication certs</text>
  </g>

  <!-- Middle: Collector Engine -->
  <g transform="translate(480, 245)">
    <!-- Python Agent Box -->
    <rect width="320" height="275" rx="12" fill="#E8F5E9" stroke="#2E7D32" stroke-width="3" />
    <rect x="0" y="0" width="320" height="50" rx="12" fill="#2E7D32" />
    <!-- Overlap bottom rounded corners of the header -->
    <rect x="0" y="38" width="320" height="12" fill="#2E7D32" />
    
    <!-- Python Icon embedded in header -->
    <g transform="translate(20, 10) scale(0.6)">
      <path d="M 17 2 C 8.7 2 8.7 8.2 8.7 8.2 L 8.7 11.4 L 17 11.4 L 17 12.6 L 5.9 12.6 C 5.9 12.6 2 12.6 2 20.8 C 2 29 5.9 29 5.9 29 L 8.3 29 L 8.3 25.8 C 8.3 22 11.4 19 15.2 19 L 23.5 19 C 23.5 19 29.8 19 29.8 12.6 C 29.8 6.2 23.5 2 23.5 2 L 17 2 Z" fill="#FFFFFF" />
      <path d="M 15 32 C 23.3 32 23.3 25.8 23.3 25.8 L 23.3 22.6 L 15 22.6 L 15 21.4 L 26.1 21.4 C 26.1 21.4 30 21.4 30 13.2 C 30 5 26.1 5 26.1 5 L 23.7 5 L 23.7 8.2 C 23.7 12 20.6 15 16.8 15 L 8.5 15 C 8.5 15 2.2 15 2.2 21.4 C 2.2 27.8 8.5 32 8.5 32 L 15 32 Z" fill="#E8F5E9" />
    </g>
    <text x="180" y="32" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Python Agent Engine</text>

    <!-- Internal tasks -->
    <rect x="20" y="75" width="280" height="45" rx="6" fill="#FFFFFF" stroke="#C8E6C9" stroke-width="1.5" />
    <text x="35" y="103" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#2E7D32">1. Connects to Kubernetes API</text>

    <rect x="20" y="135" width="280" height="45" rx="6" fill="#FFFFFF" stroke="#C8E6C9" stroke-width="1.5" />
    <text x="35" y="163" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#2E7D32">2. Filters Out Excluded Namespaces</text>

    <rect x="20" y="195" width="280" height="45" rx="6" fill="#FFFFFF" stroke="#C8E6C9" stroke-width="1.5" />
    <text x="35" y="223" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#2E7D32">3. Standardizes Units &amp; Labels</text>
  </g>

  <!-- Right: Output Target -->
  <g transform="translate(920, 310)">
    <!-- Metadata JSON Box -->
    <rect width="260" height="140" rx="10" fill="#E0F7FA" stroke="#00838F" stroke-width="2" />
    <!-- File/JSON icon -->
    <g transform="translate(20, 15)">
      <rect x="0" y="0" width="18" height="24" rx="2" fill="none" stroke="#00838F" stroke-width="2"/>
      <line x1="4" y1="6" x2="14" y2="6" stroke="#00838F" stroke-width="2"/>
      <line x1="4" y1="12" x2="14" y2="12" stroke="#00838F" stroke-width="2"/>
      <line x1="4" y1="18" x2="10" y2="18" stroke="#00838F" stroke-width="2"/>
    </g>
    <text x="50" y="32" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#00838F">k8s_metadata.json</text>
    <text x="30" y="75" font-family="Arial, sans-serif" font-size="14" fill="#232F3E">- Parsed CPU / Memory requests</text>
    <text x="30" y="95" font-family="Arial, sans-serif" font-size="14" fill="#232F3E">- Orphaned state flags</text>
    <text x="30" y="115" font-family="Arial, sans-serif" font-size="14" fill="#232F3E">- Pure raw facts (no AI logic)</text>
  </g>

  <!-- Flow Arrows -->
  <!-- Config to Agent -->
  <path d="M 360 300 L 460 300" stroke="#FF9900" stroke-width="3" fill="none" />
  <path d="M 460 295 L 475 300 L 460 305 Z" fill="#FF9900" />
  
  <!-- Kubeconfig to Agent -->
  <path d="M 360 460 L 410 460 L 410 380 L 460 380" stroke="#3F51B5" stroke-width="3" fill="none" />
  <path d="M 460 375 L 475 380 L 460 385 Z" fill="#3F51B5" />

  <!-- Agent to Output -->
  <path d="M 800 380 L 900 380" stroke="#2E7D32" stroke-width="4" fill="none" />
  <path d="M 900 374 L 915 380 L 900 386 Z" fill="#2E7D32" />
</svg>
