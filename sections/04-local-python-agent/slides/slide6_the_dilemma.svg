<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <!-- Defs for Free Project Icons -->
  <defs>
    <!-- Hexagon Pod/Workload Icon -->
    <g id="icon-pod">
      <polygon points="0,-16 13.86,-8 13.86,8 0,16 -13.86,8 -13.86,-8" fill="none" stroke="#E57373" stroke-width="1.8" />
      <line x1="0" y1="-16" x2="0" y2="16" stroke="#E57373" stroke-width="1" opacity="0.4" />
      <line x1="0" y1="0" x2="13.86" y2="8" stroke="#E57373" stroke-width="1" opacity="0.4" />
      <line x1="0" y1="0" x2="-13.86" y2="8" stroke="#E57373" stroke-width="1" opacity="0.4" />
    </g>
    
    <!-- ConfigMap / Document Rules Icon -->
    <g id="icon-cm">
      <path d="M -9,-12 L 3,-12 L 9,-6 L 9,12 L -9,12 Z" fill="none" stroke="#FFB300" stroke-width="1.5" />
      <path d="M 3,-12 L 3,-6 L 9,-6" fill="none" stroke="#FFB300" stroke-width="1.5" />
      <line x1="-5" y1="-2" x2="5" y2="-2" stroke="#FFB300" stroke-width="1.2" opacity="0.8" />
      <line x1="-5" y1="2" x2="5" y2="2" stroke="#FFB300" stroke-width="1.2" opacity="0.8" />
      <line x1="-5" y1="6" x2="1" y2="6" stroke="#FFB300" stroke-width="1.2" opacity="0.8" />
    </g>
    
    <!-- Warning Triangle Icon -->
    <g id="icon-warning">
      <polygon points="0,-12 12,8 -12,8" fill="#EF5350" stroke="#EF5350" stroke-width="1.5" />
      <circle cx="0" cy="5" r="1.2" fill="#ffffff" />
      <line x1="0" y1="-5" x2="0" y2="2" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
    </g>

    <!-- Success Checkmark Icon -->
    <g id="icon-success">
      <circle cx="0" cy="0" r="14" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" />
      <path d="M -6,0 L -2,4 L 6,-4" fill="none" stroke="#2E7D32" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    </g>

    <!-- Brain / Cognitive Node Icon -->
    <g id="icon-brain">
      <circle cx="0" cy="0" r="18" fill="#E3F2FD" stroke="#1E88E5" stroke-width="2"/>
      <circle cx="0" cy="0" r="4" fill="#1E88E5"/>
      <circle cx="-10" cy="-8" r="3" fill="#1E88E5"/>
      <circle cx="10" cy="-8" r="3" fill="#1E88E5"/>
      <circle cx="-10" cy="8" r="3" fill="#1E88E5"/>
      <circle cx="10" cy="8" r="3" fill="#1E88E5"/>
      <line x1="0" y1="0" x2="-10" y2="-8" stroke="#1E88E5" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="10" y2="-8" stroke="#1E88E5" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="-10" y2="8" stroke="#1E88E5" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="10" y2="8" stroke="#1E88E5" stroke-width="1.5"/>
    </g>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF" />

  <!-- Slide Header -->
  <text x="80" y="90" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#232F3E">06. The Handoff Dilemma</text>
  <text x="80" y="130" font-family="Arial, sans-serif" font-size="20" fill="#607D8B">Should we build a fragile hardcoded policy engine, or leverage cognitive reasoning?</text>

  <!-- Split Screen Divider -->
  <line x1="640" y1="180" x2="640" y2="640" stroke="#ECEFF1" stroke-width="4" stroke-dasharray="8 8" />

  <!-- LEFT SIDE: Option A - Hardcoded Spaghetti Stack -->
  <g transform="translate(80, 180)">
    <!-- Header -->
    <rect width="480" height="45" rx="8" fill="#FFEBEE" stroke="#EF5350" stroke-width="1.5" />
    <use href="#icon-warning" x="25" y="22" />
    <text x="55" y="28" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#C62828">Option A: The Hardcoded Rule Trap</text>

    <!-- Visual Stack of Hardcoded Rules (No chaotic crossing lines) -->
    <g transform="translate(30, 80)">
      <rect width="420" height="260" rx="8" fill="#FFFFFF" stroke="#EF9A9A" stroke-width="1" />
      
      <!-- Rule Stack Item 1 -->
      <g transform="translate(20, 20)">
        <rect width="380" height="45" rx="6" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1" />
        <use href="#icon-pod" x="25" y="22" />
        <text x="50" y="26" font-family="monospace" font-size="13" fill="#C62828">if resource.kind == "Deployment":</text>
      </g>

      <!-- Rule Stack Item 2 -->
      <g transform="translate(20, 80)">
        <rect width="380" height="45" rx="6" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1" />
        <use href="#icon-warning" x="25" y="22" />
        <text x="50" y="26" font-family="monospace" font-size="13" fill="#C62828">  if "owner" not in resource.labels:</text>
      </g>

      <!-- Rule Stack Item 3 -->
      <g transform="translate(20, 140)">
        <rect width="380" height="45" rx="6" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1" />
        <use href="#icon-cm" x="25" y="22" />
        <text x="50" y="26" font-family="monospace" font-size="13" fill="#C62828">    elif env_val not in valid_envs:</text>
      </g>

      <!-- Connection to Alert -->
      <path d="M 210 185 L 210 215" stroke="#EF5350" stroke-width="2" fill="none" />
      <polygon points="206,215 210,223 214,215" fill="#EF5350" />

      <!-- Brittle Result Badge -->
      <g transform="translate(60, 220)">
        <rect width="300" height="30" rx="15" fill="#FFEBEE" stroke="#EF5350" stroke-width="1" />
        <text x="150" y="19" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#C62828" text-anchor="middle">🛑 Fragile: Every new alias breaks the code</text>
      </g>
    </g>

    <!-- Disadvantages -->
    <g transform="translate(30, 365)">
      <text x="0" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#C62828">✖ Maintenance Overhead</text>
      <text x="20" y="38" font-family="Arial, sans-serif" font-size="12" fill="#5F6368">Requires code changes, pull requests, and builds for minor config shifts.</text>
      
      <text x="0" y="65" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#C62828">✖ Zero Synonym Support</text>
      <text x="20" y="83" font-family="Arial, sans-serif" font-size="12" fill="#5F6368">Cannot resolve contextual aliases ('prod' vs 'production').</text>
    </g>
  </g>

  <!-- RIGHT SIDE: Option B - Cognitive Reasoning Agent -->
  <g transform="translate(720, 180)">
    <!-- Header -->
    <rect width="480" height="45" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5" />
    <use href="#icon-brain" x="25" y="22" />
    <text x="55" y="28" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2E7D32">Option B: The Cognitive LLM Agent</text>

    <!-- Visual Reasoning Flow (Clean, No crossing lines) -->
    <g transform="translate(30, 80)">
      <rect width="420" height="260" rx="8" fill="#FFFFFF" stroke="#A5D6A7" stroke-width="1" />
      
      <!-- Inputs Column on Left -->
      <g transform="translate(20, 35)">
        <!-- Input 1 -->
        <rect width="110" height="45" rx="6" fill="#FFFDE7" stroke="#FFF59D" stroke-width="1" />
        <use href="#icon-cm" x="18" y="22" />
        <text x="40" y="26" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#B78103">Policy Rules</text>
        <path d="M 110 22 L 170 22 L 170 85 L 185 85" stroke="#FF9900" stroke-width="1.5" fill="none" />

        <!-- Input 2 -->
        <rect y="70" width="110" height="45" rx="6" fill="#E0F7FA" stroke="#B2DFDB" stroke-width="1" />
        <!-- JSON Document Icon -->
        <g transform="translate(10, 12)">
          <rect x="0" y="0" width="14" height="20" rx="2" fill="none" stroke="#00838F" stroke-width="1.5"/>
          <line x1="3" y1="5" x2="11" y2="5" stroke="#00838F" stroke-width="1"/>
          <line x1="3" y1="10" x2="11" y2="10" stroke="#00838F" stroke-width="1"/>
        </g>
        <text x="40" y="96" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#00695C">State JSON</text>
        <path d="M 110 92 L 185 92" stroke="#00838F" stroke-width="1.5" fill="none" />
      </g>

      <!-- LLM Brain Engine Node -->
      <g transform="translate(200, 60)">
        <rect width="100" height="75" rx="8" fill="#E3F2FD" stroke="#1E88E5" stroke-width="2" />
        <use href="#icon-brain" x="50" y="32" />
        <text x="50" y="65" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1565C0" text-anchor="middle">LLM Engine</text>
      </g>

      <!-- Connection Arrow to Output -->
      <path d="M 300 97 L 335 97" stroke="#4CAF50" stroke-width="2.5" fill="none" />
      <polygon points="335,93 343,97 335,101" fill="#4CAF50" />

      <!-- Output Remediation Badge -->
      <g transform="translate(350, 70)">
        <use href="#icon-success" x="25" y="25" />
        <text x="25" y="62" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2E7D32" text-anchor="middle">Remediations</text>
      </g>
    </g>

    <!-- Advantages -->
    <g transform="translate(30, 365)">
      <text x="0" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2E7D32">✓ Zero Code Customizations</text>
      <text x="20" y="38" font-family="Arial, sans-serif" font-size="12" fill="#5F6368">Updating policies or rules only requires editing configuration YAMLs.</text>
      
      <text x="0" y="65" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2E7D32">✓ Semantic Mapping &amp; Reasoning</text>
      <text x="20" y="83" font-family="Arial, sans-serif" font-size="12" fill="#5F6368">Intelligently evaluates complex environments, matches synonyms, and drafts issues.</text>
    </g>
  </g>
</svg>
