<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF" />

  <!-- Slide Header -->
  <text x="80" y="90" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#232F3E">03. Code Blocks &amp; Workspace Layout</text>
  <text x="80" y="130" font-family="Arial, sans-serif" font-size="20" fill="#607D8B">Visualizing the file tree and structural components we need to build</text>

  <!-- stylized File Explorer Pane -->
  <g transform="translate(180, 200)">
    <!-- Browser Window/Explorer Chrome -->
    <rect width="920" height="420" rx="12" fill="#F8F9FA" stroke="#E0E0E0" stroke-width="2" />
    
    <!-- Title bar -->
    <path d="M 0 12 A 12 12 0 0 1 12 0 L 908 0 A 12 12 0 0 1 920 12 L 920 40 L 0 40 Z" fill="#ECEFF1" />
    <circle cx="20" cy="20" r="6" fill="#FF5F56" />
    <circle cx="40" cy="20" r="6" fill="#FFBD2E" />
    <circle cx="60" cy="20" r="6" fill="#27C93F" />
    <text x="460" y="26" font-family="Arial, sans-serif" font-size="14" fill="#5F6368" text-anchor="middle">workspace / 04-local-python-agent</text>

    <!-- Folder/File Directory Tree Drawing -->
    <g transform="translate(60, 80)">
      <!-- Root Node -->
      <!-- Folder Icon -->
      <path d="M 0 4 L 8 4 L 12 8 L 24 8 L 24 22 L 0 22 Z" fill="#90CAF9" />
      <text x="32" y="18" font-family="monospace" font-size="18" font-weight="bold" fill="#232F3E">04-local-python-agent/</text>

      <!-- Branch to config -->
      <path d="M 12 28 L 12 110" stroke="#B0BEC5" stroke-width="2" fill="none" />
      <path d="M 12 110 L 36 110" stroke="#B0BEC5" stroke-width="2" fill="none" />
      
      <!-- config/ Folder Icon -->
      <path d="M 40 96 L 48 96 L 52 100 L 64 100 L 64 114 L 40 114 Z" fill="#FFE082" />
      <text x="72" y="110" font-family="monospace" font-size="18" font-weight="bold" fill="#232F3E">config/</text>

      <!-- Branch to tagging-rules.yaml -->
      <path d="M 52 120 L 52 160" stroke="#B0BEC5" stroke-width="2" fill="none" />
      <path d="M 52 160 L 76 160" stroke="#B0BEC5" stroke-width="2" fill="none" />
      <!-- File Icon -->
      <rect x="80" y="146" width="16" height="20" rx="2" fill="#CFD8DC" />
      <path d="M 90 146 L 96 152 L 90 152 Z" fill="#90A4AE" />
      <text x="104" y="161" font-family="monospace" font-size="18" fill="#FF9900">tagging-rules.yaml</text>
      <text x="330" y="161" font-family="Arial, sans-serif" font-size="14" fill="#78909C">// Defines compliant metadata targets &amp; exclusions</text>

      <!-- Branch to agent -->
      <path d="M 12 110 L 12 220" stroke="#B0BEC5" stroke-width="2" fill="none" />
      <path d="M 12 220 L 36 220" stroke="#B0BEC5" stroke-width="2" fill="none" />
      
      <!-- agent/ Folder Icon -->
      <path d="M 40 206 L 48 206 L 52 210 L 64 210 L 64 224 L 40 224 Z" fill="#FFE082" />
      <text x="72" y="220" font-family="monospace" font-size="18" font-weight="bold" fill="#232F3E">agent/</text>

      <!-- Branch to collect.py -->
      <path d="M 52 226 L 52 270" stroke="#B0BEC5" stroke-width="2" fill="none" />
      <path d="M 52 270 L 76 270" stroke="#B0BEC5" stroke-width="2" fill="none" />
      <!-- File Icon -->
      <rect x="80" y="256" width="16" height="20" rx="2" fill="#CFD8DC" />
      <path d="M 90 256 L 96 262 L 90 262 Z" fill="#90A4AE" />
      <text x="104" y="271" font-family="monospace" font-size="18" fill="#4285F4">collect.py</text>
      <text x="240" y="271" font-family="Arial, sans-serif" font-size="14" fill="#78909C">// Dumb collector connecting to live Kubernetes APIs</text>

      <!-- Branch to requirements.txt -->
      <path d="M 12 220 L 12 320" stroke="#B0BEC5" stroke-width="2" fill="none" />
      <path d="M 12 320 L 36 320" stroke="#B0BEC5" stroke-width="2" fill="none" />
      <!-- File Icon -->
      <rect x="40" y="306" width="16" height="20" rx="2" fill="#CFD8DC" />
      <path d="M 50 306 L 56 312 L 50 312 Z" fill="#90A4AE" />
      <text x="64" y="321" font-family="monospace" font-size="18" fill="#37474F">requirements.txt</text>
      <text x="240" y="321" font-family="Arial, sans-serif" font-size="14" fill="#78909C">// Python dependencies: kubernetes, pyyaml, python-dotenv</text>
    </g>
  </g>
</svg>
