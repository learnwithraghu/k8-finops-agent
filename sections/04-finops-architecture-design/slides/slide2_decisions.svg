<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Header -->
  <rect width="1280" height="80" fill="url(#headerGrad)"/>
  <text x="40" y="52" fill="#FFFFFF" font-size="28" font-weight="700">Video 2: Tool Selection &amp; Trade-offs</text>
  <text x="1240" y="52" fill="#FFFFFF" font-size="14" text-anchor="end" opacity="0.7">Section 04 — FinOps AI Architecture Design</text>

  <!-- Title -->
  <text x="40" y="120" fill="#1B2A4A" font-size="22" font-weight="700">Decision Matrix — Choosing the Right Tools</text>
  <line x1="40" y1="130" x2="420" y2="130" stroke="#0EA5E9" stroke-width="3"/>

  <!-- Table header -->
  <rect x="40" y="150" width="1200" height="40" rx="8" fill="#1B2A4A"/>
  <text x="170" y="175" fill="#FFFFFF" font-size="14" font-weight="700" text-anchor="middle">DECISION</text>
  <text x="420" y="175" fill="#FFFFFF" font-size="14" font-weight="700" text-anchor="middle">OPTION A</text>
  <text x="670" y="175" fill="#FFFFFF" font-size="14" font-weight="700" text-anchor="middle">OPTION B</text>
  <text x="920" y="175" fill="#FFFFFF" font-size="14" font-weight="700" text-anchor="middle">OPTION C</text>
  <text x="1140" y="175" fill="#FFFFFF" font-size="14" font-weight="700" text-anchor="middle">CHOICE</text>

  <!-- Row 1: Collect -->
  <rect x="40" y="195" width="1200" height="140" rx="0" fill="#F8FAFC"/>
  <rect x="40" y="195" width="4" height="140" fill="#0EA5E9"/>
  <text x="170" y="225" fill="#1B2A4A" font-size="15" font-weight="700" text-anchor="middle">How to read</text>
  <text x="170" y="245" fill="#1B2A4A" font-size="15" font-weight="700" text-anchor="middle">the cluster?</text>
  <text x="170" y="275" fill="#0EA5E9" font-size="12" font-weight="600" text-anchor="middle">PHASE 1</text>

  <!-- Option A: kubectl -->
  <rect x="310" y="205" width="220" height="55" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="420" y="225" fill="#1B2A4A" font-size="13" font-weight="600" text-anchor="middle">kubectl</text>
  <text x="420" y="245" fill="#64748B" font-size="11" text-anchor="middle">Human tool, terminal-based</text>

  <!-- Option B: Python client -->
  <rect x="560" y="205" width="220" height="55" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="670" y="225" fill="#1B2A4A" font-size="13" font-weight="600" text-anchor="middle">Python client</text>
  <text x="670" y="245" fill="#64748B" font-size="11" text-anchor="middle">Custom code, direct API</text>

  <!-- Option C: MCP -->
  <rect x="810" y="205" width="220" height="55" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="920" y="225" fill="#065F46" font-size="13" font-weight="600" text-anchor="middle">MCP Server</text>
  <text x="920" y="245" fill="#065F46" font-size="11" text-anchor="middle">Standard protocol, prebuilt</text>

  <!-- Trade-off row -->
  <rect x="310" y="268" width="220" height="28" rx="4" fill="#FEF3C7"/>
  <text x="420" y="287" fill="#92400E" font-size="10" text-anchor="middle">No automation</text>
  <rect x="560" y="268" width="220" height="28" rx="4" fill="#FEF3C7"/>
  <text x="670" y="287" fill="#92400E" font-size="10" text-anchor="middle">251 lines custom code</text>
  <rect x="810" y="268" width="220" height="28" rx="4" fill="#D1FAE5"/>
  <text x="920" y="287" fill="#065F46" font-size="10" text-anchor="middle">Standard interface, 0 custom code</text>

  <!-- Choice badge -->
  <rect x="1090" y="215" width="100" height="35" rx="8" fill="#0EA5E9"/>
  <text x="1140" y="238" fill="#FFFFFF" font-size="13" font-weight="700" text-anchor="middle">MCP</text>
  <text x="1140" y="275" fill="#64748B" font-size="10" text-anchor="middle">Section 05</text>

  <!-- Row 2: Analyze -->
  <rect x="40" y="340" width="1200" height="140" rx="0" fill="#FFFFFF"/>
  <rect x="40" y="340" width="4" height="140" fill="#F97316"/>
  <text x="170" y="370" fill="#1B2A4A" font-size="15" font-weight="700" text-anchor="middle">How to apply</text>
  <text x="170" y="390" fill="#1B2A4A" font-size="15" font-weight="700" text-anchor="middle">policy?</text>
  <text x="170" y="420" fill="#F97316" font-size="12" font-weight="600" text-anchor="middle">PHASE 2</text>

  <!-- Option A: Manual review -->
  <rect x="310" y="350" width="220" height="55" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="420" y="370" fill="#1B2A4A" font-size="13" font-weight="600" text-anchor="middle">Manual review</text>
  <text x="420" y="390" fill="#64748B" font-size="11" text-anchor="middle">Human reads JSON, decides</text>

  <!-- Option B: Rule engine -->
  <rect x="560" y="350" width="220" height="55" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="670" y="370" fill="#1B2A4A" font-size="13" font-weight="600" text-anchor="middle">Rule engine</text>
  <text x="670" y="390" fill="#64748B" font-size="11" text-anchor="middle">if/else logic, deterministic</text>

  <!-- Option C: LLM -->
  <rect x="810" y="350" width="220" height="55" rx="6" fill="#FEF3C7" stroke="#F97316" stroke-width="2"/>
  <text x="920" y="370" fill="#92400E" font-size="13" font-weight="600" text-anchor="middle">LLM</text>
  <text x="920" y="390" fill="#92400E" font-size="11" text-anchor="middle">Reasoning + structured output</text>

  <!-- Trade-off row -->
  <rect x="310" y="413" width="220" height="28" rx="4" fill="#FEE2E2"/>
  <text x="420" y="432" fill="#991B1B" font-size="10" text-anchor="middle">Does not scale</text>
  <rect x="560" y="413" width="220" height="28" rx="4" fill="#FEF3C7"/>
  <text x="670" y="432" fill="#92400E" font-size="10" text-anchor="middle">Brittle, every rule is new code</text>
  <rect x="810" y="413" width="220" height="28" rx="4" fill="#FEF3C7"/>
  <text x="920" y="432" fill="#92400E" font-size="10" text-anchor="middle">Non-deterministic (fix with schema)</text>

  <!-- Choice badge -->
  <rect x="1090" y="360" width="100" height="35" rx="8" fill="#F97316"/>
  <text x="1140" y="383" fill="#FFFFFF" font-size="13" font-weight="700" text-anchor="middle">LLM</text>
  <text x="1140" y="420" fill="#64748B" font-size="10" text-anchor="middle">Section 07</text>

  <!-- Row 3: Act -->
  <rect x="40" y="485" width="1200" height="140" rx="0" fill="#F8FAFC"/>
  <rect x="40" y="485" width="4" height="140" fill="#10B981"/>
  <text x="170" y="515" fill="#1B2A4A" font-size="15" font-weight="700" text-anchor="middle">How to</text>
  <text x="170" y="535" fill="#1B2A4A" font-size="15" font-weight="700" text-anchor="middle">take action?</text>
  <text x="170" y="565" fill="#10B981" font-size="12" font-weight="600" text-anchor="middle">PHASE 3</text>

  <!-- Option A: Log to file -->
  <rect x="310" y="495" width="220" height="55" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="420" y="515" fill="#1B2A4A" font-size="13" font-weight="600" text-anchor="middle">Log to file</text>
  <text x="420" y="535" fill="#64748B" font-size="11" text-anchor="middle">JSON on disk, no workflow</text>

  <!-- Option B: Email alert -->
  <rect x="560" y="495" width="220" height="55" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="670" y="515" fill="#1B2A4A" font-size="13" font-weight="600" text-anchor="middle">Email / Slack alert</text>
  <text x="670" y="535" fill="#64748B" font-size="11" text-anchor="middle">Notification, no tracking</text>

  <!-- Option C: Issue tracker -->
  <rect x="810" y="495" width="220" height="55" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="920" y="515" fill="#065F46" font-size="13" font-weight="600" text-anchor="middle">Issue Tracker</text>
  <text x="920" y="535" fill="#065F46" font-size="11" text-anchor="middle">Tickets, assign, track lifecycle</text>

  <!-- Trade-off row -->
  <rect x="310" y="558" width="220" height="28" rx="4" fill="#FEE2E2"/>
  <text x="420" y="577" fill="#991B1B" font-size="10" text-anchor="middle">Nobody checks a JSON file</text>
  <rect x="560" y="558" width="220" height="28" rx="4" fill="#FEF3C7"/>
  <text x="670" y="577" fill="#92400E" font-size="10" text-anchor="middle">Gets buried, no accountability</text>
  <rect x="810" y="558" width="220" height="28" rx="4" fill="#D1FAE5"/>
  <text x="920" y="577" fill="#065F46" font-size="10" text-anchor="middle">Actionable, trackable, assignable</text>

  <!-- Choice badge -->
  <rect x="1090" y="505" width="100" height="35" rx="8" fill="#10B981"/>
  <text x="1140" y="528" fill="#FFFFFF" font-size="13" font-weight="700" text-anchor="middle">Tracker</text>
  <text x="1140" y="565" fill="#64748B" font-size="10" text-anchor="middle">Section 08</text>

  <!-- Bottom summary -->
  <rect x="40" y="645" width="1200" height="50" rx="8" fill="#1B2A4A"/>
  <text x="640" y="668" fill="#FFFFFF" font-size="14" font-weight="600" text-anchor="middle">Three decisions. Three trade-offs. The architecture is the sum of these choices.</text>
  <text x="640" y="685" fill="#94A3B8" font-size="12" text-anchor="middle">MCP for collection + LLM for analysis + Tracker for action = the FinOps agent pipeline.</text>
</svg>