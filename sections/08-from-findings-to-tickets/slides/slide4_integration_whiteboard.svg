<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F97316"/>
    </marker>
  </defs>
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect width="1280" height="80" fill="url(#headerGrad)"/>
  <text x="40" y="52" fill="#FFFFFF" font-size="28" font-weight="700">Video 4: Integration Whiteboard</text>
  <text x="1240" y="52" fill="#FFFFFF" font-size="14" text-anchor="end" opacity="0.7">Section 08 - From Findings to Tickets</text>

  <text x="40" y="120" fill="#1B2A4A" font-size="22" font-weight="700">One LangChain agent, two MCP servers</text>
  <line x1="40" y1="130" x2="480" y2="130" stroke="#F97316" stroke-width="3"/>

  <rect x="340" y="170" width="280" height="120" rx="12" fill="#1B2A4A"/>
  <text x="480" y="210" fill="#FFFFFF" font-size="18" font-weight="700" text-anchor="middle">LangChain ReAct Agent</text>
  <text x="480" y="235" fill="#94A3B8" font-size="13" text-anchor="middle">run_agent() in mcp_client.py</text>
  <text x="480" y="260" fill="#E2E8F0" font-size="12" text-anchor="middle">tracker_auditor.py prompt</text>

  <rect x="80" y="190" width="160" height="80" rx="8" fill="#0EA5E9"/>
  <text x="160" y="225" fill="#FFFFFF" font-size="13" font-weight="700" text-anchor="middle">K8s MCP</text>
  <text x="160" y="248" fill="#E0F2FE" font-size="11" text-anchor="middle">:8000/mcp</text>
  <line x1="240" y1="230" x2="335" y2="230" stroke="#0EA5E9" stroke-width="2.5" marker-end="url(#arrowOrange)"/>

  <rect x="80" y="310" width="160" height="80" rx="8" fill="#10B981"/>
  <text x="160" y="345" fill="#FFFFFF" font-size="13" font-weight="700" text-anchor="middle">Tracker MCP</text>
  <text x="160" y="368" fill="#D1FAE5" font-size="11" text-anchor="middle">:8086/sse</text>
  <line x1="240" y1="350" x2="335" y2="250" stroke="#10B981" stroke-width="2.5" marker-end="url(#arrowOrange)"/>

  <rect x="720" y="190" width="200" height="80" rx="8" fill="#4285F4"/>
  <text x="820" y="225" fill="#FFFFFF" font-size="14" font-weight="700" text-anchor="middle">Kanban Board</text>
  <text x="820" y="248" fill="#E0E7FF" font-size="11" text-anchor="middle">:8085</text>
  <line x1="620" y1="230" x2="715" y2="230" stroke="#4285F4" stroke-width="2.5" marker-end="url(#arrowOrange)"/>

  <rect x="40" y="430" width="580" height="160" rx="10" fill="#FEF3C7" stroke="#F59E0B"/>
  <text x="60" y="465" fill="#92400E" font-size="16" font-weight="700">MCP_SERVERS config</text>
  <text x="60" y="495" fill="#78350F" font-size="13" font-family="monospace">k8s: streamable_http on :8000/mcp</text>
  <text x="60" y="520" fill="#78350F" font-size="13" font-family="monospace">tracker: sse on :8086/sse</text>
  <text x="60" y="555" fill="#78350F" font-size="13">convert_mcp_to_langchain_tools exposes both tool sets</text>

  <rect x="660" y="430" width="580" height="160" rx="10" fill="#ECFDF5" stroke="#10B981"/>
  <text x="680" y="465" fill="#065F46" font-size="16" font-weight="700">Agent prompt rules</text>
  <text x="680" y="495" fill="#047857" font-size="13">Audit labels via kubectl_get tools</text>
  <text x="680" y="520" fill="#047857" font-size="13">Call create_issue per finding (not a text report)</text>
  <text x="680" y="545" fill="#047857" font-size="13">Tagging rules via SystemMessage (Section 07)</text>
  <text x="680" y="570" fill="#047857" font-size="13">Confirm with list_issues when done</text>

  <text x="40" y="640" fill="#1B2A4A" font-size="18" font-weight="700">Two files: mcp_client.py + tracker_auditor.py</text>
  <text x="40" y="670" fill="#475569" font-size="14">No separate structure.py or tracker_client.py - the agent loop handles everything</text>
</svg>
