apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: airline
  labels:
    app.kubernetes.io/name: inventory-service
    app.kubernetes.io/tier: backend
    cost-center: inventory
    environment: prod
    owner: inventory-team
    compliance-level: standard
spec:
  selector:
    app: inventory
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP
