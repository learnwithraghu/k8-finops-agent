apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: inventory-data
  namespace: airline
  labels:
    app.kubernetes.io/name: inventory-service
    app.kubernetes.io/tier: backend
    cost-center: inventory
    environment: prod
    owner: inventory-team
    compliance-level: standard
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 3Gi
