<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Architecture Builder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b1329;
      --surface: #111b36;
      --surface-hover: #162040;
      --border: #2a3a60;
      --border-glow: #38bdf8;
      --teal: #028090;
      --teal-bright: #02c39a;
      --cyan: #38bdf8;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --wire: #1e4d6b;
      --wire-active: #38bdf8;
      --port: #028090;
      --port-hover: #02c39a;
      --toolbar-h: 56px;
      --palette-w: 200px;
      --node-w: 160px;
      --node-h: 72px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── Toolbar ── */
    #toolbar {
      height: var(--toolbar-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: linear-gradient(180deg, #0e1830 0%, var(--bg) 100%);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      position: relative;
    }

    #toolbar h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(90deg, var(--cyan), var(--teal-bright));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #toolbar .subtitle {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-left: 12px;
    }

    .toolbar-left { display: flex; align-items: baseline; }

    .toolbar-actions { display: flex; gap: 10px; }

    .btn {
      padding: 8px 18px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:hover { background: var(--surface-hover); border-color: var(--border-glow); }

    .btn-primary {
      background: linear-gradient(135deg, var(--teal), #036666);
      border-color: var(--teal-bright);
      color: #fff;
    }

    .btn-primary:hover {
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.35);
      transform: translateY(-1px);
    }

    .btn-primary.running {
      animation: pulse-btn 1s ease infinite;
      pointer-events: none;
      opacity: 0.85;
    }

    @keyframes pulse-btn {
      0%, 100% { box-shadow: 0 0 10px rgba(56, 189, 248, 0.3); }
      50% { box-shadow: 0 0 28px rgba(56, 189, 248, 0.6); }
    }

    /* ── Layout ── */
    #app {
      display: flex;
      height: calc(100vh - var(--toolbar-h));
    }

    /* ── Palette ── */
    #palette {
      width: var(--palette-w);
      flex-shrink: 0;
      background: #0c152b;
      border-right: 1px solid var(--border);
      padding: 16px 12px;
      overflow-y: auto;
    }

    #palette h2 {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .palette-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      margin-bottom: 6px;
      border-radius: 10px;
      border: 1px solid transparent;
      background: var(--surface);
      cursor: grab;
      transition: all 0.2s;
      user-select: none;
    }

    .palette-item:hover {
      border-color: var(--border-glow);
      background: var(--surface-hover);
      box-shadow: 0 0 12px rgba(56, 189, 248, 0.15);
    }

    .palette-item:active { cursor: grabbing; }

    .palette-item .icon-wrap {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--cyan);
    }

    .palette-item .icon-wrap svg { width: 20px; height: 20px; }

    .palette-item span {
      font-size: 0.78rem;
      font-weight: 500;
      line-height: 1.2;
    }

    .palette-hint {
      margin-top: 16px;
      padding: 10px;
      border-radius: 8px;
      background: rgba(2, 128, 144, 0.12);
      border: 1px solid rgba(2, 128, 144, 0.25);
      font-size: 0.72rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .palette-hint kbd {
      display: inline-block;
      padding: 1px 5px;
      border-radius: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 0.68rem;
      font-family: inherit;
    }

    /* ── Canvas ── */
    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #canvas {
      width: 100%;
      height: 100%;
      position: relative;
      background-color: var(--bg);
      background-image: radial-gradient(circle, #1e293b 1px, transparent 1px);
      background-size: 24px 24px;
      cursor: default;
    }

    #wire-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    #wire-layer .wire-hit {
      pointer-events: stroke;
      cursor: pointer;
    }

    #wire-layer .wire-hit:hover + .wire-visible,
    #wire-layer .wire-hit.selected + .wire-visible {
      stroke: var(--wire-active);
      stroke-width: 3;
      filter: drop-shadow(0 0 6px rgba(56, 189, 248, 0.6));
    }

    .wire-visible {
      fill: none;
      stroke: var(--wire);
      stroke-width: 2;
      transition: stroke 0.2s;
    }

    .wire-visible.active {
      stroke: var(--wire-active);
      stroke-width: 3;
      filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.8));
    }

    .wire-pulse {
      fill: none;
      stroke: var(--cyan);
      stroke-width: 4;
      stroke-linecap: round;
      opacity: 0;
      pointer-events: none;
    }

    .wire-pulse.animating {
      opacity: 1;
      stroke-dasharray: 12 200;
      animation: wire-travel 0.9s linear forwards;
    }

    @keyframes wire-travel {
      from { stroke-dashoffset: 212; }
      to { stroke-dashoffset: -212; }
    }

    .wire-particle {
      fill: var(--cyan);
      opacity: 0;
      filter: drop-shadow(0 0 6px var(--cyan));
    }

    .wire-particle.animating { opacity: 1; }

    #nodes-layer {
      position: absolute;
      inset: 0;
      z-index: 2;
    }

    /* ── Nodes ── */
    .node {
      position: absolute;
      width: var(--node-w);
      height: var(--node-h);
      background: linear-gradient(145deg, #131f3d 0%, var(--surface) 100%);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px 0 12px;
      cursor: grab;
      user-select: none;
      transition: box-shadow 0.2s, border-color 0.2s;
      z-index: 2;
    }

    .node:hover {
      border-color: rgba(56, 189, 248, 0.5);
      box-shadow: 0 0 18px rgba(56, 189, 248, 0.12);
    }

    .node.dragging {
      cursor: grabbing;
      z-index: 50;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 24px rgba(56, 189, 248, 0.25);
      border-color: var(--cyan);
    }

    .node.selected {
      border-color: var(--teal-bright);
      box-shadow: 0 0 20px rgba(2, 195, 154, 0.3);
    }

    .node .node-icon {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(56, 189, 248, 0.1);
      border-radius: 8px;
      color: var(--cyan);
    }

    .node .node-icon svg { width: 20px; height: 20px; }

    .node .node-label {
      font-size: 0.78rem;
      font-weight: 600;
      line-height: 1.25;
      color: var(--text);
    }

    .node .node-type {
      font-size: 0.62rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ── Ports ── */
    .port {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--port);
      border: 2px solid var(--bg);
      cursor: crosshair;
      z-index: 3;
      transition: all 0.2s;
    }

    .port:hover, .port.highlight {
      background: var(--port-hover);
      box-shadow: 0 0 10px var(--port-hover);
      transform: scale(1.25);
    }

    .port.pending {
      background: var(--cyan);
      box-shadow: 0 0 14px var(--cyan);
      animation: port-pulse 0.8s ease infinite;
    }

    @keyframes port-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }

    .port-in { left: -7px; top: 50%; margin-top: -7px; }
    .port-out { right: -7px; top: 50%; margin-top: -7px; }

    /* ── Status bar ── */
    #status {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      padding: 6px 16px;
      border-radius: 20px;
      background: rgba(17, 27, 54, 0.92);
      border: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--text-muted);
      z-index: 10;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    #status.active { color: var(--cyan); }

    /* ── Drag ghost from palette ── */
    .drag-ghost {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.85;
      transform: translate(-50%, -50%);
    }

    /* ── Hidden icon sprites ── */
    #icon-sprites { display: none; }
  </style>
</head>
<body>

  <div id="toolbar">
    <div class="toolbar-left">
      <h1>RAG Architecture Builder</h1>
      <span class="subtitle">Drag · Connect · Run</span>
    </div>
    <div class="toolbar-actions">
      <button class="btn" id="btn-reset">Reset</button>
      <button class="btn btn-primary" id="btn-run">▶ Run Flow</button>
    </div>
  </div>

  <div id="app">
    <aside id="palette">
      <h2>Components</h2>
      <div id="palette-list"></div>
      <div class="palette-hint">
        Drag components onto the canvas.<br />
        Click an <strong>output port</strong> (right) then an <strong>input port</strong> (left) to connect.<br />
        Click a wire to select, press <kbd>Delete</kbd> to remove.
      </div>
    </aside>

    <div id="canvas-wrap">
      <div id="canvas">
        <svg id="wire-layer">
          <defs>
            <filter id="glow">
              <feGaussianBlur stdDeviation="3" result="blur" />
              <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>
        </svg>
        <div id="nodes-layer"></div>
      </div>
      <div id="status">Click output port → input port to connect wires</div>
    </div>
  </div>

  <!-- Inline SVG icon sprites (Lucide-inspired, MIT) -->
  <svg id="icon-sprites" xmlns="http://www.w3.org/2000/svg">
    <symbol id="icon-user" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

    </symbol>
  </svg>

  <script>
  (function () {
    'use strict';

    const NODE_W = 160;
    const NODE_H = 72;

    const COMPONENT_TYPES = {
      userQuery:      { label: 'User Query',        icon: 'icon-user',      category: 'Input' },
      documents:      { label: 'Documents',         icon: 'icon-file-text', category: 'Input' },
      chunker:        { label: 'Chunker',           icon: 'icon-scissors',  category: 'Process' },
      embedding:      { label: 'Embedding Model',   icon: 'icon-brain',     category: 'Process' },
      vectorDb:       { label: 'Vector DB',         icon: 'icon-database',  category: 'Storage' },
      retriever:      { label: 'Retriever',         icon: 'icon-search',    category: 'Process' },
      context:        { label: 'Context Assembler', icon: 'icon-layers',  category: 'Process' },
      llm:            { label: 'LLM',               icon: 'icon-sparkles',  category: 'Model' },
      answer:         { label: 'Answer',            icon: 'icon-message',   category: 'Output' },
      reranker:       { label: 'Reranker',          icon: 'icon-reranker',  category: 'Process' },
      guardrails:     { label: 'Guardrails',        icon: 'icon-shield',    category: 'Safety' },
    };

    const DEFAULT_RAG_TEMPLATE = {
      nodes: [
        { id: 'n1', type: 'userQuery',  x: 60,  y: 280 },
        { id: 'n2', type: 'documents',  x: 60,  y: 80  },
        { id: 'n3', type: 'chunker',    x: 280, y: 80  },
        { id: 'n4', type: 'embedding',  x: 500, y: 180 },
        { id: 'n5', type: 'vectorDb',   x: 720, y: 180 },
        { id: 'n6', type: 'retriever',  x: 720, y: 360 },
        { id: 'n7', type: 'context',    x: 940, y: 280 },
        { id: 'n8', type: 'llm',        x: 1160, y: 280 },
        { id: 'n9', type: 'answer',     x: 1380, y: 280 },
      ],
      edges: [
        { id: 'e1', from: 'n2', to: 'n3' },
        { id: 'e2', from: 'n3', to: 'n4' },
        { id: 'e3', from: 'n4', to: 'n5' },
        { id: 'e4', from: 'n1', to: 'n4' },
        { id: 'e5', from: 'n5', to: 'n6' },
        { id: 'e6', from: 'n1', to: 'n6' },
        { id: 'e7', from: 'n6', to: 'n7' },
        { id: 'e8', from: 'n1', to: 'n7' },
        { id: 'e9', from: 'n7', to: 'n8' },
        { id: 'e10', from: 'n8', to: 'n9' },
      ],
    };

    const RUN_SEQUENCE = [
      { label: 'User query enters embedding', edges: ['e4'] },
      { label: 'Documents → Chunker → Embedding → Vector DB', edges: ['e1', 'e2', 'e3'] },
      { label: 'User query + Vector DB → Retriever', edges: ['e6', 'e5'] },
      { label: 'Retriever + User query → Context Assembler', edges: ['e7', 'e8'] },
      { label: 'Context → LLM → Answer', edges: ['e9', 'e10'] },
    ];

    let state = deepClone(DEFAULT_RAG_TEMPLATE);
    let nextId = 100;
    let pendingPort = null;
    let selectedEdgeId = null;
    let draggingNode = null;
    let dragOffset = { x: 0, y: 0 };
    let isRunning = false;
    let paletteDrag = null;

    const canvas = document.getElementById('canvas');
    const nodesLayer = document.getElementById('nodes-layer');
    const wireLayer = document.getElementById('wire-layer');
    const paletteList = document.getElementById('palette-list');
    const statusEl = document.getElementById('status');
    const btnRun = document.getElementById('btn-run');
    const btnReset = document.getElementById('btn-reset');

    function deepClone(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    function genId(prefix) {
      return prefix + (nextId++);
    }

    function getNode(id) {
      return state.nodes.find(n => n.id === id);
    }

    function portPos(node, side) {
      const x = side === 'out' ? node.x + NODE_W : node.x;
      const y = node.y + NODE_H / 2;
      return { x, y };
    }

    function bezierPath(x1, y1, x2, y2) {
      const dx = Math.abs(x2 - x1) * 0.5;
      const cx1 = x1 + dx;
      const cx2 = x2 - dx;
      return `M ${x1} ${y1} C ${cx1} ${y1}, ${cx2} ${y2}, ${x2} ${y2}`;
    }

    function setStatus(msg, active) {
      statusEl.textContent = msg;
      statusEl.classList.toggle('active', !!active);
    }

    /* ── Render palette ── */
    function renderPalette() {
      paletteList.innerHTML = '';
      Object.entries(COMPONENT_TYPES).forEach(([type, meta]) => {
        const item = document.createElement('div');
        item.className = 'palette-item';
        item.dataset.type = type;
        item.draggable = true;
        item.innerHTML = `
          <div class="icon-wrap"><svg><use href="#${meta.icon}"/></svg></div>
          <span>${meta.label}</span>`;
        item.addEventListener('dragstart', onPaletteDragStart);
        item.addEventListener('dragend', onPaletteDragEnd);
        paletteList.appendChild(item);
      });
    }

    function onPaletteDragStart(e) {
      const type = e.currentTarget.dataset.type;
      e.dataTransfer.setData('text/plain', type);
      e.dataTransfer.effectAllowed = 'copy';
      paletteDrag = type;
    }

    function onPaletteDragEnd() {
      paletteDrag = null;
    }

    canvas.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'copy';
    });

    canvas.addEventListener('drop', e => {
      e.preventDefault();
      const type = e.dataTransfer.getData('text/plain') || paletteDrag;
      if (!type || !COMPONENT_TYPES[type]) return;
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left - NODE_W / 2;
      const y = e.clientY - rect.top - NODE_H / 2;
      state.nodes.push({ id: genId('n'), type, x: Math.max(10, x), y: Math.max(10, y) });
      renderAll();
      setStatus(`Added ${COMPONENT_TYPES[type].label}`);
    });

    /* ── Render nodes ── */
    function renderNodes() {
      nodesLayer.innerHTML = '';
      state.nodes.forEach(node => {
        const meta = COMPONENT_TYPES[node.type];
        if (!meta) return;

        const el = document.createElement('div');
        el.className = 'node';
        el.dataset.id = node.id;
        el.style.transform = `translate(${node.x}px, ${node.y}px)`;
        el.innerHTML = `
          <div class="node-icon"><svg><use href="#${meta.icon}"/></svg></div>
          <div>
            <div class="node-label">${meta.label}</div>
            <div class="node-type">${meta.category}</div>
          </div>
          <div class="port port-in" data-node="${node.id}" data-side="in"></div>
          <div class="port port-out" data-node="${node.id}" data-side="out"></div>`;

        el.addEventListener('mousedown', onNodeMouseDown);

        el.querySelector('.port-in').addEventListener('click', e => {
          e.stopPropagation();
          onPortClick(node.id, 'in');
        });
        el.querySelector('.port-out').addEventListener('click', e => {
          e.stopPropagation();
          onPortClick(node.id, 'out');
        });

        nodesLayer.appendChild(el);
      });
    }

    function onNodeMouseDown(e) {
      if (e.target.classList.contains('port')) return;
      if (isRunning) return;
      const el = e.currentTarget;
      const id = el.dataset.id;
      const node = getNode(id);
      const rect = canvas.getBoundingClientRect();
      draggingNode = { id, el };
      dragOffset.x = e.clientX - rect.left - node.x;
      dragOffset.y = e.clientY - rect.top - node.y;
      el.classList.add('dragging');
      selectedEdgeId = null;
      document.addEventListener('mousemove', onNodeMouseMove);
      document.addEventListener('mouseup', onNodeMouseUp);
      e.preventDefault();
    }

    function onNodeMouseMove(e) {
      if (!draggingNode) return;
      const node = getNode(draggingNode.id);
      const rect = canvas.getBoundingClientRect();
      node.x = Math.max(0, e.clientX - rect.left - dragOffset.x);
      node.y = Math.max(0, e.clientY - rect.top - dragOffset.y);
      draggingNode.el.style.transform = `translate(${node.x}px, ${node.y}px)`;
      renderWires();
    }

    function onNodeMouseUp() {
      if (draggingNode) {
        draggingNode.el.classList.remove('dragging');
        draggingNode = null;
      }
      document.removeEventListener('mousemove', onNodeMouseMove);
      document.removeEventListener('mouseup', onNodeMouseUp);
    }

    /* ── Port connection ── */
    function onPortClick(nodeId, side) {
      if (isRunning) return;

      if (!pendingPort) {
        if (side === 'out') {
          pendingPort = { nodeId, side };
          highlightPorts('in');
          setStatus('Now click an input port (left)', true);
          document.querySelector(`.port-out[data-node="${nodeId}"]`)?.classList.add('pending');
        }
        return;
      }

      if (side === 'in' && pendingPort.side === 'out' && pendingPort.nodeId !== nodeId) {
        const exists = state.edges.some(e => e.from === pendingPort.nodeId && e.to === nodeId);
        if (!exists) {
          state.edges.push({ id: genId('e'), from: pendingPort.nodeId, to: nodeId });
          setStatus('Connection created');
        } else {
          setStatus('Connection already exists');
        }
      } else {
        setStatus('Invalid connection — use output → input');
      }

      clearPendingPort();
      renderAll();
    }

    function highlightPorts(side) {
      document.querySelectorAll(`.port-${side}`).forEach(p => p.classList.add('highlight'));
    }

    function clearPendingPort() {
      pendingPort = null;
      document.querySelectorAll('.port').forEach(p => {
        p.classList.remove('pending', 'highlight');
      });
    }

    /* ── Render wires ── */
    function renderWires(activeEdgeIds) {
      const activeSet = new Set(activeEdgeIds || []);
      const existing = wireLayer.querySelectorAll('.wire-group, .wire-pulse, .wire-particle');
      existing.forEach(el => el.remove());

      state.edges.forEach(edge => {
        const fromNode = getNode(edge.from);
        const toNode = getNode(edge.to);
        if (!fromNode || !toNode) return;

        const p1 = portPos(fromNode, 'out');
        const p2 = portPos(toNode, 'in');
        const d = bezierPath(p1.x, p1.y, p2.x, p2.y);
        const isActive = activeSet.has(edge.id);
        const isSelected = edge.id === selectedEdgeId;

        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.classList.add('wire-group');
        g.dataset.edgeId = edge.id;

        const hit = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        hit.setAttribute('d', d);
        hit.setAttribute('stroke', 'transparent');
        hit.setAttribute('stroke-width', '14');
        hit.setAttribute('fill', 'none');
        hit.classList.add('wire-hit');
        if (isSelected) hit.classList.add('selected');
        hit.style.pointerEvents = 'stroke';
        hit.addEventListener('click', e => {
          e.stopPropagation();
          if (isRunning) return;
          selectedEdgeId = edge.id;
          setStatus('Wire selected — press Delete to remove');
          renderWires();
        });

        const visible = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        visible.setAttribute('d', d);
        visible.classList.add('wire-visible');
        if (isActive) visible.classList.add('active');

        const pulse = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        pulse.setAttribute('d', d);
        pulse.classList.add('wire-pulse');
        pulse.dataset.edgeId = edge.id;

        const particle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        particle.setAttribute('r', '5');
        particle.classList.add('wire-particle');
        particle.dataset.edgeId = edge.id;

        g.appendChild(hit);
        g.appendChild(visible);
        g.appendChild(pulse);
        g.appendChild(particle);
        wireLayer.appendChild(g);
      });
    }

    function renderAll(activeEdgeIds) {
      renderNodes();
      renderWires(activeEdgeIds);
    }

    /* ── Delete edge ── */
    document.addEventListener('keydown', e => {
      if (e.key === 'Delete' || e.key === 'Backspace') {
        if (selectedEdgeId && !isRunning) {
          state.edges = state.edges.filter(ed => ed.id !== selectedEdgeId);
          selectedEdgeId = null;
          setStatus('Wire removed');
          renderAll();
        }
      }
      if (e.key === 'Escape') {
        clearPendingPort();
        selectedEdgeId = null;
        renderAll();
        setStatus('Click output port → input port to connect wires');
      }
    });

    canvas.addEventListener('click', () => {
      if (!pendingPort) {
        selectedEdgeId = null;
        renderWires();
      }
    });

    /* ── Reset ── */
    btnReset.addEventListener('click', () => {
      if (isRunning) return;
      state = deepClone(DEFAULT_RAG_TEMPLATE);
      nextId = 100;
      clearPendingPort();
      selectedEdgeId = null;
      renderAll();
      setStatus('Template restored');
    });

    /* ── Run Flow animation ── */
    function animateParticleAlongPath(pathEl, particleEl, duration) {
      return new Promise(resolve => {
        const len = pathEl.getTotalLength();
        const start = performance.now();

        function tick(now) {
          const t = Math.min(1, (now - start) / duration);
          const pt = pathEl.getPointAtLength(t * len);
          particleEl.setAttribute('cx', pt.x);
          particleEl.setAttribute('cy', pt.y);
          if (t < 1) {
            requestAnimationFrame(tick);
          } else {
            resolve();
          }
        }

        particleEl.classList.add('animating');
        requestAnimationFrame(tick);
      });
    }

    async function runSimulation() {
      if (isRunning) return;
      isRunning = true;
      btnRun.classList.add('running');
      btnRun.textContent = '● Running…';
      clearPendingPort();

      for (const step of RUN_SEQUENCE) {
        setStatus(step.label, true);
        renderWires(step.edges);

        await Promise.all(step.edges.map(async edgeId => {
          const pulse = wireLayer.querySelector(`.wire-pulse[data-edge-id="${edgeId}"]`);
          const particle = wireLayer.querySelector(`.wire-particle[data-edge-id="${edgeId}"]`);
          const visible = pulse?.previousElementSibling;
          if (!pulse || !particle || !visible) return;

          pulse.classList.add('animating');
          visible.classList.add('active');
          await animateParticleAlongPath(visible, particle, 850);
          pulse.classList.remove('animating');
        }));

        await sleep(200);
      }

      setStatus('Flow complete — explore the pipeline!', true);
      await sleep(1200);
      renderWires();
      isRunning = false;
      btnRun.classList.remove('running');
      btnRun.textContent = '▶ Run Flow';
    }

    function sleep(ms) {
      return new Promise(r => setTimeout(r, ms));
    }

    btnRun.addEventListener('click', runSimulation);

    /* ── Init ── */
    renderPalette();
    renderAll();
  })();
  </script>
</body>
</html>
